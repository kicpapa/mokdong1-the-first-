function wireSettleSection(){
  const m=MODULES.settle;
  document.querySelectorAll(`#tabbar-settle > .tab`).forEach(t=>{ t.onclick=()=>activateSub(m,t.dataset.sub); });
  const sc=document.getElementById("settle-search");
  if(sc) sc.addEventListener("input",()=>{ setPage("settle",1); renderSettleList(); });
  const sfv=document.getElementById("settle-filter-void");
  if(sfv) sfv.addEventListener("change",()=>{ setPage("settle",1); renderSettleList(); });
  const sfs=document.getElementById("settle-filter-col");
  if(sfs) sfs.addEventListener("change",()=>{ setPage("settle",1); renderSettleList(); });
  const sec=document.getElementById("section-settle");
  if(sec && !sec._wired){
    sec._wired=true;
    sec.addEventListener("click",(e)=>{
      const save=e.target.closest("[data-s-save]");
      const seq=e.target.closest("[data-s-seq]");
      const oo=e.target.closest("[data-open-order]");
      const od=e.target.closest("[data-open-draft2]");
      const vd=e.target.closest("[data-void]");
    const vrs=e.target.closest("[data-restore]");
    const vrj=e.target.closest("[data-void-reject]");
      const exp=e.target.closest("[data-expedite]");
      const expc=e.target.closest("[data-expedite-cancel]");
      const aa=e.target.closest("[data-att-add]");
      const ad=e.target.closest("[data-att-del]");
      const ac=e.target.closest("[data-att-copy]");
      if(save) saveSettleCompose(save.dataset.sSave);
      else if(seq){ const [no,step,res]=seq.dataset.sSeq.split("|"); settleSeqAction(no,step,res); }
      else if(oo){ const no=oo.dataset.openOrder; showTop("order"); activateSub(MODULES.order,"list"); openDetail(MODULES.order,no); }
      else if(od){ const no=od.dataset.openDraft2; showTop("draft"); activateSub(MODULES.draft,"list"); openDetail(MODULES.draft,no); }
      else if(vd){ const [k,no]=vd.dataset.void.split("|"); doVoid(MODULES[k],no); }
    else if(vrs){ const [k,no]=vrs.dataset.restore.split("|"); doRestore(MODULES[k],no); }
    else if(vrj){ const [k,no]=vrj.dataset.voidReject.split("|"); doRejectVoidRequest(MODULES[k],no); }
      else if(exp){ const [k,no]=exp.dataset.expedite.split("|"); expediteDoc(k,no); }
      else if(expc){ const [k,no]=expc.dataset.expediteCancel.split("|"); expediteCancel(k,no); }
      else if(aa){ const [k,no]=aa.dataset.attAdd.split("|"); addAttachment(MODULES[k],no); }
      else if(ad){ const [k,no,idx]=ad.dataset.attDel.split("|"); delAttachment(MODULES[k],no,Number(idx)); }
      else if(ac){ copyAttUrl(ac.dataset.attCopy); }
    });
  }
  // 계정 추가 버튼 + 라인 변경 위임 (작성폼 내, 동적)
  if(sec && !sec._wired2){
    sec._wired2=true;
    sec.addEventListener("click",(e)=>{
      if(e.target && e.target.id==="s-budget-add"){ addSettleLine(); updateSettleBudget(); }
      if(e.target && e.target.classList && e.target.classList.contains("sl-del")){ const row=e.target.closest(".settle-line"); if(row){ row.remove(); updateSettleBudget(); } }
    });
    sec.addEventListener("change",(e)=>{
      if(e.target && e.target.classList && e.target.classList.contains("sl-account")){
        const row=e.target.closest(".settle-line"); const code=e.target.value;
        const sel=code?loadBudgets().find(b=>b.code===code):null;
        const bd=row.querySelector(".sl-budget"); if(bd) bd.textContent=sel?won(sel.budget):"-";
        const sp=row.querySelector(".sl-spent"); if(sp) sp.textContent=sel?won(accountSpent(sel.code)):"-";
        updateSettleBudget();
      }
    });
    sec.addEventListener("input",(e)=>{
      if(e.target && e.target.classList && e.target.classList.contains("sl-amount")){
        const r=onlyNum(e.target.value); e.target.value=r?fmt(r):""; updateSettleBudget();
      }
    });
  }
  renderSettleList();
}
function renderSettleList(){
  const m=MODULES.settle;
  const recs=loadRecs(m);
  const q=val("settle-search").trim().toLowerCase();
  const voidF=(document.getElementById("settle-filter-void")||{}).value||"active";
  const fcol=(document.getElementById("settle-filter-col")||{}).value||"";
  const sGet={
    "제목": x=>x.title||"",
    "번호": x=>x.draft_no||"",
    "상태": x=>settleStage(x),
    "단계": x=>x.status==="폐기"?"폐기":finStageText("settle",x),
    "일자": x=>(x.created_at||"").slice(0,10)
  };
  let rows=recs.slice().reverse().filter(x=>{
    if(voidF==="active" && x.status==="폐기") return false;
    if(q){
      let hay;
      if(fcol && sGet[fcol]) hay=String(sGet[fcol](x)||"");
      else hay=Object.values(sGet).map(f=>String(f(x)||"")).join(" ");
      if(!hay.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const tb=document.getElementById("settle-rows"); if(!tb) return; tb.innerHTML="";
  document.getElementById("settle-empty").style.display=rows.length?"none":"block";
  const total=rows.length;
  let cur=getPage("settle"); const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(cur>pages){ cur=pages; setPage("settle",cur); }
  const startIdx=(cur-1)*PAGE_SIZE;
  rows.slice(startIdx,startIdx+PAGE_SIZE).forEach((x,i)=>{
    const idx=startIdx+i;
    const tr=document.createElement("tr");
    if(x.status==="폐기") tr.className="voided";
    tr.innerHTML=`<td class="muted col-no">${total-idx}</td><td class="col-date">${esc(x.created_at)}</td>
      <td class="no col-docno">${esc(x.draft_no)}</td><td class="col-title" style="white-space:pre-wrap">${esc(x.title||"")}</td>
      <td class="col-amt" style="font-variant-numeric:tabular-nums">${won(x.amount)}</td>
      <td class="col-status">${badge(x.status==="폐기"?"폐기":settleStage(x))}</td>
      <td class="col-stage" style="font-size:12px;color:var(--ink-soft)">${x.status==="폐기"?"폐기":esc(finStageText("settle",x))}</td>
      <td class="col-open"><button class="linkbtn" data-open-settle-row="${esc(x.draft_no)}">열람</button></td>`;
    tr.onclick=()=>openDetail(m,x.draft_no);
    tb.appendChild(tr);
  });
  renderPager("settle-pager", total, "settle", renderSettleList);
}

// 전표 집계: 지결의 계정별 라인을 펼쳐 행으로
function buildSlipRows(){
  const settles=loadRecs(MODULES.settle).concat(loadRecs(MODULES.urgent));
  const out=[];
  settles.forEach(s=>{
    if(s.status==="폐기") return;
    const confirmed = settleStage(s)==="확정";
    (s.budget_lines||[]).forEach(l=>{
      out.push({
        settle_no: s.draft_no,
        slip: l.slip||"-",
        name: l.name||"-",
        code: l.code||"-",
        amount: Number(l.amount||0),
        confirmed
      });
    });
  });
  return out;
}
function renderSlipList(){
  const all=buildSlipRows();
  const q=val("slip-search").trim().toLowerCase();
  const fs=val("slip-filter-status");
  let rows=all.filter(r=>{
    if(fs==="확정" && !r.confirmed) return false;
    if(fs==="진행" && r.confirmed) return false;
    if(q && !`${r.settle_no} ${r.slip} ${r.name} ${r.code}`.toLowerCase().includes(q)) return false;
    return true;
  });
  const tb=document.getElementById("slip-rows"); if(!tb) return; tb.innerHTML="";
  document.getElementById("slip-empty").style.display=rows.length?"none":"block";
  const grandTotal=rows.reduce((a,r)=>a+r.amount,0);
  document.getElementById("slip-total").textContent=won(grandTotal);
  const total=rows.length;
  let cur=getPage("slip"); const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(cur>pages){ cur=pages; setPage("slip",cur); }
  const startIdx=(cur-1)*PAGE_SIZE;
  rows.slice(startIdx,startIdx+PAGE_SIZE).forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="no">${esc(r.settle_no)}</td>
      <td>${esc(r.slip)}</td>
      <td>${esc(r.name)}</td>
      <td class="no">${esc(r.code)}</td>
      <td style="font-variant-numeric:tabular-nums">${won(r.amount)}</td>
      <td>${r.confirmed?'<span class="chip chip-ok">확정</span>':'<span class="chip chip-wait">진행</span>'}</td>`;
    tb.appendChild(tr);
  });
  renderPager("slip-pager", total, "slip", renderSlipList);
}

// 체인 행 생성
function buildExecRows(){
  const prs=loadRecs(MODULES.pr);
  const drafts=loadRecs(MODULES.draft);
  const orders=loadRecs(MODULES.order);
  const settles=loadRecs(MODULES.settle);
  const rows=[];

  // 지결 증빙번호: 지결의 첨부 중 첫번째 이름, 없으면 "-"
  const evidenceOf=(rec)=> (rec && Array.isArray(rec.attachments) && rec.attachments.length) ? rec.attachments.map(a=>a.name).join(", ") : "-";

  // 발주 상태 라벨
  const orderState=(o)=> o.received ? (o.approval&&o.approval.result==="승인"?"발주":"입고") : "발주";
  // 더 정확히: 입고 완료면 "입고", 재무승인까지면 "발주", 지결 있으면 "지결"
  function rowStatus({pr, draft, order, settle}){
    if(settle){
      const st=settleStage(settle);
      if(st==="확정") return "지결";
      return "지결";  // 지결 생성됐으면 지결 단계
    }
    if(order){
      if(order.received) return "입고";
      return "발주";
    }
    if(draft){
      const st=draftStage(draft);
      if(st==="위원장승인"||draft.status==="승인") return "기안승인";  // 발주 생성 대기
      return "기안승인대기";
    }
    if(pr){
      if(pr.status==="승인") return "기안생성대기";
      return "구매요청대기";
    }
    return "-";
  }

  // 펜딩: 현재 누구의 액션을 기다리는가
  function rowPending({pr, draft, order, settle}){
    if(settle){
      const st=settleStage(settle);
      if(st==="확정") return "완료";
      if(st==="반려") return "반려";
      if(st==="상신") return !settle.amount ? "사무직원(작성)" : "재무분과 승인";
      if(st==="위원장대기") return "위원장 승인";
      if(st==="OTP대기") return "재무분과장 최종";
      return "재무분과 승인";
    }
    if(order){
      if(!order.received) return "사무직원(입고확인)";
      if(!order.approval) return "재무분과 승인";
      if(order.approval.result==="반려") return "반려";
      return "사무직원(지결 작성)";
    }
    if(draft){
      const st=draftStage(draft);
      if(st==="반려") return "반려";
      if(st==="상신") return "재무분과 승인";
      if(st==="위원장대기") return "위원장 승인";
      if(st==="위원장승인"||draft.status==="승인") return "사무직원(발주)";
      return "재무분과 승인";
    }
    if(pr){
      if(pr.status==="승인") return "사무직원(기안)";
      if(pr.status==="반려") return "반려";
      return "재무분과 승인";
    }
    return "-";
  }
  // 특수케이스: 긴급진행·긴급승인·선진행 등
  function rowSpecial({pr, draft, order, settle}){
    const tags=[];
    [settle, order, draft, pr].forEach(rec=>{
      if(!rec) return;
      if(rec.expedite) tags.push("⚡선진행");
      if(rec.emergency) tags.push("⚡긴급승인");
    });
    if(settle){
      const s=settleSeq(settle);
      if(s.otp && s.otp.self) tags.push("작성자 예외승인");
    }
    // 구매요청 없이 만든 기안 표시
    if(draft && !draft.from_pr) tags.push("구매요청 없음");
    return [...new Set(tags)].join(", ") || "-";
  }

  // 구매요청 출발 체인
  const drByPr={}, drByNo={};
  drafts.forEach(d=>{ drByNo[d.draft_no]=d; if(d.from_pr){ (drByPr[d.from_pr]=drByPr[d.from_pr]||[]).push(d); } });
  const ordByDraft={}, ordByNo={};
  orders.forEach(o=>{ ordByNo[o.draft_no]=o; if(o.from_draft){ (ordByDraft[o.from_draft]=ordByDraft[o.from_draft]||[]).push(o); } });
  const setByOrder={};
  settles.forEach(st=>{ if(st.from_order){ (setByOrder[st.from_order]=setByOrder[st.from_order]||[]).push(st); } });

  function pushOrderRows(pr, draft){
    const ords = draft ? (ordByDraft[draft.draft_no]||[]) : [];
    if(ords.length===0){
      rows.push({pr, draft, order:null, settle:null});
      return;
    }
    ords.forEach(o=>{
      const sets=setByOrder[o.draft_no]||[];
      if(sets.length===0){ rows.push({pr, draft, order:o, settle:null}); }
      else sets.forEach(st=>rows.push({pr, draft, order:o, settle:st}));
    });
  }

  // 1) 구매요청에서 출발
  const draftsFromPr=new Set();
  prs.forEach(pr=>{
    const drs=drByPr[pr.draft_no]||[];
    if(drs.length===0){ rows.push({pr, draft:null, order:null, settle:null}); }
    else drs.forEach(d=>{ draftsFromPr.add(d.draft_no); pushOrderRows(pr, d); });
  });
  // 2) 구매요청 없이 만든 기안(독립)
  drafts.forEach(d=>{
    if(d.from_pr) return; // 이미 1)에서 처리
    pushOrderRows(null, d);
  });
  // 3) 긴급지출 (체인 없이 독립)
  const urgents=loadRecs(MODULES.urgent).filter(x=>x.status!=="폐기");
  urgents.forEach(u=>rows.push({pr:null, draft:null, order:null, settle:u, _urgent:true}));

  return rows.map(r=>{
    // 이동 타깃: 가장 진행된(하위) 문서 우선
    let tk="", tno="";
    if(r._urgent && r.settle){ tk="urgent"; tno=r.settle.draft_no; }
    else if(r.settle){ tk="settle"; tno=r.settle.draft_no; }
    else if(r.order){ tk="order"; tno=r.order.draft_no; }
    else if(r.draft){ tk="draft"; tno=r.draft.draft_no; }
    else if(r.pr){ tk="pr"; tno=r.pr.draft_no; }
    const isU=r._urgent;
    return {
      pr: isU?"-":(r.pr?r.pr.draft_no:"-"),
      draft: isU?"-":(r.draft?r.draft.draft_no:"-"),
      order: isU?"-":(r.order?r.order.draft_no:"-"),
      settle: r.settle?r.settle.draft_no:"-",
      status: isU?(settleStage(r.settle)==="확정"?"지결":"긴급"):rowStatus(r),
      pending: rowPending(r),
      special: isU?([rowSpecial(r),"긴급지출"].filter(x=>x&&x!=="-").join(", ")||"긴급지출"):rowSpecial(r),
      target_key: tk, target_no: tno,
      _title: (r.settle&&r.settle.title)||(r.order&&r.order.title)||(r.draft&&r.draft.title)||(r.pr&&(r.pr.title||r.pr.goods))||""
    };
  });
}

const EXEC_STATUS_COLOR={

function renderExecList(){
  const all=buildExecRows();

    return `${r.pr} ${r.draft} ${r.order} ${r.settle} ${r.pending} ${r.special} ${r._title}`.toLowerCase().includes(q);
  });
  const tb=document.getElementById("exec-rows"); if(!tb) return; tb.innerHTML="";
  document.getElementById("exec-empty").style.display=rows.length?"none":"block";

  rows.slice(startIdx,startIdx+PAGE_SIZE).forEach(r=>{

    const pendCell = r.target_no

/* =========================================================
   예산 마스터: 계정명·계정코드·배정예산 (누적지출은 지출결의 확정건 합산)
========================================================= */
function loadBudgets(){ return _cache.budgets; }
function saveBudgets(a){
  _cache.budgets = a;
  const rows = a.map(b=>{
    const {code,name,budget,_version,...rest}=b;
    return { code, name, budget:Number(budget||0), data:rest, version:(_version||1) };
  });
  if(rows.length){ sb.from("budgets").upsert(rows,{onConflict:"code"}).then(({error})=>{ if(error) _saveErr(error); }); }
}
// 계정별 누적지출 (지출결의 확정건 합산) — settle 모듈이 생기면 자동 반영
function accountSpent(code){
  let sum=0;
  try{
    const recs=(MODULES.settle?loadRecs(MODULES.settle):[]).concat(MODULES.urgent?loadRecs(MODULES.urgent):[]);
    recs.forEach(x=>{ if(x.status==="확정" && Array.isArray(x.budget_lines)){ x.budget_lines.forEach(l=>{ if(l.code===code) sum+=Number(l.amount||0); }); } });
  }catch(e){}
  return sum;
}

/* =========================================================
   전체 백업 / 복원 / 데모 롤백
========================================================= */
// Supabase: 모든 문서·예산·이벤트 비우기 (계정은 유지)
async function clearDocsAndBudgets(){
  await sb.from("docs").delete().neq("doc_no","__none__");
  await sb.from("budgets").delete().neq("code","__none__");
  await sb.from("events").delete().neq("id",-1);
}

// 전체 데이터를 JSON 파일로 내보내기 (현재 메모리 캐시 기준)
function exportBackupJson(reason){
  try{
    const payload={
      _type:"jichul_supabase_backup", _version:1, _at:nowStamp(),
      accounts:_cache.accounts,
      budgets:_cache.budgets,
      docs:_cache.docs,
      events:_cache.events
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const n=new Date();
    const p=x=>String(x).padStart(2,"0");
    const ts=`${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}_${p(n.getHours())}${p(n.getMinutes())}${p(n.getSeconds())}`;
    a.href=url; a.download=`지출관리_백업_${ts}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    return true;
  }catch(e){ console.error("백업 내보내기 오류:", e); return false; }
}
// 마스터·사무직원만 내보내기 권한
function canExportBackup(u){ return u && (u.role==="HTML마스터" || u.role==="사무직원"); }

// 백업 JSON 복원 (문서·예산·이벤트만, 계정은 유지) — 마스터 전용
async function importBackupJson(file){
  const u=currentUser();
  if(!u || u.role!=="HTML마스터"){ toast("복원은 HTML마스터만 가능합니다"); return; }
  const text=await file.text();
  let payload;
  try{ payload=JSON.parse(text); }catch(e){ toast("올바른 JSON 파일이 아닙니다"); return; }
  if(!payload || (!payload.docs && !payload.budgets)){ toast("지출관리 백업 파일이 아닙니다"); return; }
  if(!confirm("백업 파일로 문서·예산·이벤트를 복원합니다.\n현재 Supabase의 문서·예산·이벤트는 모두 삭제되고 백업 내용으로 교체됩니다.\n(계정은 그대로 유지)\n\n진행할까요?")) return;

  try{
    // 1) 현재 문서·예산·이벤트 삭제
    await clearDocsAndBudgets();

    // 2) 예산 복원
    const budgets = payload.budgets || [];
    if(budgets.length){
      await sb.from("budgets").insert(budgets.map(b=>{
        const {code,name,budget,_version,...rest}=b;
        return { code, name, budget:Number(budget||0), data:rest, version:(_version||1) };
      }));
    }
    // 3) 문서 복원 (모듈별)
    const docs = payload.docs || {};
    const allDocs=[];
    MODULE_KEYS.forEach(k=>{
      (docs[k]||[]).forEach(rec=>{
        allDocs.push({ module:k, doc_no:rec.draft_no, title:rec.title||"", status:rec.status||"", data:rec, version:(rec._version||1) });
      });
    });
    for(let i=0;i<allDocs.length;i+=200){
      const { error } = await sb.from("docs").insert(allDocs.slice(i,i+200));
      if(error){ console.error(error); throw error; }
    }
    // 4) 이벤트 복원
    const events = payload.events || [];
    if(events.length){
      await sb.from("events").insert(events.map(e=>({ module:e.mkey, doc_no:e.no, title:e.title, kind:e.kind, msg:e.msg, by_name:e.by, by_role:e.byRole })));
    }
    // 5) 캐시 갱신
    await loadAllFromSupabase();
    toast("백업에서 복원되었습니다");
  }catch(e){ console.error(e); toast("복원 중 오류 — 콘솔을 확인하세요"); }
}

function accountActionBtns(a){
  if(a.role==="HTML마스터") return `<span class="muted">마스터</span>`;
  let html="";
  if(a.status==="승인대기"){
    html+=`<select class="acct-role" data-id="${esc(a.login_id)}" style="width:auto;padding:5px 8px;font-size:12px">
      ${ROLES.filter(r=>r!=="HTML마스터").map(r=>`<option value="${r}"${r===a.role?" selected":""}>${r}</option>`).join("")}</select>
      <button class="btn btn-primary btn-sm" data-approve-acc="${esc(a.login_id)}">승인</button> `;
  }else if(a.status==="활성"){
    html+=`<button class="btn btn-ghost btn-sm" data-edit-acc="${esc(a.login_id)}">수정</button> `;
  }
  html+=`<button class="btn btn-ghost btn-sm" data-del-acc="${esc(a.login_id)}">삭제</button>`;
  return html;
}

function wireAccountSection(){

  if(!sec) return;
  const u=currentUser();

  // 로그인/가입 탭 전환
  const atabs=sec.querySelectorAll(".auth-tabs button");
  atabs.forEach(b=>b.onclick=()=>{
    atabs.forEach(x=>x.classList.remove("active")); b.classList.add("active");
    sec.querySelector("#atab-login").style.display = b.dataset.atab==="login"?"block":"none";
    sec.querySelector("#atab-signup").style.display = b.dataset.atab==="signup"?"block":"none";
  });

  // 본인 비밀번호 변경 (마스터 제외)
  const pwGo=sec.querySelector("#pw-change-go");
  if(pwGo) pwGo.onclick=async()=>{
    const cur=sec.querySelector("#pw-cur").value;
    const np=sec.querySelector("#pw-new").value;
    const np2=sec.querySelector("#pw-new2").value;
    if(!cur||!np){ toast("현재 비밀번호와 새 비밀번호를 입력하세요"); return; }
    if(np.length<6){ toast("새 비밀번호는 6자 이상이어야 합니다"); return; }
    if(np!==np2){ toast("새 비밀번호가 일치하지 않습니다"); return; }
    if(np===cur){ toast("새 비밀번호가 현재 비밀번호와 같습니다"); return; }
    pwGo.disabled=true; pwGo.textContent="변경 중…";
    const r=await sbChangePassword(cur, np);
    pwGo.disabled=false; pwGo.textContent="비밀번호 변경";
    if(!r.ok){ toast(r.msg); return; }
    toast("비밀번호가 변경되었습니다");

      await seedDemoData();
      toast("데모 데이터가 생성되었습니다");

    const ed=e.target.closest("[data-edit-acc]");

    if(ap){

      const roleSel=sec.querySelector(`.acct-role[data-id="${cssEsc(id)}"]`);
      const role=roleSel?roleSel.value:null;
      const accounts=loadAccounts(); const a=accounts.find(x=>x.login_id===id);
      if(a){ a.status="활성"; if(role) a.role=role; saveAccounts(accounts); showTop("account"); toast(`${a.name} 승인 · ${a.role}`); }
    }else if(ed){

  };
}

    <div class="field"><label>새 비밀번호 (선택)</label><input type="password" id="ed-pw" placeholder="변경할 때만 입력"></div>

    if(newId!==loginId && accounts.some(x=>x.login_id===newId)){ toast("이미 사용 중인 아이디입니다"); return; }

    saveAccounts(accounts);
    if(sessionWasThis) localStorage.setItem(SESSION_KEY,newId); // 본인 수정 시 세션 갱신
    card.remove(); showTop("account"); renderAuthBar();
    toast("계정 정보가 수정되었습니다");
  };
}

async function voidActions(table, cacheArr, sec, refresh){
  const u=currentUser(); if(!u) return;
  const find=id=>(cacheArr||[]).find(x=>x.id===Number(id));
  // 마스터 즉시 폐기 (또는 요청 승인)
  const doBtn=sec.querySelector("[data-void-do]");
  if(doBtn) doBtn.onclick=async()=>{
    const r=find(doBtn.dataset.voidDo); if(!r) return;
    if(!confirm("이 문서를 폐기 처리할까요? (삭제가 아니라 폐기 보관됩니다)")) return;
    const hist=(r.void_history||[]).concat([{at:nowStamp(), text:`[${u.role} ${u.name}] 폐기 처리`}]);
    const { error }=await sb.from(table).update({ void_status:"void", void_history:hist }).eq("id",r.id);
    if(error){ console.error(error); toast("폐기 실패 — 권한 확인"); return; }
    await refresh(); toast("폐기 처리되었습니다");
  };
  // 폐기 복구
  const reBtn=sec.querySelector("[data-void-restore]");
  if(reBtn) reBtn.onclick=async()=>{
    const r=find(reBtn.dataset.voidRestore); if(!r) return;
    const hist=(r.void_history||[]).concat([{at:nowStamp(), text:`[${u.role} ${u.name}] 폐기 복구`}]);
    const { error }=await sb.from(table).update({ void_status:"live", void_req:null, void_history:hist }).eq("id",r.id);
    if(error){ console.error(error); toast("복구 실패"); return; }
    await refresh(); toast("폐기 복구되었습니다");
  };
  // 폐기 요청 (작성자/일반)
  const reqBtn=sec.querySelector("[data-void-req]");
  if(reqBtn) reqBtn.onclick=async()=>{
    const r=find(reqBtn.dataset.voidReq); if(!r) return;
    const reason=prompt("폐기 요청 사유를 입력하세요:"); if(reason===null) return;
    const hist=(r.void_history||[]).concat([{at:nowStamp(), text:`[${u.role} ${u.name}] 폐기 요청 — ${reason}`}]);
    const { error }=await sb.from(table).update({ void_status:"void_requested", void_req:{by:u.name,role:u.role,reason,at:nowStamp()}, void_history:hist }).eq("id",r.id);
    if(error){ console.error(error); toast("요청 실패"); return; }
    await refresh(); toast("폐기 요청되었습니다 — 마스터 승인 대기");
  };
  // 폐기요청 반려 (마스터)
  const rjBtn=sec.querySelector("[data-void-reject]");
  if(rjBtn) rjBtn.onclick=async()=>{
    const r=find(rjBtn.dataset.voidReject); if(!r) return;
    const hist=(r.void_history||[]).concat([{at:nowStamp(), text:`[${u.role} ${u.name}] 폐기요청 반려`}]);
    const { error }=await sb.from(table).update({ void_status:"live", void_req:null, void_history:hist }).eq("id",r.id);
    if(error){ console.error(error); toast("반려 실패"); return; }
    await refresh(); toast("폐기요청을 반려했습니다");
  };
}

const _listSearch = {};   // key -> 검색어
const _searchCol = {};    // key -> 검색 대상 열 label ("" = 전체)
/* 검색창 + 검색범위(열) 선택 + 폐기 드롭다운 한 줄
   colDefs: [{label, get:(row)=>문자열}]  ("전체"는 자동 포함) */
function filterBar2(key, searchId, voidCur, ph, colDefs){
  const curCol = (key in _searchCol) ? _searchCol[key] : "";
  const colOpts=`<option value="" ${curCol===''?'selected':''}>전체</option>`+colDefs.map(c=>`<option value="${esc(c.label)}" ${curCol===c.label?'selected':''}>${esc(c.label)}</option>`).join("");
  return `<div style="display:flex;gap:5px;flex-wrap:nowrap;align-items:center;margin-bottom:12px">
    <input type="text" id="${searchId}" placeholder="${ph||'검색'}" value="${esc(_listSearch[key]||'')}" style="flex:1 1 0;min-width:0;padding:8px 9px;border:1px solid var(--line);border-radius:8px;box-sizing:border-box">
    <select id="${searchId}-col" style="flex:0 0 auto;width:82px;padding:8px 2px;box-sizing:border-box;font-size:12px">${colOpts}</select>
    <select id="${searchId}-void" style="flex:0 0 auto;width:66px;padding:8px 2px;box-sizing:border-box;font-size:12px">
      <option value="live" ${voidCur==='live'?'selected':''}>유효</option>
      <option value="void" ${voidCur==='void'?'selected':''}>폐기</option>
      <option value="all" ${voidCur==='all'?'selected':''}>전체</option>
    </select>
  </div>`;
}
// 검색 적용: 선택 열(기본=제목=첫 colDef)에서 검색, "전체"면 모든 열
function searchApply(key, rows, colDefs){
  const q=(_listSearch[key]||"").trim().toLowerCase();
  if(!q) return rows;
  const col = (key in _searchCol) ? _searchCol[key] : "";
  if(col){
    const def=colDefs.find(c=>c.label===col);
    if(def) return rows.filter(r=>String(def.get(r)||"").toLowerCase().includes(q));
  }
  return rows.filter(r=>colDefs.map(c=>String(c.get(r)||"")).join(" ").toLowerCase().includes(q));
}
// 이벤트 연결 (검색·열·폐기)
function wireFilterBar2(sec, key, searchId, rebuild, setVoid){
  const sr=sec.querySelector("#"+searchId);
  if(sr) sr.oninput=()=>{ _listSearch[key]=sr.value; const v=sr.value; rebuild(); setTimeout(()=>{ const el=document.querySelector("#"+searchId); if(el){ el.focus(); el.setSelectionRange(v.length,v.length); } },0); };
  const colSel=sec.querySelector(`#${searchId}-col`);
  if(colSel) colSel.onchange=()=>{ _searchCol[key]=colSel.value; rebuild(); };
  const vf=sec.querySelector(`#${searchId}-void`);
  if(vf) vf.onchange=()=>{ setVoid(vf.value); rebuild(); };
}


/* ---------- 페이지네이션 헬퍼 ---------- */
const _pgState = {};   // key -> page
function pageSlice(key, arr, size){
  size=size||15;
  const total=arr.length; const pages=Math.max(1, Math.ceil(total/size));
  let cur=_pgState[key]||1; if(cur>pages) cur=pages; _pgState[key]=cur;
  const start=(cur-1)*size;
  return { rows:arr.slice(start,start+size), cur, pages, total };
}
function pagerHtml(key, cur, pages){
  if(pages<=1) return "";
  let btns="";
  for(let i=1;i<=pages;i++){ btns+=`<button class="btn ${i===cur?'btn-primary':'btn-ghost'} btn-sm" data-pg="${key}|${i}" style="min-width:32px">${i}</button>`; }
  return `<div class="seg" style="justify-content:center;flex-wrap:wrap;gap:4px;margin-top:12px">${btns}</div>`;
}
function wirePager(sec, rebuild){
  sec.querySelectorAll("[data-pg]").forEach(b=>b.onclick=()=>{ const [k,i]=b.dataset.pg.split("|"); _pgState[k]=Number(i); rebuild(); });
}

        </div>
        <button class="btn btn-primary" id="ntc-add" style="width:100%;margin-top:14px">공지 ${_ntcEditId?"수정 저장":"등록"}</button>
      </div></div>`;
  }
  // 상세 열람
  if(_noticeOpenId){
    const n=(_cache.notices||[]).find(x=>x.id===_noticeOpenId);
    if(n){
      const atts=(n.attachments||[]).map(a=>`<div style="padding:6px 0;border-top:1px solid var(--line-soft)">📎 ${a.url?`<a href="${esc(a.url)}" target="_blank" rel="noopener" style="color:var(--brand);text-decoration:underline">${esc(a.name)}</a>`:esc(a.name)}</div>`).join("") || `<div class="muted" style="padding:6px 0">첨부 없음</div>`;
      return `<div class="wrap-inner">
        <button class="btn btn-ghost btn-sm" id="ntc-back" style="margin-bottom:10px">← 목록</button>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
            <div style="font-weight:700;font-size:17px;color:var(--brand)">${esc(n.title)} ${voidBadge(n)}</div>
            <div style="flex:0 0 auto;display:flex;gap:4px">${(u && (u.name===n.by_name || u.role==="HTML마스터") && n.void_status!=="void")?`<button class="btn btn-ghost btn-sm" id="ntc-edit" data-id="${n.id}">✏️ 수정</button>`:""}${voidButtonsHtml(n)}</div>
          </div>
          <div class="muted" style="font-size:12px;margin:4px 0 12px">${esc(n.by_role||"")} ${esc(n.by_name||"")} · ${fmtStamp(n.created_at)}</div>
          <div style="white-space:pre-wrap;font-size:14px;line-height:1.7">${esc(n.body||"")}</div>
          <div style="font-weight:700;margin:14px 0 4px">📎 첨부</div>
          ${atts}
          ${editHistoryHtml(n)}
          ${voidHistoryHtml(n)}
        </div>
      </div>`;
    }
    _noticeOpenId=null;
  }
  // 목록
  let allRaw=_cache.notices||[];
  const NTC_COLS=[
    {label:"제목", get:n=>`${n.title||""} ${n.body||""}`},
    {label:"작성자", get:n=>n.by_name||""},
    {label:"일자", get:n=>(n.created_at||"").slice(0,10)}
  ];
  allRaw=searchApply("notice", allRaw, NTC_COLS);
  const all=voidFilterApply(allRaw, _noticeFilter);
  const { rows:pageRows, cur, pages } = pageSlice("notice", all, 15);
  const rows = pageRows.length ? pageRows.map(n=>{
    const acnt=(n.attachments||[]).length;
    return `<tr data-ntc-open="${n.id}" style="cursor:pointer;${n.void_status==='void'?'opacity:.55':''}">
      <td style="white-space:nowrap">${(n.created_at||"").slice(0,10)}</td>
      <td class="bcard-title">${esc(n.title)} ${acnt?`<span class="muted">📎${acnt}</span>`:""} ${voidBadge(n)}</td>
      <td style="white-space:nowrap">${esc(n.by_name||"")}</td>
    </tr>`; }).join("") : `<tr><td colspan="3" class="empty">공지가 없습니다.</td></tr>`;
  const writeBtn = canWrite ? `<button class="btn btn-primary btn-sm" id="ntc-write">✍️ 공지 작성</button>` : "";
  return `<div class="wrap-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px">
      <h2 style="margin:0">📢 공지사항</h2>${writeBtn}
    </div>
    ${filterBar2("notice","ntc-search",_noticeFilter,"검색",NTC_COLS)}
    <div class="card"><div style="overflow:auto"><table>
      <thead><tr><th style="width:96px">일자</th><th>제목</th><th style="width:90px">작성자</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>
    ${pagerHtml("notice", cur, pages)}
  </div>`;
}
function wireNoticeSection(){
  const sec=document.getElementById("section-notice"); if(!sec) return;
  const u=currentUser();
  const rebuild=()=>{ buildSection("notice"); showTop("notice"); };
  const refresh=async()=>{ await loadAllFromSupabase(); rebuild(); };
  wirePager(sec, rebuild);
  // 검색 + 2단 필터 + 폐기 드롭다운
  wireFilterBar2(sec, "notice", "ntc-search", ()=>{ _pgState["notice"]=1; rebuild(); }, (v)=>{ _noticeFilter=v; });
  // 행 클릭 → 상세
  sec.querySelectorAll("[data-ntc-open]").forEach(tr=>tr.onclick=()=>{ _noticeOpenId=Number(tr.dataset.ntcOpen); rebuild(); });
  const back=sec.querySelector("#ntc-back"); if(back) back.onclick=()=>{ _noticeOpenId=null; rebuild(); };
  // 수정 진입
  const edit=sec.querySelector("#ntc-edit");
  if(edit) edit.onclick=()=>{
    const n=(_cache.notices||[]).find(x=>x.id===Number(edit.dataset.id)); if(!n) return;
    _ntcEditId=n.id; _noticeWriting=true; _noticeOpenId=null;
    _ntcDraft={title:n.title||"", body:n.body||""}; _ntcAtts=(n.attachments||[]).map(a=>({name:a.name,url:a.url}));
    rebuild();
  };
  voidActions("notices", _cache.notices, sec, async()=>{ _noticeOpenId=null; await refresh(); });
  const w=sec.querySelector("#ntc-write"); if(w) w.onclick=()=>{ _noticeWriting=true; _ntcEditId=null; _ntcAtts=[]; _ntcDraft={title:"",body:""}; rebuild(); };
  const c=sec.querySelector("#ntc-cancel"); if(c) c.onclick=()=>{ _noticeWriting=false; _ntcEditId=null; _ntcDraft={title:"",body:""}; rebuild(); };
  const keepDraft=()=>{ const t=sec.querySelector("#ntc-title"), b=sec.querySelector("#ntc-body"); if(t) _ntcDraft.title=t.value; if(b) _ntcDraft.body=b.value; };
  const aadd=sec.querySelector("#ntc-att-add");
  if(aadd) aadd.onclick=()=>{
    keepDraft();
    const name=sec.querySelector("#ntc-att-name").value.trim();
    const url=sec.querySelector("#ntc-att-url").value.trim();
    if(!name){ toast("파일명을 입력하세요"); return; }
    _ntcAtts.push({name,url}); rebuild();
  };
  sec.querySelectorAll("[data-ntc-attrm]").forEach(b=>b.onclick=()=>{ keepDraft(); _ntcAtts.splice(+b.dataset.ntcAttrm,1); rebuild(); });
  const add=sec.querySelector("#ntc-add");
  if(add) add.onclick=async()=>{
    const title=sec.querySelector("#ntc-title").value.trim();
    const body=sec.querySelector("#ntc-body").value.trim();
    if(!title){ toast("제목을 입력하세요"); return; }
    add.disabled=true; add.textContent=_ntcEditId?"저장 중…":"등록 중…";
    let error;
    if(_ntcEditId){
      const prev=(_cache.notices||[]).find(x=>x.id===_ntcEditId)||{};
      const changes=[];
      if((prev.title||"")!==title) changes.push("제목");
      if((prev.body||"")!==body) changes.push("내용");
      const prevAttN=(prev.attachments||[]).length, newAttN=_ntcAtts.length;
      if(JSON.stringify(prev.attachments||[])!==JSON.stringify(_ntcAtts)) changes.push(`첨부(${prevAttN}→${newAttN})`);
      const hist=(prev.edit_history||[]).concat([{ by:u.name, role:u.role, at:nowStamp(), changes: changes.length?changes.join(", "):"내용 변경 없음" }]);
      ({ error } = await sb.from("notices").update({ title, body, attachments:_ntcAtts, edit_history:hist }).eq("id",_ntcEditId));
    }else{
      ({ error } = await sb.from("notices").insert([{ title, body, attachments:_ntcAtts, by_name:u.name, by_role:u.role }]));
    }
    add.disabled=false;
    if(error){ console.error(error); toast(_ntcEditId?"수정 실패":"등록 실패 — 권한을 확인하세요"); return; }
    const wasEdit=_ntcEditId;
    _noticeWriting=false; _ntcEditId=null; _ntcDraft={title:"",body:""};
    await refresh(); toast(wasEdit?"공지가 수정되었습니다":"공지가 등록되었습니다");
  };
}

function rqViewHtml(){

  const cmts=(_cache.comments||[]).filter(c=>c.board==="request" && c.ref_id===r.id);
  const isOwner = u && (u.login_id===r.by_login);
  const isResponder = u && ((r.target==="chair" && u.role==="위원장") || (r.target==="audit" && ["감사1","감사2"].includes(u.role)));
  const isMasterU = u && u.role==="HTML마스터";

  const cmtBlock=(c, isChild)=>{
    const canDelC = u && (u.login_id===c.by_login || isMasterU);

      </div>
      <div style="white-space:pre-wrap;font-size:13px;margin-top:2px">${esc(c.body||"")}</div>
      ${!isChild?`<button class="btn btn-ghost btn-sm" data-rqc-reply="${c.id}" style="margin-top:4px;font-size:11px;padding:2px 8px">↳ 답글</button>
        <div id="rqc-replybox-${c.id}" style="display:none;margin-top:6px;margin-left:20px">

          <button class="btn btn-primary btn-sm" data-rqc-replysend="${c.id}" style="margin-top:4px">등록</button>
        </div>`:""}
    </div>`;
  };
  const cmtRows = parents.length ? parents.map(c=>cmtBlock(c,false)+childrenOf(c.id).map(ch=>cmtBlock(ch,true)).join("")).join("") : `<div class="muted" style="padding:8px 0">아직 답글이 없습니다.</div>`;

  return `<div class="wrap-inner">
    <button class="btn btn-ghost btn-sm" id="rq-back" style="margin-bottom:10px">← 목록</button>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">

      <div class="muted" style="font-size:12px;margin:4px 0 8px">${esc(r.doc_no||"")} · 요청자 ${esc(r.by_name||"")} (${esc(r.by_role||"")}) · 요청일 ${fmtDate(r.created_at)}</div>

      ${addendaHtml}
      ${addendaBox}
      ${statusSel}

      ${voidHistoryHtml(r)}
    </div>
    <div class="card" style="margin-top:12px">
      <div style="font-weight:700;margin-bottom:8px">답글 ${cmts.length}</div>

function wireMaterialSection(){
  const sec=document.getElementById("section-material"); if(!sec) return;
  const u=currentUser();
  const rebuild=()=>{ buildSection("material"); showTop("material"); };
  const refresh=async()=>{ await loadAllFromSupabase(); rebuild(); };
  wirePager(sec, rebuild);
  wireFilterBar2(sec, "material", "mt-search", ()=>{ _pgState["material"]=1; rebuild(); }, (v)=>{ _mtVoidFilter=v; });
  sec.querySelectorAll("[data-mt-open]").forEach(tr=>tr.onclick=()=>{ _mtOpenId=Number(tr.dataset.mtOpen); _mtMode="view"; rebuild(); });

  // 수정 진입
  const edit=sec.querySelector("#mt-edit");

  };
  // 작성 중 입력 보존
  const keepMt=()=>{ const t=sec.querySelector("#mt-title"), b=sec.querySelector("#mt-body"); if(t) _mtDraft.title=t.value; if(b) _mtDraft.body=b.value; };
  // 첨부 추가/삭제 (작성 중)
  const aadd=sec.querySelector("#mt-att-add");
  if(aadd) aadd.onclick=()=>{
    keepMt();
    const name=sec.querySelector("#mt-att-name").value.trim();
    const url=sec.querySelector("#mt-att-url").value.trim();
    if(!name){ toast("파일명을 입력하세요"); return; }
    _mtAtts.push({ name, url }); rebuild();
  };
  sec.querySelectorAll("[data-mt-attrm]").forEach(b=>b.onclick=()=>{ keepMt(); _mtAtts.splice(+b.dataset.mtAttrm,1); rebuild(); });
  const submit=sec.querySelector("#mt-submit");
  if(submit) submit.onclick=async()=>{
    const title=sec.querySelector("#mt-title").value.trim();
    const body=sec.querySelector("#mt-body").value.trim();

    submit.disabled=true; submit.textContent=_mtEditId?"저장 중…":"등록 중…";
    let error;
    if(_mtEditId){
      const prev=(_cache.materials||[]).find(x=>x.id===_mtEditId)||{};
      const changes=[];
      if((prev.title||"")!==title) changes.push(`제목: "${(prev.title||"").slice(0,20)}" → "${title.slice(0,20)}"`);
      if((prev.body||"")!==body){
        const pl=(prev.body||"").length, nl=body.length;
        changes.push(`내용 변경 (${pl}자→${nl}자)`);
      }
      const prevAtt=(prev.attachments||[]).map(a=>a.name), newAtt=_mtAtts.map(a=>a.name);
      const added=newAtt.filter(n=>!prevAtt.includes(n));
      const removed=prevAtt.filter(n=>!newAtt.includes(n));
      if(added.length) changes.push(`첨부 추가: ${added.join(", ")}`);
      if(removed.length) changes.push(`첨부 삭제: ${removed.join(", ")}`);
      const hist=(prev.edit_history||[]).concat([{ by:u.name, role:u.role, at:nowStamp(), changes: changes.length?changes.join(" / "):"변경 없음" }]);
      ({ error } = await sb.from("materials").update({ title, body, attachments:_mtAtts, edit_history:hist }).eq("id",_mtEditId));

    const wasEdit=_mtEditId;

    await refresh(); toast(wasEdit?"자료가 수정되었습니다":"자료가 등록되었습니다");
  };
  voidActions("materials", _cache.materials, sec, async()=>{ _mtMode="list"; _mtOpenId=null; await refresh(); });
}

// 현재 어느 단계에서 대기 중인지 텍스트
function gdPendingText(d){
  if(d.status==="완료") return "결재 완료";
  if(d.status==="반려"){
    const r=(d.approvers||[]).find(a=>a.result==="반려");
    return r?`반려됨 (${r.name})`:"반려됨";
  }
  const aps=d.approvers||[]; const cur=aps[(d.cur_step||1)-1];
  if(!cur) return "-";
  const label = (d.cur_step>=aps.length)?"최종 승인 대기":`${d.cur_step}차 승인 대기`;
  return `${label} — ${cur.name}`;
}
function gdStatusChip(s){
  const m={ "상신":["#eef1f6","#52607a"], "진행":["#fff4e0","#b26a00"], "완료":["#e6f4ea","#2e7d32"], "반려":["#fdecea","#c0392b"] };

function wireGenDraftSection(){
  const sec=document.getElementById("section-gendraft"); if(!sec) return;
  const u=currentUser();
  const rebuild=()=>{ buildSection("gendraft"); showTop("gendraft"); };
  const refresh=async()=>{ await loadAllFromSupabase(); rebuild(); };

  wirePager(sec, rebuild);
  // 코멘트 등록
  const gcadd=sec.querySelector("#gdc-add");
  if(gcadd) gcadd.onclick=async()=>{
    const body=sec.querySelector("#gdc-body").value.trim();
    if(!body){ toast("코멘트를 입력하세요"); return; }
    gcadd.disabled=true; gcadd.textContent="등록 중…";
    const { error }=await sb.from("comments").insert([{ board:"gendraft", ref_id:_gdOpenId, post_id:null, body, by_name:u.name, by_role:u.role, by_login:u.login_id }]);
    gcadd.disabled=false; gcadd.textContent="코멘트 등록";
    if(error){ console.error(error); toast("등록 실패"); return; }
    await refresh();
  };
  sec.querySelectorAll("[data-gdc-del]").forEach(b=>b.onclick=async()=>{
    const { error }=await sb.from("comments").delete().eq("id",Number(b.dataset.gdcDel));
    if(error){ console.error(error); toast("삭제 실패"); return; }
    await refresh();
  });
  sec.querySelectorAll("[data-voidf]").forEach(b=>b.onclick=()=>{ _gdVoidFilter=b.dataset.voidf.split("|")[1]; _pgState["gendraft"]=1; rebuild(); });
  wireFilterBar2(sec, "gendraft", "gd-search", ()=>{ _pgState["gendraft"]=1; rebuild(); }, (v)=>{ _gdVoidFilter=v; });
  sec.querySelectorAll("[data-gd-sub]").forEach(b=>b.onclick=()=>{ _gdSub=b.dataset.gdSub; rebuild(); });
  // 집행 상태필터
  const gdfs=sec.querySelector("#gd-filter-sel"); if(gdfs) gdfs.onchange=()=>{ _gdFilter=gdfs.value; rebuild(); };

  // 목록 → 새 기안
  const w=sec.querySelector("#gd-write");
  if(w) w.onclick=()=>{ _gdMode="write"; _gdApprovers=[]; _gdReferees=[]; rebuild(); };
  const cancel=sec.querySelector("#gd-cancel");
  if(cancel) cancel.onclick=()=>{ _gdMode="list"; rebuild(); };
  const back=sec.querySelector("#gd-back");
  if(back) back.onclick=()=>{ _gdMode="list"; _gdOpenId=null; rebuild(); };

  // 목록 행 클릭
  sec.querySelectorAll("[data-gd-open]").forEach(tr=>tr.onclick=()=>{ _gdOpenId=Number(tr.dataset.gdOpen); _gdMode="view"; rebuild(); });

  // 승인자 추가/이동/삭제
  const apAdd=sec.querySelector("#gd-ap-add");
  if(apAdd) apAdd.onclick=()=>{
    const login=sec.querySelector("#gd-ap-sel").value;
    const a=(_cache.accounts||[]).find(x=>x.login_id===login);
    if(!a) return;
    if(_gdApprovers.some(x=>x.login===login)){ toast("이미 추가된 승인자입니다"); return; }
    _gdApprovers.push({ login:a.login_id, name:a.name, role:a.role });
    rebuild();
  };
  sec.querySelectorAll("[data-gd-apup]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.gdApup; if(i>0){ [_gdApprovers[i-1],_gdApprovers[i]]=[_gdApprovers[i],_gdApprovers[i-1]]; rebuild(); } });
  sec.querySelectorAll("[data-gd-apdn]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.gdApdn; if(i<_gdApprovers.length-1){ [_gdApprovers[i+1],_gdApprovers[i]]=[_gdApprovers[i],_gdApprovers[i+1]]; rebuild(); } });
  sec.querySelectorAll("[data-gd-aprm]").forEach(b=>b.onclick=()=>{ _gdApprovers.splice(+b.dataset.gdAprm,1); rebuild(); });

  // 참조자 추가/삭제
  const rfAdd=sec.querySelector("#gd-rf-add");
  if(rfAdd) rfAdd.onclick=()=>{
    const login=sec.querySelector("#gd-rf-sel").value;
    const a=(_cache.accounts||[]).find(x=>x.login_id===login);
    if(!a) return;
    if(_gdReferees.some(x=>x.login===login)){ toast("이미 추가된 참조자입니다"); return; }
    _gdReferees.push({ login:a.login_id, name:a.name, role:a.role });
    rebuild();
  };
  sec.querySelectorAll("[data-gd-rfrm]").forEach(b=>b.onclick=()=>{ _gdReferees.splice(+b.dataset.gdRfrm,1); rebuild(); });

  // 상신
  const submit=sec.querySelector("#gd-submit");
  if(submit) submit.onclick=async()=>{
    const title=sec.querySelector("#gd-title").value.trim();
    const body=sec.querySelector("#gd-body").value.trim();
    if(!title){ toast("제목을 입력하세요"); return; }
    if(!_gdApprovers.length){ toast("승인자를 1명 이상 지정하세요"); return; }
    const yr=new Date().getFullYear();
    const cnt=(_cache.genDrafts||[]).filter(d=>(d.doc_no||"").indexOf(`일반기안-${yr}-`)===0).length;
    const doc_no=`일반기안-${yr}-${String(cnt+1).padStart(4,"0")}`;
    const approvers=_gdApprovers.map((a,i)=>({ ...a, order:i+1, result:null, at:null }));
    submit.disabled=true; submit.textContent="상신 중…";
    const { error }=await sb.from("gen_drafts").insert([{
      doc_no, title, body, approvers, referees:_gdReferees, cur_step:1, status:"상신",
      by_name:u.name, by_role:u.role, by_login:u.login_id
    }]);
    submit.disabled=false; submit.textContent="기안 상신";
    if(error){ console.error(error); toast("상신 실패"); return; }
    _gdMode="list"; await refresh(); toast("기안이 상신되었습니다");
  };

  // 승인 / 반려
  const apv=sec.querySelector("[data-gd-approve]");
  if(apv) apv.onclick=async()=>{
    const d=(_cache.genDrafts||[]).find(x=>x.id===Number(apv.dataset.gdApprove)); if(!d) return;
    const aps=d.approvers||[]; const idx=d.cur_step-1;
    if(!aps[idx] || aps[idx].login!==u.login_id){ toast("승인 권한이 없습니다"); return; }
    aps[idx].result="승인"; aps[idx].at=nowStamp();
    const isLast = d.cur_step>=aps.length;
    const upd={ approvers:aps, cur_step: isLast?d.cur_step:d.cur_step+1, status: isLast?"완료":"진행" };
    const { error }=await sb.from("gen_drafts").update(upd).eq("id",d.id);
    if(error){ console.error(error); toast("저장 실패"); return; }
    await refresh(); toast(isLast?"최종 승인 완료":"승인되었습니다 — 다음 결재자에게 전달");
  };
  const rej=sec.querySelector("[data-gd-reject]");
  if(rej) rej.onclick=async()=>{
    if(!confirm("이 기안을 반려할까요?")) return;
    const d=(_cache.genDrafts||[]).find(x=>x.id===Number(rej.dataset.gdReject)); if(!d) return;
    const aps=d.approvers||[]; const idx=d.cur_step-1;
    if(!aps[idx] || aps[idx].login!==u.login_id){ toast("반려 권한이 없습니다"); return; }
    aps[idx].result="반려"; aps[idx].at=nowStamp();
    const { error }=await sb.from("gen_drafts").update({ approvers:aps, status:"반려" }).eq("id",d.id);
    if(error){ console.error(error); toast("저장 실패"); return; }
    await refresh(); toast("반려되었습니다");
  };

  // 폐기 (삭제 대체)
  voidActions("gen_drafts", _cache.genDrafts, sec, async()=>{ _gdMode="list"; _gdOpenId=null; await refresh(); });
}

/* =========================================================
   통합 결재함 (inbox) — 재무문서 + 일반기안
========================================================= */
let _inboxTab = "pending";
let _inboxKind = "all";    // all|pr|draft|order|settle|urgent|gd|notice|request|material
let _inboxStatus = "all";  // all | (각 상태)
const FIN_MODULE_KEYS = ["pr","draft","order","settle","urgent"];
function finIDecided(mkey, d, u){
  if(!d || !u) return false;
  const nameHit=(arr)=> (arr||[]).some(x=>x && (x.by===u.name));
  if(mkey==="pr"){ if(d.approval && d.approval.by===u.name) return true; if(nameHit(d.references)) return true; }
  if(mkey==="draft"){ const s=(typeof draftSeq==="function")?draftSeq(d):{}; if(s.fin&&s.fin.by===u.name) return true; if(s.chair&&s.chair.by===u.name) return true; if(nameHit(s.audits)) return true; }
  if(mkey==="order"){ if(d.approval&&d.approval.by===u.name) return true; if(nameHit(d.comments)) return true; }
  if(mkey==="settle"||mkey==="urgent"){ const s=(typeof settleSeq==="function")?settleSeq(d):{}; if(s.fin&&s.fin.by===u.name) return true; if(s.chair&&s.chair.by===u.name) return true; if(s.otp&&s.otp.by===u.name) return true; if(nameHit(s.audits)) return true; }
  return false;
}
function gdMyApproval(d, u){ return (d.approvers||[]).find(a=>a.login===u.login_id) || null; }
function gdMyTurn(d, u){
  if(!d || d.void_status==="void") return false;
  if(d.status!=="상신" && d.status!=="진행") return false;
  const cur=(d.approvers||[])[(d.cur_step||1)-1];
  return cur && cur.login===u.login_id;
}
function finStageText(mkey, d){
  try{
    if(mkey==="pr"){
      if(d.status==="승인") return "승인 완료";
      if(d.status==="반려") return "반려";
      return "재무 승인 대기";
    }
    if(mkey==="draft" && typeof draftStage==="function"){
      const st=draftStage(d);
      return {"상신":"재무 승인 대기","위원장대기":"위원장 승인 대기","위원장승인":"최종 승인 완료","반려":"반려"}[st]||st;
    }
    if(mkey==="order"){
      if(d.status==="반려") return "반려";
      if(!d.received) return "입고 확인 대기";
      if(!d.approval) return "재무 승인 대기";
      return "승인 완료";
    }
    if((mkey==="settle"||mkey==="urgent") && typeof settleStage==="function"){
      const st=settleStage(d);
      return {"상신":"재무 승인 대기","위원장대기":"위원장 승인 대기","OTP대기":"재무분과장 최종승인 대기","확정":"최종 확정","반려":"반려"}[st]||st;
    }
  }catch(e){}
  return d.status||"";
}
function collectInbox(mode, u){
  const out=[];
  FIN_MODULE_KEYS.forEach(mkey=>{
    (loadRecsByKey(mkey)||[]).forEach(d=>{
      if(d.status==="폐기") return;
      const base={ kind:"fin", mkey, no:d.draft_no, title:d.title||"(제목 없음)", by:d.drafter||"", stage:finStageText(mkey,d), status:d.status, when:d.created_at||"" };
      if(mode==="pending"){ if(isMyTurn(mkey,d,u)) out.push(base); }
      else if(mode==="done"){ if(finIDecided(mkey,d,u)) out.push(base); }
      else if(mode==="mine"){ if(isOwnDocByName(d,u)) out.push(base); }
    });
  });
  (_cache.genDrafts||[]).forEach(d=>{
    if(d.void_status==="void") return;
    if(mode==="pending"){ if(gdMyTurn(d,u)) out.push({ kind:"gd", id:d.id, no:d.doc_no, title:d.title, by:d.by_name, stage:gdPendingText(d), status:d.status, when:d.created_at }); }
    else if(mode==="done"){ const ap=gdMyApproval(d,u); if(ap&&ap.result) out.push({ kind:"gd", id:d.id, no:d.doc_no, title:d.title, by:d.by_name, stage:`내 결재: ${ap.result}`, status:d.status, when:d.created_at }); }
    else if(mode==="mine"){ if(d.by_login===u.login_id) out.push({ kind:"gd", id:d.id, no:d.doc_no, title:d.title, by:d.by_name, stage:gdPendingText(d), status:d.status, when:d.created_at }); }
  });
  // 내가 올린 게시판 글 (공지·요청·자료) — '내가 올림'에만
  if(mode==="mine"){
    (_cache.notices||[]).forEach(n=>{ if(n.by_name===u.name && n.void_status!=="void") out.push({ kind:"notice", no:"공지", title:n.title, by:n.by_name, stage:"공지사항", status:"-", when:n.created_at }); });
    (_cache.requests||[]).forEach(r=>{ if(r.by_login===u.login_id && r.void_status!=="void") out.push({ kind:"request", no:r.doc_no, title:r.title, by:r.by_name, stage:`대상: ${TARGET_LABEL[r.target]||"기타"} · ${r.status}`, status:r.status, when:r.created_at }); });
    (_cache.materials||[]).forEach(m=>{ if(m.by_login===u.login_id && m.void_status!=="void") out.push({ kind:"material", no:"자료", title:m.title, by:m.by_name, stage:"중요자료", status:"-", when:m.created_at }); });
  }
  out.sort((a,b)=>String(b.when).localeCompare(String(a.when)));
  return out;
}

function wireInboxSection(){
  const sec=document.getElementById("section-inbox"); if(!sec) return;
  sec.querySelectorAll("[data-inbox-tab]").forEach(b=>b.onclick=()=>{ _inboxTab=b.dataset.inboxTab; buildSection("inbox"); showTop("inbox"); });
  const ik=sec.querySelector("#inbox-kind"); if(ik) ik.onchange=()=>{ _inboxKind=ik.value; buildSection("inbox"); showTop("inbox"); };
  const ist=sec.querySelector("#inbox-status"); if(ist) ist.onchange=()=>{ _inboxStatus=ist.value; buildSection("inbox"); showTop("inbox"); };
  const isr=sec.querySelector("#inbox-search"); if(isr) isr.oninput=()=>{ _listSearch["inbox"]=isr.value; const v=isr.value; buildSection("inbox"); showTop("inbox"); setTimeout(()=>{ const el=document.querySelector("#inbox-search"); if(el){ el.focus(); el.setSelectionRange(v.length,v.length); } },0); };
  const isc=sec.querySelector("#inbox-search-col"); if(isc) isc.onchange=()=>{ _searchCol["inbox"]=isc.value; buildSection("inbox"); showTop("inbox"); };
  sec.querySelectorAll("[data-inbox-go]").forEach(tr=>tr.onclick=()=>{
    const parts=tr.dataset.inboxGo.split("|");
    if(parts[0]==="gd"){
      _gdOpenId=Number(parts[1]); _gdMode="view"; _gdSub="list";
      showGroup("general"); showTop("gendraft");
    }else if(parts[0]==="notice"){
      _noticeWriting=false; showGroup("general"); showTop("notice");
    }else if(parts[0]==="request"){
      _rqOpenId=Number(parts[1]); _rqMode="view"; showGroup("general"); showTop("request");
    }else if(parts[0]==="material"){
      _mtOpenId=Number(parts[1]); _mtMode="view"; showGroup("general"); showTop("material");
    }else{
      const mkey=parts[1], no=parts[2]; const m=MODULES[mkey];
      showGroup("finance"); showTop(mkey);
      if(typeof openDetail==="function" && m) setTimeout(()=>openDetail(m,no), 50);
    }
  });
}

  if(top==="quote"){

    wireBudgetSection();

  }
  if(top==="settle"){
    if(!sec){
      sec=document.createElement("div");
      sec.id="section-settle";
      sec.innerHTML=settleSectionHtml();
      root.appendChild(sec);
      wireSettleSection();
    }
    return sec;
  }
  if(top==="exec"){
    if(!sec){
      sec=document.createElement("div");
      sec.id="section-exec";
      root.appendChild(sec);
    }
    sec.innerHTML=execSectionHtml();   // 매번 최신 현황 반영
    wireExecSection();
    return sec;
  }
  if(top==="urgent"){
    if(!sec){
      sec=document.createElement("div");
      sec.id="section-urgent";
      sec.innerHTML=urgentSectionHtml();
      root.appendChild(sec);
      wireUrgentSection();
    }
    return sec;
  }
  if(!sec){
    sec=document.createElement("div");
    sec.id=`section-${top}`;
    if(MODULES[top]){
      sec.innerHTML=sectionHtml(MODULES[top]);
    }else{
      const p=PLACEHOLDERS[top];
      sec.innerHTML=`<div class="card"><div class="placeholder"><div class="big">${p[0]}</div><div>${p[1]}</div></div></div>`;
    }

function showTop(top){
  // 비로그인 상태에서는 계정(로그인) 화면만 허용
  if(!currentUser() && top!=="account"){ top="account"; }
  // 이 탭이 속한 그룹도 함께 활성화 (다른 그룹 탭으로 점프 시 동기화)
  const btn=document.querySelector(`#topnav button[data-top="${top}"]`);
  if(btn && btn.dataset.grp && typeof showGroup==="function") showGroup(btn.dataset.grp);
  document.querySelectorAll("#topnav button").forEach(b=>b.classList.toggle("active", b.dataset.top===top));
  // 모든 섹션 숨기고 대상만 표시
  document.querySelectorAll("#root > div[id^='section-']").forEach(s=>s.style.display="none");
  const sec=buildSection(top);
  sec.style.display="block";
  // 목록 탭을 기본 활성화 (작성은 뒤 탭). 견적은 탭 없음
  if(top==="order") activateSub(MODULES.order,"list");
  else if(top==="settle") activateSub(MODULES.settle,"list");
  else if(top==="urgent") activateUrgentSub("list");
  else if(MODULES[top] && top!=="quote") activateSub(MODULES[top],"list");
}

function wireSection(m){
  // 하위 고정 탭
  document.querySelectorAll(`#tabbar-${m.key} > .tab`).forEach(t=>{
    t.onclick=()=>activateSub(m, t.dataset.sub);
  });
  // 품목 추가 / 제출 / 초기화
  const addBtn=document.querySelector(`[data-add="${m.key}"]`);
  if(addBtn) addBtn.onclick=()=>addItemRow(m);
  document.querySelector(`[data-submit="${m.key}"]`).onclick=()=>submitForm(m);
  document.querySelector(`[data-reset="${m.key}"]`).onclick=()=>resetForm(m);
  // 예산 계정 추가 버튼
  const budAdd=document.getElementById(`${m.key}-budget-add`);
  if(budAdd) budAdd.onclick=()=>addBudgetLine(m);
  // 검색/필터
  [`${m.key}-search`,`${m.key}-filter-col`,`${m.key}-filter-void`].forEach(id=>{
    const el=document.getElementById(id); if(el) el.addEventListener("input",()=>{ setPage(m.key,1); renderList(m); });
  });
  // 백업
  const expBtn=document.querySelector(`[data-export="${m.key}"]`); if(expBtn) expBtn.onclick=()=>exportData(m);
  const fileEl=document.getElementById(`${m.key}-import-file`);
  const impBtn=document.querySelector(`[data-import="${m.key}"]`); if(impBtn && fileEl) impBtn.onclick=()=>fileEl.click();
  if(fileEl) fileEl.onchange=(e)=>{ const f=e.target.files[0]; if(f) importData(m,f); e.target.value=""; };
  // 폐기/승인/반려/취소/코멘트/기안생성/기안이동 (이벤트 위임)
  document.getElementById(`section-${m.key}`).addEventListener("click",(e)=>{
    const v=e.target.closest("[data-void]");
    const dc=e.target.closest("[data-decide]");
    const ud=e.target.closest("[data-undo]");
    const cm=e.target.closest("[data-comment]");
    const md=e.target.closest("[data-make-draft]");
    const gd=e.target.closest("[data-goto-draft]");
    const ds=e.target.closest("[data-dseq]");
    const rc=e.target.closest("[data-refconfirm]");
    const em=e.target.closest("[data-emergency]");
    const dca=e.target.closest("[data-dcancel]");
    const dra=e.target.closest("[data-dresetall]");
    const qadd=e.target.closest("[data-q-add]");
    const qdel=e.target.closest("[data-q-del]");
    const qpick=e.target.closest("[data-q-pick]");
    const qunpick=e.target.closest("[data-q-unpick]");
    const qattadd=e.target.closest("[data-qatt-add]");
    const qattdel=e.target.closest("[data-qatt-del]");
    const aa=e.target.closest("[data-att-add]");
    const ad=e.target.closest("[data-att-del]");
    const ac=e.target.closest("[data-att-copy]");
    const op=e.target.closest("[data-open-pr]");
    const mo=e.target.closest("[data-make-order]");
    const oo=e.target.closest("[data-open-order]");
    const exp=e.target.closest("[data-expedite]");
    const expc=e.target.closest("[data-expedite-cancel]");
    if(v){ const [k,no]=v.dataset.void.split("|"); doVoid(MODULES[k],no); }
    else if(e.target.closest("[data-restore]")){ const [k,no]=e.target.closest("[data-restore]").dataset.restore.split("|"); doRestore(MODULES[k],no); }
    else if(e.target.closest("[data-void-reject]")){ const [k,no]=e.target.closest("[data-void-reject]").dataset.voidReject.split("|"); doRejectVoidRequest(MODULES[k],no); }
    else if(dc){ const [k,no,res]=dc.dataset.decide.split("|"); decideRequest(MODULES[k],no,res); }
    else if(ud){ const [k,no]=ud.dataset.undo.split("|"); undoDecision(MODULES[k],no); }
    else if(cm){ const [k,no]=cm.dataset.comment.split("|"); addComment(MODULES[k],no); }
    else if(md){ makeDraftFromPR(md.dataset.makeDraft); }
    else if(gd){ gotoDraftCompose(gd.dataset.gotoDraft); }
    else if(ds){ const [k,no,step,res]=ds.dataset.dseq.split("|"); draftSeqAction(MODULES[k],no,step,res); }
    else if(rc){ const [k,no]=rc.dataset.refconfirm.split("|"); confirmReference(MODULES[k],no); }
    else if(em){ const [k,no]=em.dataset.emergency.split("|"); draftEmergencyToggle(MODULES[k],no); }
    else if(dca){ const [k,no,step]=dca.dataset.dcancel.split("|"); draftSeqCancel(MODULES[k],no,step); }
    else if(dra){ const [k,no]=dra.dataset.dresetall.split("|"); draftSeqResetAll(MODULES[k],no); }
    else if(qadd){ addQuoteInline(qadd.dataset.qAdd); }
    else if(qdel){ const [dn,qn]=qdel.dataset.qDel.split("|"); delQuoteInline(dn,qn); }
    else if(qpick){ const [dn,qn]=qpick.dataset.qPick.split("|"); selectQuoteInline(dn,qn); }
    else if(qunpick){ unpickQuoteInline(qunpick.dataset.qUnpick); }
    else if(qattadd){ const [dn,qn]=qattadd.dataset.qattAdd.split("|"); addQuoteAtt(dn,qn); }
    else if(qattdel){ const [dn,qn,idx]=qattdel.dataset.qattDel.split("|"); delQuoteAtt(dn,qn,Number(idx)); }
    else if(aa){ const [k,no]=aa.dataset.attAdd.split("|"); addAttachment(MODULES[k],no); }
    else if(ad){ const [k,no,idx]=ad.dataset.attDel.split("|"); delAttachment(MODULES[k],no,Number(idx)); }
    else if(ac){ copyAttUrl(ac.dataset.attCopy); }
    else if(op){ const no=op.dataset.openPr; showTop("pr"); activateSub(MODULES.pr,"list"); openDetail(MODULES.pr,no); }
    else if(mo){ makeOrderFromDraft(mo.dataset.makeOrder); }
    else if(oo){ const no=oo.dataset.openOrder; showTop("order"); activateSub(MODULES.order,"list"); openDetail(MODULES.order,no); }
    else if(exp){ const [k,no]=exp.dataset.expedite.split("|"); expediteDoc(k,no); }
    else if(expc){ const [k,no]=expc.dataset.expediteCancel.split("|"); expediteCancel(k,no); }
  });
  // 초기 폼
  resetForm(m);
}

// 특정 탭이 속한 그룹을 반환
function groupOf(top){
  const btn=document.querySelector(`#topnav button[data-top="${top}"]`);
  return btn ? btn.dataset.grp : "finance";
}

/* ---------- 부팅 ---------- */
document.querySelectorAll("#topgroup button").forEach(b=>{
  b.onclick=()=>{
    showGroup(b.dataset.group);
    // 그 그룹의 첫 번째 보이는 탭으로 이동
    const first=document.querySelector(`#topnav button[data-grp="${b.dataset.group}"]`);
    if(first) { showTop(first.dataset.top); refreshFromSupabase(false); }
  };
});
document.querySelectorAll("#topnav button").forEach(b=>{
  b.onclick=()=>{
    if(b.dataset.top==="notice"){ _noticeWriting=false; _noticeOpenId=null; }
    if(b.dataset.top==="request"){ _rqMode="list"; _rqOpenId=null; _rqSub="list"; }
    if(b.dataset.top==="material"){ _mtMode="list"; _mtOpenId=null; _mtEditId=null; }
    if(b.dataset.top==="gendraft"){ _gdMode="list"; _gdOpenId=null; _gdSub="list"; }
    showTop(b.dataset.top); refreshFromSupabase(false);
  };
});
(async ()=>{
  await sbRestoreSession();
  renderAuthBar();
  updateNavBadge();
  const startTop = currentUser() ? "pr" : "account";
  showGroup(groupOf(startTop));
  showTop(startTop);
})();
</script>
</body>
</html>
