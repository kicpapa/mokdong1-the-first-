<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지출관리 · 목동1단지 정비사업위원회</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1a1f2b; --ink-soft:#52607a; --line:#dfe3ec; --line-soft:#eef1f6;
    --paper:#f7f8fb; --card:#ffffff; --brand:#1f4e79; --brand-soft:#eaf1f8;
    --ok:#1f7a4d; --ok-soft:#e7f3ec; --void:#a23b3b; --void-soft:#f6e9e9;
    --wait:#9a6b16; --wait-soft:#f6efdf;
    --shadow:0 1px 2px rgba(20,30,55,.06),0 8px 24px rgba(20,30,55,.06);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    font-size:14px; line-height:1.55;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:0 20px 80px}
  header.top{
    background:var(--brand); color:#fff; padding:18px 0 0; border-bottom:3px solid #163a5b;
  }
  header.top .wrap{padding-bottom:0}
  header.top .titlerow{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:14px}
  header.top h1{font-size:18px; margin:0; font-weight:700; letter-spacing:-.2px}
  header.top .sub{font-size:12.5px; opacity:.85}

  /* 상위 탭 (5개 메뉴) */
  .topgroup{display:flex; gap:6px; margin-bottom:2px;}
  .topgroup button{
    appearance:none; border:0; cursor:pointer; font-family:inherit; font-weight:700;
    font-size:13px; padding:7px 22px; color:#cdddec; background:rgba(255,255,255,.08);
    border-radius:8px 8px 0 0; letter-spacing:-.2px;
  }
  .topgroup button:hover{color:#fff; background:rgba(255,255,255,.16)}
  .topgroup button.active{color:#fff; background:rgba(255,255,255,.22)}
  .topnav{display:flex; gap:4px; flex-wrap:wrap}
  .topnav button{
    appearance:none; border:0; cursor:pointer; font-family:inherit; font-weight:700;
    font-size:14px; padding:11px 18px; color:#cdddec; background:transparent;
    border-radius:10px 10px 0 0; letter-spacing:-.2px;
  }
  .topnav button:hover{color:#fff; background:rgba(255,255,255,.08)}
  .topnav button.active{color:var(--brand); background:var(--paper)}

  .section-wrap{margin-top:26px}

  /* 하위 탭 */
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; border-bottom:1px solid var(--line)}
  .tab{
    appearance:none; border:0; background:none; cursor:pointer; padding:10px 16px;
    font-size:14px; color:var(--ink-soft); font-weight:600; border-bottom:2px solid transparent;
    margin-bottom:-1px; font-family:inherit;
  }
  .tab.active{color:var(--brand); border-bottom-color:var(--brand)}
  .tab-view{display:inline-flex; align-items:center; gap:8px; padding:10px 10px 10px 14px;
    max-width:280px; background:var(--brand-soft); border-radius:8px 8px 0 0;}
  .tab-view.active{box-shadow:0 -1px 0 var(--brand) inset; background:#fff}
  .tab-view .vt-label{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; max-width:230px}
  .tab-view .vt-x{display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px;
    border-radius:50%; font-size:14px; line-height:1; color:var(--ink-soft); flex:none}
  .tab-view .vt-x:hover{background:var(--void-soft); color:var(--void)}
  .panel{display:none}
  .panel.active{display:block}

  .card{background:var(--card); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow); padding:24px; margin-bottom:18px}
  .card h2{font-size:15px; margin:0 0 18px; font-weight:700; letter-spacing:-.2px}

  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin:0 0 6px}
  .req::after{content:" *"; color:var(--void)}
  input[type=text], input[type=password], input[type=number], input[type=date], textarea, select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    font-size:14px; font-family:inherit; color:var(--ink); background:#fff;
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--brand-soft); border-color:var(--brand)}
  textarea{resize:vertical; min-height:96px}
  textarea.mid{min-height:90px; line-height:1.6}
  textarea.big{min-height:160px; line-height:1.6}
  .budget-box{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:20px}
  .budget-title{font-size:13px; font-weight:700; color:var(--brand); margin-bottom:14px; letter-spacing:-.2px}
  .budget-result{font-size:13.5px; font-weight:600; padding:10px 14px; border-radius:8px; display:none}
  .budget-result.show{display:block}
  .budget-result.ok{background:var(--ok-soft); color:var(--ok)}
  .budget-result.over{background:var(--void-soft); color:var(--void)}
  .budget-result.none{background:#eef1f6; color:var(--ink-soft)}
  .budget-result .big-num{font-variant-numeric:tabular-nums}
  .budget-lines-head{display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr 32px; gap:8px; font-size:11px; font-weight:700; color:var(--ink-soft); padding:0 2px 4px}
  .budget-line{display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr 32px; gap:8px; align-items:center; margin-bottom:6px}
  .budget-line select, .budget-line input{padding:7px 8px; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:12.5px; width:100%}
  .budget-line .bl-budget, .budget-line .bl-spent{font-size:12px; color:var(--ink-soft); text-align:right}
  .budget-line .bl-del{justify-self:center}
  .settle-lines-head{display:grid; grid-template-columns:1.3fr 1fr 1fr 1fr 1fr 32px; gap:8px; font-size:11px; font-weight:700; color:var(--ink-soft); padding:0 2px 4px}
  .settle-line{display:grid; grid-template-columns:1.3fr 1fr 1fr 1fr 1fr 32px; gap:8px; align-items:center; margin-bottom:6px}
  .settle-line select, .settle-line input{padding:7px 8px; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:12.5px; width:100%}
  .settle-line .sl-budget, .settle-line .sl-spent{text-align:right}
  .settle-line .sl-del{justify-self:center}
  .acc-add{display:flex; gap:6px; flex-wrap:wrap}
  .acc-add input{flex:1; min-width:120px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:13px}
  table.mini-budget{width:100%; border-collapse:collapse; font-size:11.5px; margin-top:2px}
  table.mini-budget th, table.mini-budget td{border:1px solid var(--line); padding:3px 6px; text-align:left}
  table.mini-budget th{background:#f4f6fa; font-weight:700}
  .pager{display:flex; gap:4px; justify-content:center; align-items:center; margin-top:14px; flex-wrap:wrap}
  .pg-btn{min-width:32px; height:32px; padding:0 8px; border:1px solid var(--line); background:#fff; border-radius:7px; font-size:13px; cursor:pointer; color:var(--ink)}
  .pg-btn:hover:not(:disabled){background:#f1f3f7}
  .pg-btn.active{background:var(--brand); color:#fff; border-color:var(--brand); font-weight:700}
  .pg-btn:disabled{opacity:.4; cursor:not-allowed}
  .pg-dot{color:var(--ink-soft); padding:0 2px}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .field{margin-bottom:16px}

  .items-head, .item-row{display:grid; grid-template-columns:1fr 90px 1.2fr 34px; gap:10px; align-items:center}
  .items-head{font-size:12px; color:var(--ink-soft); font-weight:600; margin:4px 0 8px; padding:0 2px}
  .item-row{margin-bottom:8px}
  .item-row .del{
    border:1px solid var(--line); background:#fff; border-radius:8px; cursor:pointer;
    height:38px; color:var(--void); font-size:16px; line-height:1;
  }
  .item-row .del:hover{background:var(--void-soft)}

  .btn{appearance:none; border:0; cursor:pointer; font-family:inherit; font-weight:600; border-radius:8px; padding:10px 18px; font-size:14px;}
  .btn-primary{background:var(--brand); color:#fff}
  .btn-primary:hover{background:#163a5b}
  .btn-ghost{background:#fff; color:var(--ink); border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--line-soft)}
  .btn-sm{padding:6px 12px; font-size:12.5px}
  .actions{display:flex; gap:10px; margin-top:8px}
  .add-item{margin:6px 0 18px}

  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap}
  .toolbar input[type=text]{flex:1; min-width:180px}
  .toolbar select{width:auto}
  .spacer{flex:1}

  table{width:100%; border-collapse:collapse; font-size:13px}
  th,td{text-align:left; padding:11px 12px; border-bottom:1px solid var(--line-soft); vertical-align:top}
  th{font-size:11.5px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:.4px; background:var(--paper); position:sticky; top:0}
  tbody tr:hover{background:var(--brand-soft)}
  tbody tr.voided{color:#9aa3b4}
  tbody tr.voided td{background:#fbf7f7}
  .no{font-variant-numeric:tabular-nums; font-weight:700; color:var(--brand); white-space:nowrap}
  tr.voided .no{color:#b08}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap}
  .b-wait{background:var(--wait-soft); color:var(--wait)}
  .b-ok{background:var(--ok-soft); color:var(--ok)}
  .b-void{background:var(--void-soft); color:var(--void)}
  .linkbtn{background:none;border:0;color:var(--brand);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;padding:0;text-decoration:underline}
  .muted{color:var(--ink-soft); font-size:12px}
  .empty{text-align:center; color:var(--ink-soft); padding:48px 0}
  .placeholder{text-align:center; color:var(--ink-soft); padding:72px 20px}
  .placeholder .big{font-size:16px; font-weight:700; color:var(--ink); margin-bottom:8px}

  .kv{display:grid; grid-template-columns:96px 1fr; gap:6px 14px; margin:16px 0; font-size:13.5px}
  .kv dt{color:var(--ink-soft); font-weight:600}
  .kv dd{margin:0}
  .dno{color:var(--brand); font-weight:700; font-variant-numeric:tabular-nums}
  .detail-items{border:1px solid var(--line); border-radius:8px; overflow:hidden; margin:8px 0 4px}
  .detail-items table{font-size:12.5px}
  .modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:20px; flex-wrap:wrap}
  .hist{font-size:12px; color:var(--ink-soft); border-top:1px dashed var(--line); margin-top:14px; padding-top:10px}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:10px; font-size:13.5px; box-shadow:var(--shadow); opacity:0; transition:opacity .2s, transform .2s; pointer-events:none; z-index:80}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}
  .hint{font-size:12px; color:var(--ink-soft); margin-top:4px}

  /* 인증 바 */
  .auth-bar{font-size:12.5px; color:#cdddec; display:flex; align-items:center; gap:10px}
  .auth-bar b{color:#fff}
  .auth-bar .who{background:rgba(255,255,255,.14); padding:4px 10px; border-radius:999px; color:#fff; font-weight:600}
  .auth-bar button{appearance:none; border:1px solid rgba(255,255,255,.4); background:transparent; color:#fff;
    font-family:inherit; font-size:12px; font-weight:600; padding:4px 12px; border-radius:7px; cursor:pointer}
  .auth-bar button:hover{background:rgba(255,255,255,.15)}
  .auth-bar .more-item{display:block; width:100%; text-align:left; border:0; border-radius:0;
    color:var(--ink); background:#fff; padding:10px 14px; font-size:13px; font-weight:600}
  .auth-bar .more-item:hover{background:var(--line-soft)}
  #more-menu{ }

  /* 로그인/가입 카드 */
  .auth-box{max-width:420px; margin:30px auto}
  .auth-tabs{display:flex; gap:6px; margin-bottom:18px}
  .auth-tabs button{flex:1; appearance:none; border:1px solid var(--line); background:#fff; cursor:pointer;
    font-family:inherit; font-weight:600; padding:10px; border-radius:8px; color:var(--ink-soft)}
  .auth-tabs button.active{background:var(--brand); color:#fff; border-color:var(--brand)}

  /* 승인 박스 */
  .approve-box{border:1px solid var(--line); border-radius:10px; padding:18px; margin-top:16px; background:var(--paper)}
  .approve-box .ttl{font-size:13px; font-weight:700; color:var(--brand); margin-bottom:12px}
  .cmt{border-top:1px dashed var(--line); padding:10px 0; font-size:13px}
  .cmt:first-of-type{border-top:0}
  .cmt .meta{font-size:11.5px; color:var(--ink-soft); margin-bottom:2px}
  .cmt .role{font-weight:700; color:var(--ink)}
  .b-approve{background:var(--ok-soft); color:var(--ok)}
  .b-reject{background:var(--void-soft); color:var(--void)}
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px}
  .seg{display:inline-flex; gap:6px; flex-wrap:wrap; margin:6px 0}
  .acct-table td .pill{margin-right:4px}

  /* 요청 구매물품 풍선 */
  .goods-bubble{position:relative; background:var(--brand-soft); border:1px solid #cfe0ef;
    border-radius:14px; padding:16px 18px; margin:6px 0 18px; font-size:15px; font-weight:600;
    color:var(--ink); white-space:pre-wrap; line-height:1.5}
  .goods-bubble::before{content:"요청 구매물품"; position:absolute; top:-9px; left:14px;
    background:var(--brand); color:#fff; font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px}
  .goods-bubble[data-label]::before{content:attr(data-label)}
  .note-box{margin-top:6px; padding:12px 14px; border:1px solid var(--void); border-radius:10px;
    background:var(--void-soft); white-space:pre-wrap; font-size:13px; color:var(--void)}

  /* 첨부 */
  .att-box{margin-top:16px; padding:14px 16px; border:1px dashed var(--line); border-radius:10px; background:#fafbfd}
  .att-list{margin:8px 0}
  .att-item{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line-soft)}
  .att-ico{flex:none}
  .att-name{flex:1; font-size:13px; color:var(--brand); text-decoration:none; word-break:break-all}
  a.att-name:hover{text-decoration:underline}
  .att-del{appearance:none; border:none; background:none; color:var(--void); font-size:16px; cursor:pointer; padding:0 4px}
  .att-add{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
  .att-add input{flex:1; min-width:140px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:12.5px}
  .att-main{flex:1; min-width:0}
  .att-url-row{display:flex; align-items:center; gap:6px; margin-top:2px}
  .att-url{font-size:11px; color:var(--ink-soft); font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .att-copy{appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink-soft); font-family:inherit; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:6px; cursor:pointer; flex:none}
  .att-copy:hover{border-color:var(--brand); color:var(--brand)}
  .att-group{margin-bottom:10px}
  .att-group-head{font-size:11px; font-weight:700; color:var(--ink-soft); margin:8px 0 4px; letter-spacing:.3px}
  .att-name-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .att-src-chip{font-size:10px; font-weight:700; background:var(--brand-soft); color:var(--brand); padding:1px 7px; border-radius:999px; flex:none}
  .att-src{font-weight:600; color:var(--brand)}
  .quote-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin:8px 0}
  .quote-card{border:1px solid var(--line); border-radius:10px; padding:12px; background:#fff}
  .quote-card.sel{border-color:var(--ok); background:var(--ok-soft)}
  .qc-head{display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:4px}
  .qc-vendor{font-weight:700; font-size:14px}
  .qc-amount{font-size:15px; font-weight:700; color:var(--brand); margin:2px 0 6px}
  .qc-content{font-size:12px; color:var(--ink-soft); white-space:pre-wrap; max-height:80px; overflow:auto}
  .qc-note{font-size:11.5px; color:var(--void); margin-top:6px; white-space:pre-wrap}
  .qc-att{margin-top:6px; display:flex; flex-direction:column; gap:2px}
  .qc-att-link{font-size:11.5px; color:var(--brand); text-decoration:none; word-break:break-all}
  a.qc-att-link:hover{text-decoration:underline}
  .qc-att-item{display:flex; align-items:center; gap:4px}
  .qc-att-add{margin-top:6px}
  .qc-att-add summary{cursor:pointer; list-style:none; font-size:11.5px; font-weight:700; color:var(--brand)}
  .qc-att-add summary::-webkit-details-marker{display:none}
  .qc-att-add input{width:100%; margin-top:4px; padding:5px 8px; border:1px solid var(--line); border-radius:6px; font-size:11.5px; font-family:inherit}
  .suspend-banner{background:var(--void); color:#fff; font-weight:700; font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:14px}
  .suspend-banner span{font-weight:500; font-size:11.5px; opacity:.9}
  .expedite-badge{background:var(--wait-soft); border:1px solid var(--wait); color:var(--wait); font-weight:700; font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:14px}
  .expedite-badge span{font-weight:500; font-size:11.5px; color:var(--ink-soft); display:block; margin-top:2px}
  .expedite-wrap{margin-bottom:12px}
  .expedite-wrap summary{cursor:pointer; list-style:none; display:inline-block; font-size:12px; font-weight:700; color:var(--wait); background:var(--wait-soft); border:1px solid var(--wait); padding:5px 12px; border-radius:8px}
  .expedite-wrap summary::-webkit-details-marker{display:none}
  .expedite-form{margin-top:8px; padding:12px; border:1px solid var(--wait); border-radius:10px; background:#fffdf7}
  .expedite-form textarea{width:100%; margin-bottom:8px}
  .qc-actions{display:flex; align-items:center; gap:6px; margin-top:8px}
  .quote-add-wrap{margin-top:8px}
  .quote-add-wrap summary{cursor:pointer; list-style:none; margin-bottom:0}
  .quote-add-wrap summary::-webkit-details-marker{display:none}
  .quote-add-form{margin-top:10px; padding:12px; border:1px solid var(--line); border-radius:10px; background:#fff}
  .final-select{margin-top:12px; padding:14px; border:1px solid var(--brand); border-radius:10px; background:#fff}
  .final-select.sel{border-color:var(--ok)}
  .final-select .ttl{font-size:13px; font-weight:700; margin-bottom:4px}

  /* 결재 현황판 */
  .detail-head{display:flex; justify-content:space-between; align-items:flex-start; gap:18px; flex-wrap:wrap}
  .detail-head-left{flex:1; min-width:200px}
  .status-board{flex:none}
  .approval-grid{display:grid; grid-template-columns:repeat(2,minmax(96px,1fr)); gap:6px}
  .status-board .ap-cell{padding:7px 8px; border-radius:8px}
  .status-board .ap-cell .lab{font-size:10px; margin-bottom:3px}
  .status-board .ap-cell .mark{font-size:14px; margin-bottom:2px}
  .status-board .ap-cell .stat{font-size:11.5px}
  .status-board .ap-cell .by{font-size:9.5px; margin-top:1px}
  .ap-cell{border:1px solid var(--line); border-radius:10px; padding:12px; background:#fff; text-align:center}
  .ap-cell.done-approve{border-color:var(--ok); background:var(--ok-soft)}
  .ap-cell.done-reject{border-color:var(--void); background:var(--void-soft)}
  .ap-cell.done-ref{border-color:var(--brand); background:var(--brand-soft)}
  .ap-cell .lab{font-size:11px; color:var(--ink-soft); font-weight:700; letter-spacing:.3px; margin-bottom:6px}
  .ap-cell .stat{font-size:13.5px; font-weight:700}
  .ap-cell .stat.wait{color:var(--ink-soft); font-weight:600}
  .ap-cell .by{font-size:11px; color:var(--ink-soft); margin-top:3px}
  .ap-cell .mark{font-size:18px; line-height:1; margin-bottom:4px}

  /* 목록 현황 칩 */
  .chips{display:flex; gap:4px; flex-wrap:wrap}
  .chip{font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:999px; white-space:nowrap}
  .chip-ok{background:var(--ok-soft); color:var(--ok)}
  .chip-no{background:var(--void-soft); color:var(--void)}
  .chip-ref{background:var(--brand-soft); color:var(--brand)}
  .chip-wait{background:#eef1f6; color:var(--ink-soft)}

  /* 상단 네비 배지 */
  .nav-badge{display:inline-block; min-width:17px; height:17px; line-height:17px; padding:0 5px;
    margin-left:6px; background:var(--void); color:#fff; font-size:10.5px; font-weight:700;
    border-radius:999px; text-align:center; vertical-align:middle}

  /* My 받은함 */

function snapshotAll(){ const o={}; ALL_DATA_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v!==null) o[k]=v; }); return o; }
function restoreAll(obj){ ALL_DATA_KEYS.forEach(k=>localStorage.removeItem(k)); Object.keys(obj||{}).forEach(k=>{ if(ALL_DATA_KEYS.includes(k)) localStorage.setItem(k, obj[k]); }); }

async function sha256(text){
  const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

   메모리 캐시 + Supabase 동기화 계층

   - 문서는 docs 테이블에 (module, doc_no, title, status, data=JSON전체, version)
========================================================= */

// 저장 실패 알림
function _saveErr(e){ try{ console.error("Supabase 저장 오류:", e); toast("저장 중 오류가 발생했습니다 — 새로고침 후 다시 시도하세요"); }catch(_){} }

// 문서 1건 → docs 행으로
function _docToRow(mkey, rec){
  const {_persisted, ...clean}=rec;  // 내부 플래그는 저장 데이터에서 제외
  return { module:mkey, doc_no:rec.draft_no, title:rec.title||"", status:rec.status||"", data:clean, version: rec._version||1 };
}

// 로그인 후: Supabase에서 전체 적재
async function loadAllFromSupabase(){
  // 계정
  try{ const {data}=await sb.from("app_accounts").select("*"); _cache.accounts = (data||[]).map(a=>({
    name:a.name, login_id:a.login_id, role:a.role, status:a.status, birth:a.birth, auth_uid:a.auth_uid, created_at:a.created_at
  })); }catch(e){ console.error(e); }
  // 예산
  try{ const {data}=await sb.from("budgets").select("*"); _cache.budgets = (data||[]).map(b=>({
    code:b.code, name:b.name, budget:Number(b.budget||0), ...(b.data||{}), _version:b.version||1
  })); }catch(e){ console.error(e); }
  // 문서
  MODULE_KEYS.forEach(k=>_cache.docs[k]=[]);
  try{
    const {data}=await sb.from("docs").select("*").order("id",{ascending:true});
    (data||[]).forEach(r=>{
      const rec = r.data || {};
      rec.draft_no = r.doc_no; rec._version = r.version||1; rec._persisted = true;
      if(_cache.docs[r.module]) _cache.docs[r.module].push(rec);
    });
  }catch(e){ console.error(e); }
  // 이벤트
  try{ const {data}=await sb.from("events").select("*").order("id",{ascending:true}); _cache.events=(data||[]).map(e=>({
    id:"ev_"+e.id, db_id:e.id, mkey:e.module, no:e.doc_no, title:e.title, kind:e.kind, msg:e.msg, by:e.by_name, byRole:e.by_role, at:e.created_at
  })); }catch(e){ console.error(e); }
  // 읽은 이벤트 (본인 것)
  try{
    const u=_currentUser;
    if(u){ const {data}=await sb.from("read_events").select("*").eq("login_id",u.login_id);
      _cache.read[u.login_id]=(data||[]).map(r=>"ev_"+r.event_id); }
  }catch(e){ console.error(e); }
  // 공지사항
  try{ const {data}=await sb.from("notices").select("*").order("id",{ascending:false}); _cache.notices=data||[]; }catch(e){ console.error(e); }
  // 게시판 글
  try{ const {data}=await sb.from("posts").select("*").order("id",{ascending:false}); _cache.posts=data||[]; }catch(e){ console.error(e); }
  // 답글
  try{ const {data}=await sb.from("comments").select("*").order("id",{ascending:true}); _cache.comments=data||[]; }catch(e){ console.error(e); }
  // 자유 결재선 기안
  try{ const {data}=await sb.from("gen_drafts").select("*").order("id",{ascending:false}); _cache.genDrafts=data||[]; }catch(e){ console.error(e); }
  // 요청게시판
  try{ const {data}=await sb.from("requests").select("*").order("id",{ascending:false}); _cache.requests=data||[]; }catch(e){ console.error(e); }
  // 중요자료
  try{ const {data}=await sb.from("materials").select("*").order("id",{ascending:false}); _cache.materials=data||[]; }catch(e){ console.error(e); }
}

// 백그라운드 갱신: Supabase에서 다시 불러와 현재 화면 다시 그림
async function refreshFromSupabase(showToast){
  if(_refreshing || !currentUser()) return;
  _refreshing=true;
  const bar=document.getElementById("sync-state");
  if(bar) bar.textContent="동기화 중…";
  try{
    await loadAllFromSupabase();
    // 현재 활성 탭 다시 그림
    const active=document.querySelector("#topnav button.active");
    if(active) showTop(active.dataset.top);
    updateNavBadge();
    if(showToast) toast("최신 데이터로 갱신했습니다");
  }catch(e){ console.error(e); if(showToast) toast("갱신 중 오류가 발생했습니다"); }
  finally{
    _refreshing=false;
    const b2=document.getElementById("sync-state"); if(b2) b2.textContent="";
  }
}

// Supabase 로그인: 이메일/아이디 + 비번 → Auth 인증 후 app_accounts에서 역할 조회
async function sbLogin(idOrEmail, pw){
  const email=toAuthEmail(idOrEmail);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error) return { ok:false, msg:"아이디(이메일) 또는 비밀번호가 일치하지 않습니다" };
  const uid = data.user.id;
  // app_accounts에서 이 사람의 계정 정보 조회
  const { data: acc, error: e2 } = await sb.from("app_accounts").select("*").eq("auth_uid", uid).maybeSingle();
  if(e2 || !acc){ await sb.auth.signOut(); return { ok:false, msg:"계정 정보가 없습니다. 관리자에게 문의하세요" }; }
  if(acc.status!=="활성"){ await sb.auth.signOut(); return { ok:false, msg:"승인 대기 중인 계정입니다" }; }
  _currentUser = acc;
  await loadAllFromSupabase();   // 로그인 직후 전체 데이터 적재
  return { ok:true, user: acc };
}

// 본인 비밀번호 변경 (현재 비번 확인 후) — 마스터 제외
async function sbChangePassword(currentPw, newPw){
  const u=_currentUser;
  if(!u) return { ok:false, msg:"로그인이 필요합니다" };
  if(u.role==="HTML마스터") return { ok:false, msg:"마스터 비밀번호는 관리 콘솔에서 변경합니다" };
  // 현재 비번 확인: 현재 비번으로 재인증 시도
  const authEmail = u.login_id.includes("@") ? u.login_id : `${u.login_id}@${EMAIL_DOMAIN}`;
  const { error: e1 } = await sb.auth.signInWithPassword({ email: authEmail, password: currentPw });
  if(e1) return { ok:false, msg:"현재 비밀번호가 일치하지 않습니다" };
  // 새 비번으로 변경
  const { error: e2 } = await sb.auth.updateUser({ password: newPw });
  if(e2) return { ok:false, msg:"변경 실패: "+(e2.message||"비밀번호 규칙을 확인하세요(6자 이상)") };
  return { ok:true };
}

function readSetFor(loginId){ return new Set(_cache.read[loginId]||[]); }
function markRead(loginId, ids){
  const cur=new Set(_cache.read[loginId]||[]);
  const newIds=[];
  ids.forEach(i=>{ if(!cur.has(i)){ cur.add(i); newIds.push(i); } });
  _cache.read[loginId]=[...cur];
  // Supabase 전송 (ev_<dbid> 형태에서 숫자 추출)
  const rows=newIds.map(i=>{ const m=String(i).match(/ev_(\d+)$/); return m?{login_id:loginId, event_id:Number(m[1])}:null; }).filter(Boolean);
  if(rows.length){ sb.from("read_events").upsert(rows,{onConflict:"login_id,event_id"}).then(({error})=>{ if(error) console.error(error); }); }
}
// 이 사용자가 받아야 할 이벤트인가? — "내 차례" + 취소/긴급진행만
function eventVisibleTo(ev, u){
  if(!u) return false;
  if(ev.byRole===u.role && ev.by===u.name) return false; // 내가 한 활동 제외
  const rec=(loadRecsByKey(ev.mkey)||[]).find(x=>x.draft_no===ev.no);
  // 취소·긴급진행·반려는 관련자에게 항상 알림
  const alertKinds=["취소","긴급","긴급진행","반려","폐기"];
  if(alertKinds.includes(ev.kind)){
    // 본인 작성건이거나 결재/참조 권한자면 받음
    if(rec && isMineByChain(rec, u)) return true;
    if(isApprover(u)||isReferee(u)) return true;
    return false;
  }
  // 사무직원: 승인권자가 아니므로, 본인 관련 문서의 "진행(다음 단계 가능)·차질" 시점을 알림
  if(u.role==="사무직원"){
    if(!(rec && isMineByChain(rec, u))) return false;
    // 진행 마일스톤이 되는 결정적 이벤트 kind만 (승인/결재/입고/확정)
    const milestoneKinds=["승인","결재","입고","확정"];
    if(!milestoneKinds.includes(ev.kind)) return false;
    return clerkMilestone(ev.mkey, rec);
  }
  // 그 외에는 "지금 내 차례"인 것만
  return isMyTurn(ev.mkey, rec, u);
}

// 내가 작성했거나(작성자) 내가 이어받은 체인(구매요청→기안→발주→지결)에 속한 문서인가
function isMineByChain(rec, u){
  if(!rec) return false;
  if(isOwnDocByName(rec, u)) return true;
  // 체인 거슬러 올라가며 작성자 확인
  try{
    if(rec.from_draft){ const dr=loadRecs(MODULES.draft).find(x=>x.draft_no===rec.from_draft); if(dr&&isOwnDocByName(dr,u)) return true; }
    if(rec.from_order){ const o=loadRecs(MODULES.order).find(x=>x.draft_no===rec.from_order); if(o&&isOwnDocByName(o,u)) return true; }
    if(rec.from_pr){ const pr=loadRecs(MODULES.pr).find(x=>x.draft_no===rec.from_pr); if(pr&&isOwnDocByName(pr,u)) return true; }
  }catch(e){}
  return false;
}

// 사무직원이 인지해야 하는 마일스톤(다음 단계 가능) 시점인가
function clerkMilestone(mkey, d){
  if(!d || d.status==="폐기") return false;
  if(mkey==="pr")    return d.status==="승인";                 // 구매요청 승인 → 기안 가능
  if(mkey==="draft") return (typeof draftStage==="function") ? (draftStage(d)==="위원장승인"||d.status==="승인") : d.status==="승인"; // 기안 최종승인 → 발주 가능
  if(mkey==="order") return d.received && d.approval && d.approval.result==="승인"; // 발주 입고+재무승인 → 지결 가능
  if(mkey==="settle")return settleStage(d)==="확정";           // 지결 확정
  return false;
}

// 문서가 지금 이 사용자의 액션을 기다리는가?
function isMyTurn(mkey, d, u){
  if(!d || !u) return false;
  if(d.status==="폐기") return false;
  if(mkey==="pr"){
    // 구매요청: 재무 승인 대기 → 재무과 차례 / 감사·위원장 참조 차례
    if(d.status==="상신"||d.status==="대기"||!d.approval){
      if(isApprover(u) && !isOwnDocByName(d,u)) return true;
    }
    if((d.status==="승인") && isReferee(u) && !(d.references||[]).some(r=>r.by===u.name)) return true;
    return false;
  }
  if(mkey==="draft"){
    const st=draftStage(d);
    const s=draftSeq(d);
    if(st==="상신" && DRAFT_FIN_ROLES.includes(u.role) && !isOwnDocByName(d,u)) return true;       // 재무 차례
    // 감사: 재무 승인 후 위원장 최종 전까지 언제든(후순위·선택)
    if(s.fin && s.fin.result==="승인" && !s.chair && !d.emergency && DRAFT_AUDIT_ROLES.includes(u.role) && !s.audits.some(a=>a.by===u.name)) return true;
    if(st==="위원장대기" && u.role===DRAFT_CHAIR_ROLE && !isOwnDocByName(d,u)) return true;          // 위원장 차례
    return false;
  }
  if(mkey==="order"){
    if(d.received && !d.approval && ORDER_APPROVER_ROLES.includes(u.role) && !isOwnDocByName(d,u)) return true; // 입고후 재무 차례
    if(d.approval && d.approval.result==="승인" && isReferee(u) && !(d.comments||[]).some(c=>c.by===u.name)) return true; // 참조 차례
    return false;
  }
  if(mkey==="settle"){
    if(!d.amount) return false; // 작성 미완
    const st=settleStage(d);
    const s=settleSeq(d);
    if(st==="상신" && SETTLE_FIN_ROLES.includes(u.role) && !isOwnDocByName(d,u)) return true;        // 재무 차례
    // 감사: 재무 승인 후 확정 전까지 언제든 (후순위·선택)
    if(s.fin && !s.otp && SETTLE_AUDIT_ROLES.includes(u.role) && !s.audits.some(a=>a.by===u.name)) return true;
    if(st==="위원장대기" && u.role===SETTLE_CHAIR_ROLE && !isOwnDocByName(d,u)) return true;          // 위원장 차례(감사 무관)
    if(st==="OTP대기" && u.role===SETTLE_OTP_ROLE) return true;                                       // 재무분과장 OTP
    return false;
  }
  return false;
}
function isOwnDocByName(d,u){ return d && ((d.drafter_id && d.drafter_id===u.login_id) || (d.drafter && d.drafter.includes(u.name))); }
function loadRecsByKey(mkey){ const m=MODULES[mkey]; return m?loadRecs(m):[]; }
function unreadCountFor(u){
  if(!u) return 0;
  const read=readSetFor(u.login_id);
  return loadEvents().filter(ev=>eventVisibleTo(ev,u) && !read.has(ev.id)).length;
}

/* ---------- 저장소 (메모리 캐시 + Supabase) ---------- */
function loadRecs(m){ return _cache.docs[m.key] || (_cache.docs[m.key]=[]); }
function saveRecs(m,d){
  _cache.docs[m.key] = d;
  d.forEach(rec=>{
    rec._version = (rec._version||1);
    const row=_docToRow(m.key, rec);
    if(rec._persisted){
      // 기존 문서 → UPDATE (insert 정책 안 거침)
      sb.from("docs").update({ title:row.title, status:row.status, data:row.data, version:row.version })
        .eq("module",m.key).eq("doc_no",rec.draft_no)
        .then(({error})=>{ if(error) _saveErr(error); });
    }else{
      // 신규 문서 → INSERT
      sb.from("docs").insert([row]).then(({error})=>{ if(error){ _saveErr(error); } else { rec._persisted=true; } });
    }
  });
}
// 문서 1건 저장
function saveDoc(m, rec){
  const list=loadRecs(m);
  const i=list.findIndex(x=>x.draft_no===rec.draft_no);
  if(i>=0) list[i]=rec; else list.push(rec);
  rec._version=(rec._version||1)+1;
  const row=_docToRow(m.key,rec);
  if(rec._persisted){
    sb.from("docs").update({ title:row.title, status:row.status, data:row.data, version:row.version })
      .eq("module",m.key).eq("doc_no",rec.draft_no).then(({error})=>{ if(error) _saveErr(error); });
  }else{
    sb.from("docs").insert([row]).then(({error})=>{ if(error){ _saveErr(error); } else { rec._persisted=true; } });
  }
}
function deleteDoc(m, doc_no){
  _cache.docs[m.key] = loadRecs(m).filter(x=>x.draft_no!==doc_no);
  sb.from("docs").delete().eq("module",m.key).eq("doc_no",doc_no).then(({error})=>{ if(error) _saveErr(error); });
}
// 채번: 캐시의 기존 문서에서 올해 최대 일련번호 +1
function nextNo(m){
  const year=new Date().getFullYear();
  const prefix=`${m.prefix}-${year}-`;
  let max=0;
  loadRecs(m).forEach(r=>{
    if(r.draft_no && r.draft_no.indexOf(prefix)===0){
      const tail=r.draft_no.slice(prefix.length).split("-")[0]; // 하위번호(-O1 등) 앞부분
      const n=parseInt(tail,10); if(!isNaN(n)&&n>max) max=n;
    }
  });
  return `${prefix}${String(max+1).padStart(4,"0")}`;
}

  return nextNo(MODULES.draft);
}

function budgetLineRowHtml(m, idx, line){
  const budgets=loadBudgets();
  const opts=`<option value="">계정 선택</option>`+budgets.map(b=>`<option value="${esc(b.code)}" ${line&&line.code===b.code?"selected":""}>${esc(b.name)} (${esc(b.code)})</option>`).join("");
  const sel = line&&line.code?budgets.find(b=>b.code===line.code):null;
  const budget = sel?sel.budget:0;
  const spent = sel?accountSpent(sel.code):0;
  return `<div class="budget-line" data-idx="${idx}">
    <select class="bl-account" data-m="${m.key}">${opts}</select>
    <span class="bl-budget" style="font-variant-numeric:tabular-nums">${sel?won(budget):"-"}</span>
    <span class="bl-spent" style="font-variant-numeric:tabular-nums">${sel?won(spent):"-"}</span>
    <input type="text" class="bl-amount" inputmode="numeric" value="${line&&line.amount?fmt(line.amount):""}" placeholder="지출예정액">
    <button type="button" class="att-del bl-del" title="삭제">×</button>
  </div>`;
}
function addBudgetLine(m, line){
  const wrap=document.getElementById(`${m.key}-budget-lines`); if(!wrap) return;
  const idx=wrap.children.length;
  wrap.insertAdjacentHTML("beforeend", budgetLineRowHtml(m, idx, line||null));
  const row=wrap.lastElementChild;
  row.querySelector(".bl-account").addEventListener("change",()=>{ refreshBudgetLine(m,row); updateBudget(m); });
  const amt=row.querySelector(".bl-amount");
  amt.addEventListener("input",()=>{ const r=onlyNum(amt.value); amt.value=r?fmt(r):""; updateBudget(m); });
  row.querySelector(".bl-del").addEventListener("click",()=>{ row.remove(); updateBudget(m); });
}
function refreshBudgetLine(m,row){
  const code=row.querySelector(".bl-account").value;
  const sel=code?loadBudgets().find(b=>b.code===code):null;
  row.querySelector(".bl-budget").textContent = sel?won(sel.budget):"-";
  row.querySelector(".bl-spent").textContent = sel?won(accountSpent(sel.code)):"-";
}
function collectBudgetLines(m){
  const wrap=document.getElementById(`${m.key}-budget-lines`); if(!wrap) return [];
  return [...wrap.querySelectorAll(".budget-line")].map(row=>{
    const code=row.querySelector(".bl-account").value;
    const sel=code?loadBudgets().find(b=>b.code===code):null;
    const amount=Number(onlyNum(row.querySelector(".bl-amount").value));
    return code?{code, name:sel?sel.name:"", budget:sel?sel.budget:0, spent:sel?accountSpent(sel.code):0, amount}:null;
  }).filter(Boolean);
}

function updateBudget(m){
  const box=document.getElementById(`${m.key}-budget-result`);
  if(!box) return;
  const lines=collectBudgetLines(m);
  const totalAmt=lines.reduce((s,l)=>s+l.amount,0);
  box.className="budget-result show";
  if(!lines.length || !totalAmt){ box.className="budget-result"; return; }
  // 계정별 초과 검사 (배정예산 - 누적지출 - 지출예정액)
  let over=[];
  lines.forEach(l=>{ const remain=(l.budget||0)-(l.spent||0)-l.amount; if(l.budget && remain<0) over.push(`${l.name} 초과 ${fmt(-remain)}원`); });
  if(over.length){
    box.classList.add("over");
    box.innerHTML=`⚠ 예산 초과 · 합계 예정액 <span class="big-num">${fmt(totalAmt)}원</span> · ${over.join(" / ")}`;
  }else{
    box.classList.add("ok");
    box.innerHTML=`예산 내 · 합계 예정액 <span class="big-num">${fmt(totalAmt)}원</span> (${lines.length}개 계정)`;
  }
}

function submitForm(m){
  const cu=currentUser();
  if(!cu){ toast("로그인 후 작성할 수 있습니다"); return; }
  if(m.simple){
    // 구매요청: 마스터·위원(읽기전용) 제외, 사무직원·재무과만 작성
    if(isMaster(cu)){ toast("마스터 계정은 작성할 수 없습니다"); return; }
    if(cu.role==="위원"){ toast("위원은 열람 전용입니다 (작성 불가)"); return; }
    const title=val(`${m.key}-title`).trim();
    const requester=val(`${m.key}-drafter`).trim();
    const detail=val(`${m.key}-detail`).trim();
    const goods=val(`${m.key}-goods`).trim();
    if(!title) return toast("제목을 입력하세요");
    if(!requester) return toast("요청자를 입력하세요");
    if(!goods) return toast("요청 구매물품을 입력하세요");
    const recs=loadRecs(m);
    const rec={
      draft_no: nextNo(m),
      title,                                    // 목록 표시용 제목
      requester,                                // 실제 요청자(입력)
      detail,                                   // 상세내용
      goods,                                    // 요청 구매물품
      drafter: cu.name, drafter_id: cu.login_id, drafter_role: cu.role,  // 작성자=로그인
      status:STATUS_OPEN, created_at:todayStr(),
      version:1, parent_no:null, void_reason:null, history:[]
    };
    recs.push(rec); saveRecs(m,recs);
    logEvent(m.key, rec.draft_no, rec.title, "상신", `${m.label} 상신 — ${title}`);
    toast(`${rec.draft_no} 상신 완료`);
    resetForm(m);
    return;
  }

  // 기안 작성: 사무직원만 (이후 순차결재 단계에서 재확인)
  if(cu.role!=="사무직원"){ toast("기안 작성은 사무직원만 가능합니다"); return; }

  const title=val(`${m.key}-title`).trim();
  const project=val(`${m.key}-project`).trim();
  const drafter=cu.name;                 // 작성자=로그인 계정 이름
  const drafter_id=cu.login_id;
  const drafter_role=cu.role;
  const purpose=val(`${m.key}-purpose`).trim();
  const reason=val(`${m.key}-reason`).trim();
  const budget_lines=collectBudgetLines(m);
  const amount=budget_lines.reduce((s,l)=>s+l.amount,0);  // 지출예정액 합계
  const account=budget_lines.map(l=>l.name).join(", ");   // 표시용
  const items=[...document.querySelectorAll(`#${m.key}-items .item-row`)].map(r=>({
    name:r.querySelector(".it-name").value.trim(),
    qty:r.querySelector(".it-qty").value.trim(),
    note:r.querySelector(".it-note").value.trim()
  })).filter(i=>i.name);

  if(!title) return toast("건명을 입력하세요");
  if(!purpose) return toast("목적을 입력하세요");
  if(!reason) return toast("사유를 입력하세요");
  if(budget_lines.length===0) return toast("예산 계정을 1개 이상 선택하세요");
  if(!amount) return toast("지출예정액을 입력하세요");
  if(items.length===0) return toast("필요목록 품목을 1개 이상 입력하세요");

  // 계정별 초과 검사
  const overLines=budget_lines.filter(l=>l.budget && ((l.budget-(l.spent||0)-l.amount)<0));
  const over=overLines.length>0;
  if(over && !confirm(`예산 초과 계정이 있습니다:\n${overLines.map(l=>`· ${l.name}: 초과 ${fmt(l.amount-(l.budget-(l.spent||0)))}원`).join("\n")}\n\n그래도 상신할까요?`)) return;

  const recs=loadRecs(m);
  const existingNo = val(`${m.key}-draft-no`).trim();   // 구매요청에서 넘어온 기안
  const fromPr = val(`${m.key}-from-pr`).trim();
  if(existingNo){
    const rec=recs.find(x=>x.draft_no===existingNo);
    if(rec){
      Object.assign(rec, {title, project, drafter, drafter_id, drafter_role, purpose, reason, account, budget_lines, amount, over, items, status:STATUS_OPEN});
      rec.history=rec.history||[];
      rec.history.push({at:todayStr(), text:`기안 상신 — ${title}`});
      saveRecs(m,recs);
      logEvent(m.key, rec.draft_no, rec.title, "상신", `기안 상신 — ${title}${fromPr?` (구매요청 ${fromPr})`:""}`);
      toast(`${rec.draft_no} 상신 완료`);
      resetForm(m);
      return;
    }
  }
  const rec={
    draft_no: nextNo(m), title, project, drafter, drafter_id, drafter_role, purpose, reason,
    account, budget_lines, amount, over, items,
    status:STATUS_OPEN, created_at:todayStr(),
    version:1, parent_no:null, void_reason:null, history:[]
  };
  recs.push(rec); saveRecs(m,recs);
  logEvent(m.key, rec.draft_no, rec.title, "상신", `${m.label} 상신 — ${title}${over?" (예산초과)":""}`);
  toast(`${rec.draft_no} 상신 완료${over?" (예산초과)":""}`);
  resetForm(m);
}

  let apChip;
  if(dec && dec.result==="승인") apChip=`<span class="chip chip-ok">승인 ✓</span>`;
  else if(dec && dec.result==="반려") apChip=`<span class="chip chip-no">반려 ✕</span>`;
  else apChip=`<span class="chip chip-wait">승인 대기</span>`;
  const refChip=`<span class="chip ${refCount>0?'chip-ref':'chip-wait'}">참조 ${refCount}/${REFEREE_ROLES.length}</span>`;
  return `<div class="chips">${apChip}${refChip}</div>`;
}

/* ---------- 목록 ---------- */
function badge(s){
  if(s==="폐기") return `<span class="badge b-void">폐기</span>`;
  if(s==="반려") return `<span class="badge b-reject">반려</span>`;
  if(s==="승인") return `<span class="badge b-approve">승인</span>`;
  if(s===STATUS_OPEN) return `<span class="badge b-wait">${STATUS_OPEN}</span>`;
  return `<span class="badge b-ok">${esc(s)}</span>`;
}
const PAGE_SIZE = 20;
const pageState = {};  // key -> 현재 페이지(1-base)
function getPage(key){ return pageState[key]||1; }
function setPage(key,p){ pageState[key]=p; }
// 페이지바 렌더: containerId에 숫자 버튼 그림, onGo(page) 콜백
function renderPager(containerId, total, key, onGo){
  const el=document.getElementById(containerId); if(!el) return;
  const pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
  let cur=getPage(key); if(cur>pages){ cur=pages; setPage(key,cur); }
  if(pages<=1){ el.innerHTML=""; return; }
  let btns="";
  btns+=`<button class="pg-btn" ${cur===1?"disabled":""} data-pg="${cur-1}">‹</button>`;
  // 페이지 범위 (현재 주변 최대 7개)
  let start=Math.max(1,cur-3), end=Math.min(pages,start+6); start=Math.max(1,end-6);
  if(start>1){ btns+=`<button class="pg-btn" data-pg="1">1</button>${start>2?'<span class="pg-dot">…</span>':''}`; }
  for(let i=start;i<=end;i++) btns+=`<button class="pg-btn ${i===cur?"active":""}" data-pg="${i}">${i}</button>`;
  if(end<pages){ btns+=`${end<pages-1?'<span class="pg-dot">…</span>':''}<button class="pg-btn" data-pg="${pages}">${pages}</button>`; }
  btns+=`<button class="pg-btn" ${cur===pages?"disabled":""} data-pg="${cur+1}">›</button>`;
  el.innerHTML=btns;
  el.querySelectorAll("[data-pg]").forEach(b=>{ b.onclick=()=>{ setPage(key, Number(b.dataset.pg)); onGo(); }; });
}

// 모듈별 현재단계 필터 옵션
function stageOptionsFor(mkey){
  if(mkey==="pr") return ["재무 승인 대기","승인 완료","반려"];
  if(mkey==="draft") return ["재무 승인 대기","위원장 승인 대기","최종 승인 완료","반려"];
  if(mkey==="order") return ["입고 확인 대기","재무 승인 대기","승인 완료","반려"];
  if(mkey==="settle"||mkey==="urgent") return ["재무 승인 대기","위원장 승인 대기","재무분과장 최종승인 대기","최종 확정","반려"];
  return [];
}
function renderList(m){
  const recs=loadRecs(m);
  const q=val(`${m.key}-search`).trim().toLowerCase();
  const fcol=val(`${m.key}-filter-col`);
  const fv=val(`${m.key}-filter-void`);
  // 검색 대상 열 정의
  const colGet={
    "제목": d=> d.title||d.goods||"",
    "번호": d=> d.draft_no||"",
    "요청자": d=> m.simple ? (d.requester||d.drafter||"") : (d.drafter||""),
    "상태": d=> d.status||"",
    "단계": d=> d.status==="폐기"?"폐기":finStageText(m.key,d),
    "일자": d=> (d.created_at||"").slice(0,10)
  };
  const allCols=()=>Object.values(colGet);
  let rows=recs.slice().reverse().filter(d=>{
    if(fv==="active" && d.status==="폐기") return false;
    if(q){
      let hay;
      if(fcol && colGet[fcol]) hay=String(colGet[fcol](d)||"");
      else hay=allCols().map(f=>String(f(d)||"")).join(" ");
      if(!hay.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const tb=document.getElementById(`${m.key}-rows`);
  tb.innerHTML="";
  document.getElementById(`${m.key}-empty`).style.display = rows.length?"none":"block";
  const total=rows.length;
  // 페이지 슬라이스
  let cur=getPage(m.key); const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(cur>pages){ cur=pages; setPage(m.key,cur); }
  const startIdx=(cur-1)*PAGE_SIZE;
  const pageRows=rows.slice(startIdx, startIdx+PAGE_SIZE);
  pageRows.forEach((d,i)=>{
    const idx=startIdx+i;
    const tr=document.createElement("tr");
    if(d.status==="폐기") tr.className="voided";
    const no = total-idx;  // 최신이 위, 번호는 역순
    const titleText = d.title || d.goods || "";
    const whoText = m.simple ? (d.requester||d.drafter||"") : (d.drafter||"");
    tr.innerHTML=`
      <td class="muted col-no">${no}</td>
      <td class="col-date">${esc(d.created_at)}</td>
      <td class="no col-docno">${esc(d.draft_no)}${d.version>1?` <span class="muted">v${d.version}</span>`:""}</td>
      <td class="col-title" style="white-space:pre-wrap">${esc(titleText)}</td>
      <td class="col-who">${esc(whoText)}</td>
      <td class="col-status">${badge(d.status)}</td>
      <td class="col-stage" style="font-size:12px;color:var(--ink-soft)">${d.status==="폐기"?"폐기":esc(finStageText(m.key,d))}</td>
      ${(m.key==="pr"||m.key==="draft")?"":`<td class="col-ref">${listStatusChips(d)}</td>`}
      <td class="col-open"><button class="linkbtn">열람</button></td>`;
    tr.onclick=()=>openDetail(m, d.draft_no);
    tb.appendChild(tr);
  });
  renderPager(`${m.key}-pager`, total, m.key, ()=>renderList(m));
}

/* ---------- 상세: 동적 열람 탭 ---------- */
const openTabs = {}; // m.key -> Set
function panelId(m,no){ return `panel-view-${m.key}-`+no.replace(/[^A-Za-z0-9]/g,"_"); }

/* ---------- 승인/참조 박스 ---------- */
function canCancel(u){ return isApprover(u) || isReferee(u); }
// 이 문서의 작성자가 현재 사용자인가 (셀프 결재 금지)
function isOwnDoc(d,u){
  if(!u) return false;
  if(d.drafter_id) return d.drafter_id===u.login_id;
  return d.drafter && d.drafter===u.name;  // 구버전 호환(이름 비교)
}

/* 우상단 컴팩트 현황판 */
function statusBoardHtml(d){
  const dec=d.approval;
  const comments=d.comments||[];
  const refDone=role=>comments.find(c=>c.role===role);
  let approveCell;
  if(dec){
    const done = dec.result==="승인" ? "done-approve" : "done-reject";
    const mark = dec.result==="승인" ? "✓" : "✕";
    approveCell=`<div class="ap-cell ${done}">
      <div class="lab">승인 (재무분과)</div>
      <div class="mark">${mark}</div>
      <div class="stat">${esc(dec.result)}</div>
      <div class="by">${esc(dec.by)} · ${esc(dec.at)}</div></div>`;
  }else{
    approveCell=`<div class="ap-cell">
      <div class="lab">승인 (재무분과)</div>
      <div class="mark" style="color:var(--ink-soft)">○</div>
      <div class="stat wait">대기</div></div>`;
  }
  const refCells = REFEREE_ROLES.map(role=>{
    // 작성자 본인 역할이면 참조 대상에서 제외
    const isOwnRole = (d.drafter_role===role) ||
      (!d.drafter_role && d.drafter && comments.length===0 && false);
    if(isOwnRole){
      return `<div class="ap-cell" style="opacity:.55">
        <div class="lab">참조 (${esc(role)})</div>
        <div class="mark" style="color:var(--ink-soft)">—</div>
        <div class="stat wait">작성자 (제외)</div></div>`;
    }
    const c=refDone(role);
    if(c){
      return `<div class="ap-cell done-ref">
        <div class="lab">참조 (${esc(role)})</div>
        <div class="mark" style="color:var(--brand)">✓</div>
        <div class="stat" style="color:var(--brand)">참조완료</div>
        <div class="by">${esc(c.by)} · ${esc(c.at)}</div></div>`;
    }
    return `<div class="ap-cell">
      <div class="lab">참조 (${esc(role)})</div>
      <div class="mark" style="color:var(--ink-soft)">○</div>
      <div class="stat wait">미확인</div></div>`;
  }).join("");
  return `<div class="status-board"><div class="approval-grid">${approveCell}${refCells}</div></div>`;
}

function approvalBox(m,d){
  const u=currentUser();
  const decided = (d.status==="승인" || d.status==="반려");
  const dec = d.approval; // {result, by, role, at, comment}
  const comments = d.comments || [];

  // 참조 코멘트 목록
  const cmtHtml = comments.length
    ? comments.map(c=>`<div class="cmt"><div class="meta"><span class="role">${esc(c.role)}</span> · ${esc(c.by)} · ${esc(c.at)}</div><div style="white-space:pre-wrap">${esc(c.text)}</div></div>`).join("")
    : `<div class="muted" style="padding:6px 0">참조 코멘트가 없습니다.</div>`;

  // 권한별 입력 영역
  let actionHtml="";
  const commentInput = `
      <div class="field" style="margin:8px 0"><label>참조 코멘트 (${u?esc(u.role):""})</label>
        <textarea id="ref-cmt-${m.key}" class="mid" placeholder="의견을 남기세요"></textarea></div>
      <button class="btn btn-ghost btn-sm" data-comment="${m.key}|${esc(d.draft_no)}">코멘트 등록</button>`;
  // 취소 버튼 (결재자·참조자 공통, 결재 완료 상태에서만)
  const cancelBtn = (decided && canCancel(u))
    ? `<button class="btn btn-ghost btn-sm" data-undo="${m.key}|${esc(d.draft_no)}" style="color:var(--void)">승인 취소</button>
       <hr style="border:0;border-top:1px dashed var(--line);margin:16px 0">` : "";

  if(!u){
    actionHtml=`<div class="muted">승인·코멘트를 남기려면 로그인하세요.</div>`;
  }else if(isOwnDoc(d,u)){
    actionHtml=`<div class="muted">본인이 상신한 건은 직접 승인·참조할 수 없습니다. (셀프 결재 금지)</div>`;
  }else if(isApprover(u)){
    // 결재자: 미결재면 승인/반려, 결재완료면 취소. + 코멘트 항상.
    let decideBlock;
    if(!decided && d.status!=="폐기"){
      decideBlock=`
        <div class="field" style="margin:8px 0"><label>처리 의견 (승인/반려 사유, 선택)</label>
          <textarea id="apv-cmt-${m.key}" class="mid" placeholder="승인/반려 사유"></textarea></div>
        <div class="seg">
          <button class="btn btn-primary btn-sm" data-decide="${m.key}|${esc(d.draft_no)}|승인">승인</button>
          <button class="btn btn-ghost btn-sm" data-decide="${m.key}|${esc(d.draft_no)}|반려" style="color:var(--void)">반려</button>
        </div>
        <hr style="border:0;border-top:1px dashed var(--line);margin:16px 0">`;
    }else if(decided){
      decideBlock=`<div class="muted" style="margin-bottom:8px">이미 <b>${esc(d.status)}</b> 처리된 건입니다.</div>${cancelBtn}`;
    }else{
      decideBlock=`<div class="muted" style="margin-bottom:12px">현재 상태(${esc(d.status)})에서는 결재할 수 없습니다.</div>`;
    }
    actionHtml = decideBlock + commentInput;
  }else if(isReferee(u)){
    // 참조자: 참조 확인 버튼 + 코멘트(선택) + (결재완료 시) 취소
    const alreadyRef = comments.some(c=>c.role===u.role && c.by===u.name);
    const refBtn = alreadyRef
      ? `<div class="muted" style="margin-bottom:8px">✓ 이미 참조 확인하셨습니다.</div>`
      : `<button class="btn btn-primary btn-sm" data-refconfirm="${m.key}|${esc(d.draft_no)}">참조 확인</button>
         <div class="hint" style="margin:4px 0 12px">코멘트 없이 참조만 확인하려면 위 버튼을 누르세요.</div>`;
    actionHtml = cancelBtn + refBtn + commentInput;
  }else{
    actionHtml=`<div class="muted">현재 직책(${esc(u.role)})은 이 건에 대한 결재·참조 권한이 없습니다.</div>`;
  }

  return `<div class="approve-box">
    <div class="ttl">결재 · 참조</div>
    ${dec&&dec.comment?`<div class="muted" style="white-space:pre-wrap;margin-bottom:10px"><b>처리의견:</b> ${esc(dec.comment)}</div>`:""}
    <div style="margin:10px 0"><b style="font-size:12.5px">참조 코멘트</b>${cmtHtml}</div>
    ${actionHtml}
  </div>`;
}

function decideRequest(m,no,result){
  const u=currentUser();
  if(!isApprover(u)){ toast("승인 권한이 없습니다"); return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(isOwnDoc(d,u)){ toast("본인이 상신한 건은 직접 승인할 수 없습니다"); return; }
  if(d.status==="승인"||d.status==="반려"){ toast("이미 처리된 건입니다"); return; }
  const cmt=(document.getElementById(`apv-cmt-${m.key}`)||{}).value || "";
  d.status = result;
  d.approval = {result, by:u.name, role:u.role, at:todayStr(), comment:cmt.trim()};
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] ${result}${cmt.trim()?` — "${cmt.trim()}"`:""}`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods, result, `${u.role} ${u.name} ${result}${cmt.trim()?` — ${cmt.trim()}`:""}`);
  const panel=document.getElementById(panelId(m,no));
  if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} ${result} 처리됨`);
}

function undoDecision(m,no){
  const u=currentUser();
  if(!canCancel(u)){ toast("승인 취소 권한이 없습니다"); return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(isOwnDoc(d,u)){ toast("본인이 상신한 건은 처리할 수 없습니다"); return; }
  if(d.status!=="승인" && d.status!=="반려"){ toast("취소할 결재가 없습니다"); return; }
  if(!confirm(`'${d.status}' 결재를 취소하고 다시 '상신' 상태로 되돌립니다.\n(취소 내역은 이력에 남습니다)\n\n진행할까요?`)) return;
  const prev=d.status;
  const prevBy=d.approval ? `${d.approval.role} ${d.approval.by}` : "-";
  d.status = STATUS_OPEN;
  d.approval = null;
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 승인 취소 (이전: ${prev} / 처리자 ${prevBy})`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods, "취소", `${u.role} ${u.name} 승인 취소 (이전: ${prev})`);
  const panel=document.getElementById(panelId(m,no));
  if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} 승인이 취소되었습니다`);
}

function confirmReference(m,no){
  const u=currentUser();
  if(!isReferee(u)){ toast("참조 권한이 없습니다"); return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;

  if(panel) panel.innerHTML=detailHtml(m,d);
  toast("참조 확인되었습니다");
}

function addComment(m,no){
  const u=currentUser();
  if(!isApprover(u) && !isReferee(u)){ toast("코멘트 권한이 없습니다"); return; }
  const el=document.getElementById(`ref-cmt-${m.key}`);

}

/* 승인된 구매요청 → 기안 생성 (분할). 누를 때마다 -1,-2,-3 */
function makeDraftFromPR(prNo){
  const u=currentUser();
  if(!u || u.role!=="사무직원"){ toast("기안 작성은 사무직원만 가능합니다"); return; }
  const prM=MODULES.pr, drM=MODULES.draft;
  const prRecs=loadRecs(prM);
  const pr=prRecs.find(x=>x.draft_no===prNo); if(!pr) return;
  if(pr.status!=="승인"){ toast("승인된 구매요청만 기안으로 올릴 수 있습니다"); return; }

  // 베이스번호: 구매요청에 최초 1회만 부여
  if(!pr.draft_base){ pr.draft_base = nextDraftBase(); pr.linked_drafts=[]; }
  const part = (pr.linked_drafts.length)+1;            // 1,2,3...
  const draftNo = `${pr.draft_base}-${part}`;          // 기안-2026-0005-1

  // 기안 레코드 생성 (작성 전 초안 상태)
  const drRecs=loadRecs(drM);
  drRecs.push({
    draft_no: draftNo, from_pr: prNo, part,
    title:"", project:"목동1단지", drafter: u.name,
    purpose:"", reason:"", account:"", budget:0, amount:0, over:false, items:[],
    status:"작성중", created_at:todayStr(),
    version:1, parent_no:null, void_reason:null, history:[], comments:[]
  });
  saveRecs(drM, drRecs);

  pr.linked_drafts.push(draftNo);
  saveRecs(prM, prRecs);
  logEvent("pr", prNo, pr.title||pr.goods, "기안생성", `기안 ${draftNo} 생성 (구매요청 ${prNo} 기준)`);

  // 구매요청 화면 갱신 + 기안관리로 이동하여 작성 폼 열기
  const panel=document.getElementById(panelId(prM,prNo));
  if(panel) panel.innerHTML=detailHtml(prM,pr);
  toast(`${draftNo} 생성 — 기안관리로 이동합니다`);
  gotoDraftCompose(draftNo);
}

/* 기안관리로 이동 → 작성 폼에 구매요청 요약 + 기안 입력 */
function gotoDraftCompose(draftNo){
  showTop("draft");
  const m=MODULES.draft;
  activateSub(m,"write");
  fillDraftCompose(draftNo);
}

   견적: 기안 상세 안에서 인라인 등록 (번호 = 기안번호-Q1,Q2…)
========================================================= */
function isQuoteWriter(u){ return u && QUOTE_WRITER_ROLES.includes(u.role); }

// 기안 상세의 인라인 견적 추가
function addQuoteInline(draftNo){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("견적 작성 권한이 없습니다 (사무직원·재무과·위원장)"); return; }
  const drM=MODULES.draft, qM=MODULES.quote;
  const dr=loadRecs(drM).find(x=>x.draft_no===draftNo); if(!dr) return;
  const vendor=(document.getElementById(`q-vendor-${cssId(draftNo)}`)||{}).value?.trim()||"";
  const amount=Number(onlyNum((document.getElementById(`q-amount-${cssId(draftNo)}`)||{}).value||""));
  const content=(document.getElementById(`q-content-${cssId(draftNo)}`)||{}).value?.trim()||"";
  const note=(document.getElementById(`q-note-${cssId(draftNo)}`)||{}).value?.trim()||"";
  if(!vendor){ toast("업체명을 입력하세요"); return; }
  if(!amount){ toast("견적 총액을 입력하세요"); return; }
  if(!content){ toast("견적 내용을 입력하세요"); return; }
  const qRecs=loadRecs(qM);
  // 기안별 하위번호: 기안번호-Q1, -Q2 ...
  const part=(dr.linked_quotes||[]).length+1;
  const quoteNo=`${draftNo}-Q${part}`;
  // 견적서 첨부 (파일명 비우면 견적번호 기반 자동)
  let attName=(document.getElementById(`q-att-name-${cssId(draftNo)}`)||{}).value?.trim()||"";
  let attUrl=(document.getElementById(`q-att-url-${cssId(draftNo)}`)||{}).value?.trim()||"";
  const atts=[];
  if(attUrl || attName){
    if(!attName) attName=`${quoteNo}_견적서`;
    if(attUrl && !/^https?:\/\//i.test(attUrl)) attUrl="https://"+attUrl;
    atts.push({name:attName, url:attUrl, by:u.name, at:nowStamp()});
  }
  qRecs.push({
    draft_no: quoteNo, from_draft: draftNo,
    vendor, amount, content, note, attachments:atts,
    drafter: u.name, drafter_id: u.login_id, drafter_role: u.role,
    status:"상신", created_at:todayStr(),
    selected:false,
    history:[{at:nowStamp(), text:`[${u.role} ${u.name}] 견적 등록 — ${vendor} / ${won(amount)}${atts.length?` · 첨부 ${attName}`:""}`}]
  });
  saveRecs(qM, qRecs);
  dr.linked_quotes=dr.linked_quotes||[];
  dr.linked_quotes.push(quoteNo);
  dr.history=dr.history||[];
  dr.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 견적 등록 — ${quoteNo} (${vendor} ${won(amount)})`});
  saveRecs(drM, loadRecs(drM).map(x=>x.draft_no===draftNo?dr:x));
  logEvent("draft", draftNo, dr.title, "견적등록", `견적 ${quoteNo} 등록 — ${vendor} ${won(amount)}`);
  const panel=document.getElementById(panelId(drM,draftNo));
  if(panel) panel.innerHTML=detailHtml(drM,dr);
  toast(atts.length?`${quoteNo} 등록 완료`:`${quoteNo} 등록 완료 — 첨부(견적서)를 추가하세요`);
}

// 견적 첨부 추가 (등록 후 카드에서)
function addQuoteAtt(draftNo, quoteNo){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("권한이 없습니다"); return; }
  const qM=MODULES.quote; const recs=loadRecs(qM); const q=recs.find(x=>x.draft_no===quoteNo); if(!q) return;

  let url=(document.getElementById(`qatt-url-${cssId(quoteNo)}`)||{}).value?.trim()||"";
  if(!name && !url){ toast("파일명 또는 링크를 입력하세요"); return; }

}

// 견적 첨부 삭제
function delQuoteAtt(draftNo, quoteNo, idx){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("권한이 없습니다"); return; }
  const qM=MODULES.quote; const recs=loadRecs(qM); const q=recs.find(x=>x.draft_no===quoteNo); if(!q) return;
  if(!q.attachments||!q.attachments[idx]) return;
  const removed=q.attachments[idx].name;
  if(!confirm(`견적서 첨부 '${removed}'를 삭제할까요?`)) return;
  q.attachments.splice(idx,1);
  q.history=q.history||[];
  q.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 견적서 첨부 삭제 — ${removed}`});
  saveRecs(qM,recs);
  const dr=loadRecs(MODULES.draft).find(x=>x.draft_no===draftNo);
  if(dr){ dr.history=dr.history||[]; dr.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] ${quoteNo} 견적서 첨부 삭제 — ${removed}`}); saveRecs(MODULES.draft, loadRecs(MODULES.draft).map(x=>x.draft_no===draftNo?dr:x)); }
  const panel=document.getElementById(panelId(MODULES.draft,draftNo));
  if(panel && dr) panel.innerHTML=detailHtml(MODULES.draft,dr);
  toast("견적서 첨부가 삭제되었습니다");
}

// 최종 견적 선정 (이유 입력)
function selectQuoteInline(draftNo, quoteNo){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("선정 권한이 없습니다 (사무·재무·위원장)"); return; }

function cssId(s){ return String(s).replace(/[^A-Za-z0-9]/g,"_"); }

/* 상위 단계 미승인 시 효력정지 배지 (읽기·정상 절차는 가능, 표기만) */
/* 사무직원 긴급진행(선진행): 사유 필수, 이력+배지, 정상 결재는 그대로 뒤따름 */
function expediteDoc(mkey, no){
  const u=currentUser();
  if(!u || u.role!=="사무직원"){ toast("긴급진행은 사무직원만 가능합니다"); return; }
  const m=MODULES[mkey]; const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(d.expedite){ toast("이미 긴급진행 표시된 건입니다"); return; }
  const reason=(document.getElementById(`expedite-reason-${mkey}`)||{}).value?.trim()||"";
  if(!reason){ toast("긴급진행 사유를 입력하세요"); return; }
  d.expedite={by:u.name, role:u.role, at:nowStamp(), reason};
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`⚡ [${u.role} ${u.name}] 긴급진행(선진행) — 사유: "${reason}"`});
  saveRecs(m,recs);
  logEvent(mkey, no, d.title||d.goods||d.vendor, "긴급진행", `긴급진행(선진행) — ${u.name} (${reason})`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  toast("긴급진행 표시되었습니다 — 정상 결재는 사후에 진행하세요");
}
function expediteCancel(mkey, no){
  const u=currentUser();
  const m=MODULES[mkey]; const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d || !d.expedite) return;
  if(!confirm("긴급진행 표시를 취소할까요?")) return;
  d.expedite=null;
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 긴급진행 표시 취소`});
  saveRecs(m,recs);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  toast("긴급진행 표시가 취소되었습니다");
}
// 긴급진행 배지 + 버튼 (상세 상단용)
function expediteBlock(mkey, d){
  const u=currentUser();
  const isClerk = u && u.role==="사무직원";
  if(d.expedite){
    return `<div class="expedite-badge">⚡ 사무직원 긴급진행(선진행)건 — ${esc(d.expedite.by)} · ${esc(d.expedite.at)}<br><span>사유: ${esc(d.expedite.reason)}${" · 정상 결재는 사후 진행"}</span>
      ${isClerk?`<button class="btn btn-ghost btn-sm" data-expedite-cancel="${mkey}|${esc(d.draft_no)}" style="margin-top:6px;color:var(--void)">긴급진행 취소</button>`:""}</div>`;
  }
  if(isClerk && d.status!=="폐기"){
    return `<details class="expedite-wrap"><summary class="expedite-sum">⚡ 긴급진행(선진행)</summary>
      <div class="expedite-form">
        <div class="muted" style="font-size:11.5px;margin-bottom:6px">급한 경우 선진행 표시를 남깁니다. 정상 결재 절차는 그대로 사후 진행됩니다. (사유 필수)</div>
        <textarea id="expedite-reason-${mkey}" class="mid" placeholder="긴급진행 사유"></textarea>
        <button class="btn btn-primary btn-sm" data-expedite="${mkey}|${esc(d.draft_no)}">긴급진행 표시</button>
      </div></details>`;
  }
  return "";
}

function suspensionBanner(m,d){
  if(m.key==="order" && d.from_draft){
    const dr=loadRecs(MODULES.draft).find(x=>x.draft_no===d.from_draft);
    if(dr){
      const ok=(draftStage(dr)==="위원장승인")||(dr.status==="승인");
      if(!ok) return `<div class="suspend-banner">⚠ 상위 기안(${esc(d.from_draft)}) 미승인 — 효력 정지<br><span>기안이 다시 최종 승인되면 자동 해제됩니다.</span></div>`;
    }
  }
  if(m.key==="draft" && d.from_pr){
    const pr=loadRecs(MODULES.pr).find(x=>x.draft_no===d.from_pr);
    if(pr && pr.status!=="승인"){

    }
  }
  return "";
}

/* =========================================================
   발주관리: 기안 → 발주 (기안 하위번호 -O1,-O2)
   사무직원 작성 → 재무분과 승인 → 감사·위원장 참조(선택) → 입고 확인
========================================================= */
const ORDER_APPROVER_ROLES=["재무분과","재무분과장"];
function makeOrderFromDraft(draftNo){
  const u=currentUser();
  if(!u || u.role!=="사무직원"){ toast("발주 작성은 사무직원만 가능합니다"); return; }
  const drM=MODULES.draft, oM=MODULES.order;
  const dr=loadRecs(drM).find(x=>x.draft_no===draftNo); if(!dr) return;
  // 선정 견적 정보
  const sq=dr.selected_quote?loadRecs(MODULES.quote).find(x=>x.draft_no===dr.selected_quote):null;
  if(!sq){
    if(!confirm("최종 견적이 선정되지 않았습니다.\n선정 견적이 없으면 발주금액 비교 기준이 없습니다.\n\n그래도 발주를 올릴까요?")) return;
  }
  const oRecs=loadRecs(oM);
  const part=(dr.linked_orders||[]).length+1;
  const orderNo=`${draftNo}-O${part}`;
  oRecs.push({
    draft_no: orderNo, from_draft: draftNo,
    title: dr.title,
    vendor: sq?sq.vendor:"", amount: sq?sq.amount:(dr.amount||0),
    from_quote: dr.selected_quote||null,
    order_place: sq?sq.vendor:"",   // 발주처: 선정견적 업체에서 이어받음(수정가능)
    order_content:"",               // 내용 기재(풍선)
    final_amount:0, diff_reason:"",
    received:false, received_at:null, received_by:null, received_date:null, received_note:"",
    approval:null,           // 입고 후 재무 승인
    comments:[],             // 감사·위원장 참조
    drafter:u.name, drafter_id:u.login_id, drafter_role:u.role,
    status:"상신", created_at:todayStr(),
    history:[{at:nowStamp(), text:`[${u.role} ${u.name}] 발주 생성 (기안 ${draftNo}${sq?`, 선정견적 ${dr.selected_quote}`:""})`}]
  });
  saveRecs(oM,oRecs);
  dr.linked_orders=dr.linked_orders||[];
  dr.linked_orders.push(orderNo);
  saveRecs(drM, loadRecs(drM).map(x=>x.draft_no===draftNo?dr:x));
  logEvent("order", orderNo, dr.title, "상신", `발주 생성 — ${orderNo}`);
  toast(`${orderNo} 생성 — 발주관리로 이동`);
  showTop("order"); activateSub(MODULES.order,"list"); openDetail(MODULES.order, orderNo);
}

function orderApprove(no,result){
  const u=currentUser();
  if(!ORDER_APPROVER_ROLES.includes(u.role)){ toast("발주 승인 권한이 없습니다 (재무과)"); return; }
  const m=MODULES.order; const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(isOwnDoc(d,u)){ toast("본인 작성 발주는 승인할 수 없습니다"); return; }
  if(!d.received){ toast("입고 확인 후 승인할 수 있습니다"); return; }
  if(d.approval){ toast("이미 처리되었습니다"); return; }
  const cmt=(document.getElementById(`o-apv-cmt`)||{}).value?.trim()||"";
  d.approval={result, by:u.name, role:u.role, at:nowStamp(), comment:cmt};
  d.status = result;
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 발주 ${result}${cmt?` — "${cmt}"`:""}`});
  saveRecs(m,recs);
  logEvent("order", no, d.title, result, `발주 ${result} — ${u.name}`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} ${result}`);
}

function saveOrderInfo(no){
  const u=currentUser();
  const m=MODULES.order; const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  const place=(document.getElementById(`o-place`)||{}).value?.trim()||"";
  const content=(document.getElementById(`o-content`)||{}).value?.trim()||"";
  const finalAmt=Number(onlyNum((document.getElementById(`o-final`)||{}).value||""));
  const diffReason=(document.getElementById(`o-diff-reason`)||{}).value?.trim()||"";
  if(!place){ toast("발주처를 입력하세요"); return; }
  if(!finalAmt){ toast("최종 발주금액을 입력하세요"); return; }
  const base=d.amount||0;  // 선정 견적금액
  const diff = base ? finalAmt-base : 0;
  if(base && diff!==0 && !diffReason){ toast("선정 견적금액과 차이가 있습니다. 차이 사유를 입력하세요"); return; }
  // 발주처 변경 알림
  const placeChanged = d.order_place && d.order_place!==place;
  d.order_place=place; d.order_content=content; d.final_amount=finalAmt; d.diff_reason=(base&&diff!==0)?diffReason:"";
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 발주 정보 입력 — ${place} / 최종 ${won(finalAmt)}${diff!==0?` (견적대비 ${diff>0?"+":""}${fmt(diff)})`:""}${placeChanged?` · 발주처 변경(이전: ${d._prevPlace||"-"})`:""}`});
  saveRecs(m,recs);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  toast(placeChanged?`발주처가 변경되었습니다 (${place})`:"발주 정보가 저장되었습니다");
}
