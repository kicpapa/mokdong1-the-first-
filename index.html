/* =========================================================
   기안 순차결재 (재무과 → 감사 참조 → 위원장 최종)
   - 감사: 1명만 참조해도 위원장 단계로 진행
   - 미참조 감사가 언제든 반려 가능 → 최종 반려(아무도 못 뒤집음)
   - 작성자 본인 역할은 제외, 위원장이 작성자면 감사가 최종승인 대체
========================================================= */
function draftSeq(d){
  if(!d.seq) d.seq={ fin:null, audits:[], chair:null, finalReject:null };
  if(!d.seq.audits) d.seq.audits=[];
  return d.seq;
}
// 위원장이 작성자면 최종승인을 감사가 대체
function chairIsWriter(d){ return d.drafter_role===DRAFT_CHAIR_ROLE; }
// 이 기안에서 감사 참조 대상(작성자 감사 제외)
function auditTargets(d){ return DRAFT_AUDIT_ROLES.filter(r=>r!==d.drafter_role); }
// 현재 단계 계산: 상신 / 재무승인 / 감사중 / 위원장승인 / 반려
function draftStage(d){
  const s=draftSeq(d);
  if(s.finalReject) return "반려";
  if(!s.fin) return "상신";
  if(s.fin.result==="반려") return "반려";
  // 긴급승인이면 감사 참조 생략하고 바로 위원장 단계
  if(d.emergency){
    if(!s.chair) return "위원장대기";
    if(s.chair.result==="반려") return "반려";
    return "위원장승인";
  }
  // 감사 참조는 후순위(선택) — 재무 승인 후 바로 위원장 단계로. 감사는 확정 전까지 병렬 참조
  if(!s.chair) return "위원장대기";
  if(s.chair.result==="반려") return "반려";
  return "위원장승인";
}
function draftStatusLabel(d){
  const st=draftStage(d);
  return {"상신":"상신","재무승인":"재무승인","감사중":"감사참조 대기","위원장대기":"위원장 승인 대기","위원장승인":"최종승인","반려":"반려"}[st]||st;
}

/* 기안 결재 현황판 (3단계) */
function draftBoardHtml(d){
  const s=draftSeq(d);
  const cell=(lab,done,mark,stat,by,cls)=>`<div class="ap-cell ${cls||''}">
    <div class="lab">${lab}</div>
    <div class="mark" style="${done?'':'color:var(--ink-soft)'}">${mark}</div>
    <div class="stat ${done?'':'wait'}">${stat}</div>
    ${by?`<div class="by">${esc(by)}</div>`:""}</div>`;
  // 재무
  let finCell = s.fin
    ? cell("① 재무과", true, s.fin.result==="승인"?"✓":"✕", s.fin.result, `${s.fin.by} · ${s.fin.at}`, s.fin.result==="승인"?"done-approve":"done-reject")
    : cell("① 재무과", false, "○", "대기");
  // 감사 (대상별)
  const auditCells = auditTargets(d).map(role=>{
    const a=s.audits.find(x=>x.role===role);
    if(a){
      const isRej=a.result==="반려";
      return cell(`② ${role}`, true, isRej?"✕":"✓", isRej?"반려":"참조완료",
        `${a.by} · ${a.at}`, isRej?"done-reject":"done-ref");
    }
    return cell(`② ${role}`, false, "○", "미확인");
  }).join("");
  if(d.drafter_role && DRAFT_AUDIT_ROLES.includes(d.drafter_role)){
    // 작성자 감사 제외 칸 표시
  }
  // 위원장 (작성자면 대체 안내)
  let chairCell;
  if(chairIsWriter(d)){
    chairCell = cell("③ 최종(감사대체)", !!s.chair, s.chair?(s.chair.result==="승인"?"✓":"✕"):"○",
      s.chair?s.chair.result:"위원장=작성자", s.chair?`${s.chair.by} · ${s.chair.at}`:"감사가 대체",
      s.chair?(s.chair.result==="승인"?"done-approve":"done-reject"):"");
  }else{
    chairCell = s.chair
      ? cell("③ 위원장", true, s.chair.result==="승인"?"✓":"✕", s.chair.result, `${s.chair.by} · ${s.chair.at}`, s.chair.result==="승인"?"done-approve":"done-reject")
      : cell("③ 위원장", false, "○", "대기");
  }
  let extra="";
  if(d.emergency){
    extra+=`<div style="margin-top:8px;background:var(--wait-soft);color:var(--wait);font-weight:700;font-size:11.5px;padding:5px 10px;border-radius:8px">⚡ 긴급승인 — 감사 참조 생략 (${esc(d.emergency.by)})</div>`;
  }
  if(s.finalReject){
    const isAudit=s.finalReject.stageLabel==="감사";
    extra+=`<div style="margin-top:8px;background:var(--void);color:#fff;font-weight:700;font-size:12px;padding:6px 10px;border-radius:8px">⛔ ${isAudit?"감사 거부권 행사 — 최종 반려":"최종 반려"}<br><span style="font-weight:600;opacity:.9">${esc(s.finalReject.role)} ${esc(s.finalReject.by)} · ${esc(s.finalReject.at)}</span></div>`;
  }
  return `<div class="status-board"><div class="approval-grid" style="grid-template-columns:repeat(2,minmax(100px,1fr))">${finCell}${auditCells}${chairCell}</div>${extra}</div>`;
}

/* 기안 결재 입력 박스 */
function draftApprovalBox(m,d){
  const u=currentUser();
  const s=draftSeq(d);
  const stage=draftStage(d);
  const own=isOwnDoc(d,u);

  // 코멘트 목록
  const allActs=[];
  if(s.fin) allActs.push({role:s.fin.role,by:s.fin.by,at:s.fin.at,txt:`재무과 ${s.fin.result}${s.fin.comment?` — ${s.fin.comment}`:""}`});
  s.audits.forEach(a=>allActs.push({role:a.role,by:a.by,at:a.at,txt:`감사 ${a.result}${a.comment?` — ${a.comment}`:""}`}));
  if(s.chair) allActs.push({role:s.chair.role,by:s.chair.by,at:s.chair.at,txt:`위원장 ${s.chair.result}${s.chair.comment?` — ${s.chair.comment}`:""}`});
  const actHtml = allActs.length
    ? allActs.map(a=>`<div class="cmt"><div class="meta"><span class="role">${esc(a.role)}</span> · ${esc(a.by)} · ${esc(a.at)}</div><div style="white-space:pre-wrap">${esc(a.txt)}</div></div>`).join("")
    : `<div class="muted" style="padding:6px 0">결재 활동이 없습니다.</div>`;

  let action="";
  if(!u){
    action=`<div class="muted">결재하려면 로그인하세요.</div>`;
  }else if(stage==="반려"){
    action=`<div class="muted" style="color:var(--void)">최종 반려된 기안입니다. 재작성이 필요합니다.</div>`;
  }else if(own){
    action=`<div class="muted">본인이 작성한 기안은 직접 결재할 수 없습니다.</div>`;
  }else{
    const cmtField=(idsfx)=>`<div class="field" style="margin:8px 0"><label>의견 (선택)</label>
      <textarea id="dapv-${idsfx}-${m.key}" class="mid" placeholder="승인/반려/참조 사유"></textarea></div>`;
    const finRole = DRAFT_FIN_ROLES.includes(u.role);
    const auditRole = DRAFT_AUDIT_ROLES.includes(u.role) && auditTargets(d).includes(u.role);
    const chairRole = (u.role===DRAFT_CHAIR_ROLE) || (chairIsWriter(d) && DRAFT_AUDIT_ROLES.includes(u.role));
    const alreadyAudited = s.audits.some(a=>a.by===u.name && a.role===u.role);

    // ① 재무과 단계
    if(stage==="상신" && finRole){
      action+=`<div class="seg" style="font-weight:700;color:var(--brand);margin-bottom:4px">① 재무과 결재</div>${cmtField("fin")}
        <div class="seg"><button class="btn btn-primary btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|fin|승인">승인</button>
        <button class="btn btn-ghost btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|fin|반려" style="color:var(--void)">반려</button></div>`;
    }
    // ② 감사 참조/반려 (재무 승인 이후 언제든, 미참조 감사는 위원장 승인 후에도 반려 가능)
    else if(auditRole && s.fin && s.fin.result==="승인" && !alreadyAudited){
      action+=`<div class="seg" style="font-weight:700;color:var(--brand);margin-bottom:4px">② 감사 (${esc(u.role)})</div>
        <div class="muted" style="margin-bottom:6px">참조 또는 반려할 수 있습니다. 감사 반려는 최종 확정되어 되돌릴 수 없습니다.</div>${cmtField("audit")}
        <div class="seg"><button class="btn btn-primary btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|audit|참조">참조 확인</button>
        <button class="btn btn-ghost btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|audit|반려" style="color:var(--void)">반려</button></div>`;
    }
    // ③ 위원장 최종 (감사 1명 이상 참조 후)
    else if(chairRole && stage==="위원장대기"){
      const lab = chairIsWriter(d) ? `③ 최종승인 (위원장 작성 → ${esc(u.role)} 대체)` : "③ 위원장 최종승인";
      action+=`<div class="seg" style="font-weight:700;color:var(--brand);margin-bottom:4px">${lab}</div>${cmtField("chair")}
        <div class="seg"><button class="btn btn-primary btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|chair|승인">최종 승인</button>
        <button class="btn btn-ghost btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|chair|반려" style="color:var(--void)">반려</button></div>`;
    }
    // 위원장 승인 후에도 미참조 감사는 참조/반려 가능 (감사 참조는 후순위·선택)
    if(auditRole && s.fin && s.fin.result==="승인" && !alreadyAudited && !d.emergency && (stage==="위원장승인")){
      action+=`<hr style="border:0;border-top:1px dashed var(--line);margin:14px 0">
        <div class="muted" style="margin-bottom:6px">위원장 승인이 먼저 진행된 건입니다. 감사 참조는 후순위로 남길 수 있고, 반려(거부권)도 가능합니다.</div>${cmtField("audit")}
        <div class="seg"><button class="btn btn-primary btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|audit|참조">감사 참조</button>
        <button class="btn btn-ghost btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|audit|반려" style="color:var(--void)">감사 반려</button></div>`;
    }
    // 긴급승인 건에서 미참조 감사의 추후 참조도 가능
    if(d.emergency && auditRole && s.fin && s.fin.result==="승인" && !alreadyAudited && stage!=="반려"){
      action+=`<hr style="border:0;border-top:1px dashed var(--line);margin:14px 0">
        <div class="muted" style="margin-bottom:6px">긴급승인 건입니다. 추후 참조를 남기거나 반려(거부권)할 수 있습니다.</div>${cmtField("audit2")}
        <button class="btn btn-primary btn-sm" data-dseq="${m.key}|${esc(d.draft_no)}|audit|참조">추후 참조</button>`;
    }

    // ⚡ 긴급승인 기능 비활성화 (현재 미사용) — 기존 설정된 건만 표시
    if(d.emergency && (finRole || u.role===DRAFT_CHAIR_ROLE) && stage!=="반려"){
      action+=`<hr style="border:0;border-top:1px dashed var(--line);margin:14px 0">
        <div class="seg" style="font-weight:700;color:var(--void);margin-bottom:4px">⚡ 긴급승인 (설정됨)</div>
        <div class="muted" style="margin-bottom:6px">감사 참조를 생략하고 진행된 건입니다.</div>
        <button class="btn btn-ghost btn-sm" data-emergency="${m.key}|${esc(d.draft_no)}">긴급승인 해제</button>`;
    }

    if(!action){
      action=`<div class="muted">현재 단계(${draftStatusLabel(d)})에서 ${esc(u.role)}이(가) 처리할 항목이 없습니다.</div>`;
    }

    // 단계별 취소 + 전체 일괄취소 (로그인 사용자 공통, 본인 단계만 단계취소)
    let cancelBtns="";
    if(s.fin && s.fin.by===u.name && DRAFT_FIN_ROLES.includes(u.role) && !s.audits.length && !s.chair){
      cancelBtns+=`<button class="btn btn-ghost btn-sm" data-dcancel="${m.key}|${esc(d.draft_no)}|fin" style="color:var(--void)">재무 결재 취소</button> `;
    }
    if(s.audits.some(a=>a.by===u.name && a.role===u.role)){
      cancelBtns+=`<button class="btn btn-ghost btn-sm" data-dcancel="${m.key}|${esc(d.draft_no)}|audit" style="color:var(--void)">내 참조 취소</button> `;
    }
    if(s.chair && s.chair.by===u.name){
      cancelBtns+=`<button class="btn btn-ghost btn-sm" data-dcancel="${m.key}|${esc(d.draft_no)}|chair" style="color:var(--void)">위원장 결재 취소</button> `;
    }
    if(s.fin || s.audits.length || s.chair){
      cancelBtns+=`<button class="btn btn-ghost btn-sm" data-dresetall="${m.key}|${esc(d.draft_no)}" style="color:var(--void)">전체 일괄취소</button>`;
    }
    if(cancelBtns){
      action+=`<hr style="border:0;border-top:1px dashed var(--line);margin:14px 0">
        <div class="muted" style="margin-bottom:6px">결재 취소</div><div class="seg">${cancelBtns}</div>`;
    }
  }

  return `<div class="approve-box">
    <div class="ttl">순차 결재 (재무과 → 감사 → 위원장)</div>
    <div style="margin:10px 0"><b style="font-size:12.5px">결재 활동</b>${actHtml}</div>
    ${action}
  </div>`;
}

function draftSeqAction(m,no,step,result){
  const u=currentUser();
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(isOwnDoc(d,u)){ toast("본인이 작성한 기안은 결재할 수 없습니다"); return; }
  const s=draftSeq(d);
  if(s.finalReject){ toast("이미 최종 반려된 기안입니다"); return; }
  const stamp={by:u.name, role:u.role, at:todayStr(), comment:""};

  if(step==="fin"){
    if(!DRAFT_FIN_ROLES.includes(u.role)){ toast("재무과 결재 권한이 없습니다"); return; }
    if(s.fin){ toast("이미 재무과 결재가 완료되었습니다"); return; }
    stamp.comment=(document.getElementById(`dapv-fin-${m.key}`)||{}).value?.trim()||"";
    stamp.result=result;
    s.fin=stamp;
    if(result==="반려"){ s.finalReject={...stamp, stageLabel:"재무과"}; }
    logEvent(m.key,no,d.title,"결재",`재무과 ${result} — ${u.name}`);
  }
  else if(step==="audit"){
    if(!auditTargets(d).includes(u.role)){ toast("감사 참조 권한이 없습니다"); return; }
    if(!s.fin || s.fin.result!=="승인"){ toast("재무과 승인 후 진행됩니다"); return; }
    if(s.audits.some(a=>a.role===u.role)){ toast("이미 처리하셨습니다"); return; }
    stamp.comment=((document.getElementById(`dapv-audit-${m.key}`)||{}).value || (document.getElementById(`dapv-audit2-${m.key}`)||{}).value || "").trim();
    stamp.result=result;
    s.audits.push(stamp);
    if(result==="반려"){ s.finalReject={...stamp, stageLabel:"감사"}; }
    logEvent(m.key,no,d.title,"결재",`감사 ${result} (${u.role}) — ${u.name}`);
  }
  else if(step==="chair"){
    const okChair=(u.role===DRAFT_CHAIR_ROLE)||(chairIsWriter(d)&&DRAFT_AUDIT_ROLES.includes(u.role));
    if(!okChair){ toast("최종승인 권한이 없습니다"); return; }
    if(!s.fin||s.fin.result!=="승인"){ toast("재무과 승인 후 진행됩니다"); return; }
    // 감사 참조는 후순위(선택) — 게이트 없음. 위원장이 먼저 승인 가능
    if(s.chair){ toast("이미 최종 결재되었습니다"); return; }
    stamp.comment=(document.getElementById(`dapv-chair-${m.key}`)||{}).value?.trim()||"";
    stamp.result=result;
    s.chair=stamp;
    if(result==="반려"){ s.finalReject={...stamp, stageLabel:"위원장"}; }
    const noAudit=(result==="승인" && s.audits.filter(a=>a.result==="참조").length===0 && !d.emergency)?" (감사 참조 전 선진행)":"";
    logEvent(m.key,no,d.title,"결재",`위원장 ${result}${d.emergency?" (긴급)":""}${noAudit} — ${u.name}`);
  }

  // 상태 반영
  d.status = draftStage(d)==="위원장승인" ? "승인" : (draftStage(d)==="반려" ? "반려" : "상신");
  d.seqStatusLabel = draftStatusLabel(d);
  d.history=d.history||[];
  const stepLabel = step==="fin"?"재무과 결재":step==="audit"?"감사":"위원장 최종";
  const emgTag = d.emergency && step==="chair" ? " [긴급승인]" : "";
  d.history.push({at:nowStamp(), text:`[${stamp.role} ${stamp.by}] ${stepLabel} ${result}${emgTag}${stamp.comment?` — "${stamp.comment}"`:""}`});
  saveRecs(m,recs);
  const panel=document.getElementById(panelId(m,no));
  if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} — ${stamp.role} ${result} 처리`);
}

/* 기안 단계별 취소 (본인 단계만) */
function draftSeqCancel(m,no,step){
  const u=currentUser();
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  const s=draftSeq(d);
  if(step==="fin"){
    if(!s.fin || !(s.fin.by===u.name && DRAFT_FIN_ROLES.includes(u.role))){ toast("본인 재무과 결재만 취소할 수 있습니다"); return; }
    // 뒷단계가 진행됐으면 막기
    if(s.audits.length || s.chair){ toast("이후 단계가 진행되어 취소할 수 없습니다. 일괄취소를 사용하세요."); return; }
    s.fin=null; if(s.finalReject&&s.finalReject.stageLabel==="재무과") s.finalReject=null;
  }else if(step==="audit"){
    const idx=s.audits.findIndex(a=>a.by===u.name && a.role===u.role);
    if(idx<0){ toast("본인 참조 기록이 없습니다"); return; }
    const wasReject=s.audits[idx].result==="반려";
    s.audits.splice(idx,1);
    if(wasReject && s.finalReject&&s.finalReject.stageLabel==="감사") s.finalReject=null;
  }else if(step==="chair"){
    if(!s.chair || s.chair.by!==u.name){ toast("본인 최종승인만 취소할 수 있습니다"); return; }
    s.chair=null; if(s.finalReject&&s.finalReject.stageLabel==="위원장") s.finalReject=null;
  }
  d.status = draftStage(d)==="위원장승인" ? "승인" : (draftStage(d)==="반려" ? "반려" : "상신");
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] ${step==="fin"?"재무과":step==="audit"?"감사":"위원장"} 결재 취소`});
  saveRecs(m,recs);
  logEvent(m.key,no,d.title,"취소",`${u.role} ${u.name} 단계 취소`);
  const panel=document.getElementById(panelId(m,no));
  if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} 단계 취소됨`);
}

function copyAttUrl(url){
  if(!url) return;
  const done=()=>toast("링크가 복사되었습니다");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url,done));
  }else fallbackCopy(url,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); cb&&cb(); }catch(e){ toast("복사 실패 — 직접 선택해 복사하세요"); }
  document.body.removeChild(ta);
}

/* =========================================================
   첨부 (파일명 + 링크, B방식 — 실제 파일은 외부 보관)
========================================================= */
/* 이 문서의 상위 첨부 출처 체인 수집: [{mkey,no,label,rec}] (자기 자신 포함, 상위로) */
function attachmentSources(m,d){
  const chain=[{mkey:m.key, no:d.draft_no, label:m.label, rec:d}];
  // 견적 → 기안
  if(m.key==="quote" && d.from_draft){
    const dr=loadRecs(MODULES.draft).find(x=>x.draft_no===d.from_draft);
    if(dr){
      chain.push({mkey:"draft", no:dr.draft_no, label:"기안", rec:dr});
      if(dr.from_pr){
        const pr=loadRecs(MODULES.pr).find(x=>x.draft_no===dr.from_pr);
        if(pr) chain.push({mkey:"pr", no:pr.draft_no, label:"구매요청", rec:pr});
      }
    }
  }
  // 기안 → 구매요청
  else if(m.key==="draft" && d.from_pr){
    const pr=loadRecs(MODULES.pr).find(x=>x.draft_no===d.from_pr);
    if(pr) chain.push({mkey:"pr", no:pr.draft_no, label:"구매요청", rec:pr});
  }
  return chain;
}

function attachmentsHtml(m,d){
  const u=currentUser();
  const sources=attachmentSources(m,d);
  const blocks = sources.map((src,si)=>{
    const list=src.rec.attachments||[];
    const isOwn = si===0;
    const srcTag = isOwn ? "" : `<span class="att-src">${esc(src.label)} ${esc(src.no)}</span>`;
    const itemsHtml = list.length
      ? list.map((a,i)=>{
          const shortUrl = a.url ? (a.url.length>48 ? a.url.slice(0,30)+"…"+a.url.slice(-14) : a.url) : "";
          return `<div class="att-item">
          <span class="att-ico">📎</span>
          <div class="att-main">
            <div class="att-name-row">${isOwn?"":`<span class="att-src-chip">${esc(src.label)}</span>`}
              ${a.url?`<a href="${esc(a.url)}" target="_blank" rel="noopener" class="att-name">${esc(a.name)}</a>`:`<span class="att-name">${esc(a.name)}</span>`}</div>
            ${a.url?`<div class="att-url-row"><span class="att-url" title="${esc(a.url)}">${esc(shortUrl)}</span><button class="att-copy" data-att-copy="${esc(a.url)}">복사</button></div>`:""}
          </div>
          ${(u && u.role!=="위원")?`<button class="att-del" data-att-del="${src.mkey}|${esc(src.no)}|${i}" title="삭제">×</button>`:""}
        </div>`;
        }).join("")
      : (isOwn?`<div class="muted" style="padding:4px 0">첨부가 없습니다.</div>`:"");
    if(!isOwn && !list.length) return "";  // 상위에 첨부 없으면 블록 생략
    return `<div class="att-group">
      <div class="att-group-head">${isOwn?"이 문서 첨부":`${esc(src.label)} 이어받음 ${srcTag}`}</div>
      ${itemsHtml}
    </div>`;
  }).join("");
  const adder = (u && u.role!=="위원") ? `
    <div class="att-add">
      <input type="text" id="att-name-${m.key}" placeholder="파일명 (예: 견적서_A컴퓨터.pdf)">
      <input type="text" id="att-url-${m.key}" placeholder="링크 URL (회사 드라이브/공유폴더, 선택)">
      <button class="btn btn-ghost btn-sm" data-att-add="${m.key}|${esc(d.draft_no)}">＋ 첨부 추가</button>
    </div>` : "";
  return `<div class="att-box">
    <b style="font-size:13px">첨부 (파일명·링크)</b>
    <div class="att-hint muted" style="font-size:11.5px;margin:4px 0 8px">상위 단계(구매요청·기안) 첨부도 함께 표시됩니다. 수정·삭제 시 해당 원본 문서에 반영되고 이력에 남습니다.</div>
    <div class="att-list">${blocks}</div>
    ${adder}
  </div>`;
}

function addAttachment(m,no){
  const u=currentUser();
  if(!u){ toast("로그인 후 첨부할 수 있습니다"); return; }
  if(u.role==="위원"){ toast("위원은 열람 전용입니다"); return; }
  const name=(document.getElementById(`att-name-${m.key}`)||{}).value?.trim()||"";
  let url=(document.getElementById(`att-url-${m.key}`)||{}).value?.trim()||"";
  if(!name){ toast("파일명을 입력하세요"); return; }
  if(url && !/^https?:\/\//i.test(url)){ url="https://"+url; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  d.attachments=d.attachments||[];
  d.attachments.push({name, url, by:u.name, at:nowStamp()});
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 첨부 추가 — ${name}`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods||d.vendor, "첨부", `첨부 추가 — ${name}`);
  rerenderAfterAttachment(m,no);
  toast("첨부가 추가되었습니다");
}

function delAttachment(m,no,idx){
  const u=currentUser();
  if(u && u.role==="위원"){ toast("위원은 열람 전용입니다"); return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(!d.attachments||!d.attachments[idx]) return;
  const removed=d.attachments[idx].name;
  if(!confirm(`첨부 '${removed}'를 삭제할까요? (${m.label} ${no} 원본에서 삭제되며 이력에 남습니다)`)) return;
  d.attachments.splice(idx,1);
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u?u.role:""} ${u?u.name:""}] 첨부 삭제 — ${removed}`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods||d.vendor, "첨부", `첨부 삭제 — ${removed}`);
  rerenderAfterAttachment(m,no);
  toast("첨부가 삭제되었습니다");
}

/* 첨부 변경 후 관련 패널들 다시 그림 (원본 문서 + 현재 열린 모든 상세 패널) */
function rerenderAfterAttachment(m,no){
  // 원본 문서 패널 (pr/draft)
  if(m.key!=="quote"){
    const panel=document.getElementById(panelId(m,no));
    if(panel){ const rec=loadRecs(m).find(x=>x.draft_no===no); if(rec) panel.innerHTML=detailHtml(m,rec); }
  }
  // 현재 열려있는 pr/draft 동적 상세 패널 전부 갱신 (상위 첨부 반영 위해)
  ["pr","draft"].forEach(k=>{
    const mm=MODULES[k];
    (openTabs[k]||new Set()).forEach(vno=>{
      const p=document.getElementById(panelId(mm,vno));
      if(p){ const r=loadRecs(mm).find(x=>x.draft_no===vno); if(r) p.innerHTML=detailHtml(mm,r); }
    });
  });
  // 견적 열린 패널 갱신
  document.querySelectorAll('#views-quote .panel').forEach(p=>{
    const qno=p.querySelector('.dno')?.textContent?.trim();
    if(qno && loadRecs(MODULES.quote).find(x=>x.draft_no===qno)) openQuoteDetail(qno);
  });
}


function orderDetailHtml(m,d,histHtml){
  const u=currentUser();

  const canInfo = u && (u.role==="사무직원"||ORDER_APPROVER_ROLES.includes(u.role));

  // 승인 현황 (입고 → 재무 승인 순)

    : `<div class="ap-cell"><div class="lab">② 재무 승인</div><div class="mark" style="color:var(--ink-soft)">○</div><div class="stat wait">${d.received?"대기":"입고 후"}</div></div>`;

  // 참조 코멘트
  const refHtml=(d.comments||[]).length
    ? (d.comments||[]).map(c=>`<div class="cmt"><div class="meta"><span class="role">${esc(c.role)}</span> · ${esc(c.by)} · ${esc(c.at)}</div><div style="white-space:pre-wrap">${esc(c.text)}</div></div>`).join("")
    : `<div class="muted" style="padding:4px 0">참조 없음</div>`;

  let actions="";
  if(canApprove){
    actions+=`<div class="field" style="margin:8px 0"><label>승인 의견(선택)</label><textarea id="o-apv-cmt" class="mid"></textarea></div>
      <div class="seg"><button class="btn btn-primary btn-sm" data-o-approve="${esc(d.draft_no)}|승인">발주 승인</button>
      <button class="btn btn-ghost btn-sm" data-o-approve="${esc(d.draft_no)}|반려" style="color:var(--void)">반려</button></div>`;
  }else if(u && ORDER_APPROVER_ROLES.includes(u.role) && !d.received){
    actions+=`<div class="muted">입고 확인 후 승인할 수 있습니다.</div>`;
  }
  if(canRefer){
    actions+=`<div class="field" style="margin:8px 0"><label>참조 코멘트(선택)</label><textarea id="o-ref-cmt" class="mid"></textarea></div>
      <button class="btn btn-ghost btn-sm" data-o-refer="${esc(d.draft_no)}">참조 확인</button>`;
  }

  // 발주 정보 입력
  const quoteAmt = d.amount||0;  // 선정 견적금액(이어받음)
  const finalAmt = d.final_amount||0;
  const hasBase = quoteAmt>0;
  const diff = finalAmt && hasBase ? finalAmt-quoteAmt : 0;
  const baseLine = hasBase
    ? `선정 견적금액: <b>${won(quoteAmt)}</b>${d.from_quote?` (${esc(d.from_quote)})`:""} · 발주처는 선정 견적 업체에서 이어받았습니다(수정 가능)`
    : `<span style="color:var(--void);font-weight:700">⚠ 선정 견적 없음 — 발주금액 비교 기준이 없습니다</span>`;
  const infoBox = canInfo ? `
    <div class="draft-box" style="border-color:var(--line);background:#fafbfd">
      <div class="ttl">발주 정보 <span class="muted" style="font-weight:400">(입력일자 ${esc(d.created_at)})</span></div>
      <div class="muted" style="margin-bottom:6px">${baseLine}</div>
      <div class="row">
        <div class="field"><label class="req">발주처</label><input type="text" id="o-place" data-orig="${esc(d.order_place||"")}" value="${esc(d.order_place||"")}" placeholder="예: A컴퓨터"></div>
        <div class="field"><label class="req">최종 발주금액(원)</label><input type="text" id="o-final" data-base="${quoteAmt}" value="${finalAmt?fmt(finalAmt):""}" inputmode="numeric" placeholder="${quoteAmt?fmt(quoteAmt):"12,500,000"}"></div>
      </div>
      ${hasBase?`<div class="field"><label>견적 대비 차이</label><input type="text" id="o-diff" readonly value="${finalAmt?(diff===0?"동일":(diff>0?`+${fmt(diff)} 증가`:`${fmt(diff)} 감소`)):""}" style="max-width:200px"></div>
      <div class="field" id="o-diff-reason-wrap" style="${(finalAmt&&diff!==0)?"":"display:none"}"><label class="req">차이 사유</label><textarea id="o-diff-reason" class="mid" placeholder="선정 견적금액과 최종 발주금액이 다른 사유">${esc(d.diff_reason||"")}</textarea></div>`:`<div class="muted" style="font-size:11.5px">비교 기준(선정 견적)이 없어 차이 검증을 생략합니다.</div>`}
      <div class="field"><label>내용 기재</label><textarea id="o-content" class="big" style="min-height:90px" placeholder="예: 사무실에 택배 입고">${esc(d.order_content||"")}</textarea></div>
      <button class="btn btn-ghost btn-sm" data-o-info="${esc(d.draft_no)}">발주 정보 저장</button>
    </div>` : `
    <div class="att-box"><b style="font-size:13px">발주 정보</b>
      <dl class="kv" style="margin-top:6px">
        <dt>발주처</dt><dd>${esc(d.order_place||"-")}</dd>
        <dt>입력일자</dt><dd>${esc(d.created_at)}</dd>
        <dt>선정 견적금액</dt><dd>${hasBase?won(quoteAmt):"비교 기준 없음"}</dd>
        <dt>최종 발주금액</dt><dd style="font-weight:700">${finalAmt?won(finalAmt):"-"}</dd>
        ${(finalAmt&&diff!==0)?`<dt>차이</dt><dd>${diff>0?"+":""}${fmt(diff)}원</dd><dt>차이 사유</dt><dd style="white-space:pre-wrap">${esc(d.diff_reason||"-")}</dd>`:""}
        ${d.order_content?`<dt>내용</dt><dd style="white-space:pre-wrap">${esc(d.order_content)}</dd>`:""}
      </dl></div>`;

  // 입고 확인 (발주정보만으로 가능, 재무승인 불필요)
  let recvBox="";
  if(d.received){
    recvBox=`<div class="final-select sel"><div class="ttl" style="color:var(--ok)">✅ 입고 확인 완료</div>
      <dl class="kv" style="margin-top:6px">
        <dt>입고일자</dt><dd>${esc(d.received_date||"-")}</dd>
        <dt>확인자</dt><dd>${esc(d.received_by)} · ${esc(d.received_at)}</dd>
        ${d.received_note?`<dt>처리 내용</dt><dd style="white-space:pre-wrap">${esc(d.received_note)}</dd>`:""}
      </dl>
      ${canInfo?`<button class="btn btn-ghost btn-sm" data-o-unrecv="${esc(d.draft_no)}" style="margin-top:8px;color:var(--void)">입고 확인 취소</button>`:""}</div>`;
  }else{
    const infoReady = d.order_place && d.final_amount;
    const why = (!infoReady) ? "발주 정보(발주처·최종금액)를 먼저 저장하세요." : "";
    const canReceive2 = canInfo && infoReady;
    recvBox=`<div class="final-select"><div class="ttl" style="color:var(--brand)">입고 확인 (사무직원)</div>
      <div class="muted" style="margin:6px 0">입고 확인 후 재무과 승인을 받으면 지출결의로 진행할 수 있습니다.${why?` ${why}`:""}</div>
      ${canReceive2?`
        <div class="row">
          <div class="field"><label class="req">입고일자</label><input type="text" id="o-recv-date" placeholder="예: 2026-06-15"></div>
          <div class="field"><label>처리 내용</label><input type="text" id="o-recv-note" placeholder="검수·수량 등 처리 메모"></div>
        </div>
        <button class="btn btn-primary btn-sm" data-o-recv="${esc(d.draft_no)}">입고 확인</button>`
      :`<button class="btn btn-primary btn-sm" disabled style="opacity:.5;cursor:not-allowed">입고 확인</button>`}</div>`;
  }

  return `<div class="card">
    ${suspensionBanner(m,d)}
    ${expediteBlock("order",d)}
    <div class="detail-head">
      <div class="detail-head-left">
        <h3 style="margin:0 0 2px;font-size:16px"><span class="dno">${esc(d.draft_no)}</span></h3>
        <div class="muted" style="font-size:15px;font-weight:700;color:var(--ink);margin:4px 0 8px">${esc(d.title||"")}</div>
        <dl class="kv" style="margin-top:6px">
          <dt>연결기안</dt><dd><button class="linked-chip" data-open-draft2="${esc(d.from_draft||"")}">${esc(d.from_draft||"-")}</button></dd>
          ${d.from_quote?`<dt>선정견적</dt><dd>${esc(d.from_quote)}</dd>`:""}
          <dt>업체</dt><dd>${esc(d.vendor||"-")}</dd>
          <dt>금액</dt><dd style="font-weight:700">${won(d.amount)}</dd>
          <dt>작성자</dt><dd>${esc(d.drafter)} (${esc(d.drafter_id||"")} · ${esc(d.drafter_role||"")})</dd>
          <dt>작성일</dt><dd>${esc(d.created_at)}</dd>
        </dl>
      </div>
      <div class="status-board"><div class="approval-grid" style="grid-template-columns:repeat(2,minmax(96px,1fr))">${recvCell}${apCell}</div></div>
    </div>
    ${infoBox}
    ${recvBox}
    <div class="approve-box"><div class="ttl">재무과 승인 (입고 후) · 참조(감사·위원장, 선택)</div>
      ${(d.comments||[]).length||d.approval?`<div style="margin:10px 0"><b style="font-size:12.5px">참조</b>${refHtml}</div>`:""}
      ${actions||`<div class="muted">현재 처리할 항목이 없습니다.</div>`}
    </div>
    ${attachmentsHtml(m,d)}
    ${settleBlockHtml(d)}
    ${histHtml}
    <div class="modal-actions" style="justify-content:flex-start">${voidButtonsHtml(MODULES.order, d)}</div>
  </div>`;
}

function settleBlockHtml(o){
  const u=currentUser();
  const ready = o.received && o.approval && o.approval.result==="승인";
  const canMake = u && (u.role==="사무직원" || DRAFT_FIN_ROLES.includes(u.role));
  const settles=(o.linked_settles||[]).map(sn=>loadRecs(MODULES.settle).find(x=>x.draft_no===sn)).filter(Boolean);
  const chips = settles.length
    ? `<div class="linked-list">${settles.map(s=>`<button class="linked-chip" data-open-settle="${esc(s.draft_no)}">${esc(s.draft_no)} · ${esc(settleStage(s))}</button>`).join("")}</div>`
    : `<div class="muted" style="margin:6px 0">아직 지출결의가 없습니다.</div>`;
  return `<div class="draft-box" style="border-color:var(--brand);background:#f5f8ff">
    <div class="ttl" style="color:var(--brand)">지출결의</div>
    <div class="muted" style="margin-bottom:8px">입고 확인 + 재무 승인이 완료되면 지출결의를 올릴 수 있습니다.</div>
    ${chips}
    ${canMake?`<button class="btn btn-primary btn-sm" data-make-settle="${esc(o.draft_no)}" ${ready?'style="margin-top:8px"':'disabled style="opacity:.5;cursor:not-allowed;margin-top:8px"'}>＋ 지출결의 올리기</button>${ready?"":'<div class="muted" style="margin-top:4px">입고·재무승인 후 가능합니다.</div>'}`
      :`<div class="muted" style="margin-top:6px">지출결의 작성은 사무직원·재무과만 가능합니다.</div>`}
  </div>`;
}

function detailHtml(m,d){
  const histHtml=(d.history&&d.history.length)
    ? `<div class="hist"><b>처리 이력 (행위 기록)</b><div class="histlist">${
        d.history.slice().reverse().map(h=>{
          const t=h.text||"";
          let cls="hi";
          if(/긴급승인 설정|⚡/.test(t)) cls="hi hi-emg";
          else if(/감사.*반려|최종\s*반려|반려/.test(t)) cls="hi hi-rej";
          else if(/일괄취소|취소/.test(t)) cls="hi hi-cancel";
          else if(/승인|참조/.test(t)) cls="hi hi-ok";
          return `<div class="${cls}"><span class="hi-at">${esc(h.at)}</span><span class="hi-txt">${esc(t)}</span></div>`;
        }).join("")
      }</div></div>`:"";
  const parentLine=d.parent_no?`<dt>이전 건</dt><dd>${esc(d.parent_no)} (변경 전)</dd>`:"";
  const voidLine=(d.status==="폐기"?`<dt>폐기사유</dt><dd style="color:var(--void)">${esc(d.void_reason||"")}</dd>`:"")
    + (d.void_request?`<dt>폐기요청</dt><dd style="color:var(--wait)">${esc(d.void_request.by)} (${esc(d.void_request.role)}): ${esc(d.void_request.reason)}</dd>`:"");
  const voidBtn=voidButtonsHtml(m, d);

  // 발주 상세
  if(m.key==="order"){
    return orderDetailHtml(m,d,histHtml);
  }
  // 지출결의 상세
  if(m.key==="settle"){
    return settleDetailHtml(m,d,histHtml);
  }
  // 긴급지출 상세 (지결과 동일 양식)
  if(m.key==="urgent"){
    return settleDetailHtml(m,d,histHtml);
  }

  if(m.simple){
    const approved = d.status==="승인";
    const linked = d.linked_drafts || [];
    let draftBlock = "";
    if(approved){
      const linkedHtml = linked.length
        ? `<div class="linked-list">${linked.map((dn,i)=>`<button class="linked-chip" data-goto-draft="${esc(dn)}">${esc(dn)}</button>`).join("")}</div>`
        : `<div class="muted" style="margin:6px 0">아직 생성된 기안이 없습니다.</div>`;
      draftBlock = `<div class="draft-box">
        <div class="ttl" style="color:var(--ok)">기안 상신</div>
        <div class="muted" style="margin-bottom:10px">승인된 구매요청입니다. 기안을 올릴 수 있으며, 여러 번 누르면 분할 기안(-1, -2, -3 …)이 추가됩니다.</div>
        ${linkedHtml}
        <button class="btn btn-primary btn-sm" data-make-draft="${esc(d.draft_no)}" style="margin-top:8px">＋ 기안 올리기</button>
      </div>`;
    }
    return `<div class="card">
      ${expediteBlock("pr",d)}
      <div class="detail-head">
        <div class="detail-head-left">
          <h3 style="margin:0 0 2px;font-size:16px"><span class="dno">${esc(d.draft_no)}</span>${d.version>1?` · v${d.version}`:""}</h3>
          <div class="muted" style="font-size:15px;font-weight:700;color:var(--ink);margin:4px 0 8px">${esc(d.title||d.goods||"")}</div>
          <dl class="kv" style="margin-top:10px">
            <dt>요청자</dt><dd>${esc(d.requester||d.drafter||"")}</dd>
            <dt>작성자</dt><dd>${esc(d.drafter||"")}${d.drafter_role?` (${esc(d.drafter_role)})`:""}</dd>
            <dt>요청일자</dt><dd>${esc(d.created_at)}</dd>
            <dt>상태</dt><dd>${badge(d.status)}</dd>
            ${parentLine}${voidLine}
          </dl>
        </div>
        ${statusBoardHtml(d)}
      </div>
      ${d.detail?`<div style="margin:6px 0 12px"><b style="font-size:13px">상세내용</b><div class="muted" style="margin-top:4px;white-space:pre-wrap">${esc(d.detail)}</div></div>`:""}
      <div class="goods-bubble">${esc(d.goods||d.title)}</div>
      ${approvalBox(m,d)}
      ${draftBlock}
      ${attachmentsHtml(m,d)}
      ${histHtml}
      ${voidBtn?`<div class="modal-actions" style="justify-content:flex-start;margin-top:16px">${voidBtn}</div>`:""}
    </div>`;
  }

  const itemsHtml=(d.items||[]).map(i=>`<tr><td>${esc(i.name)}</td><td>${esc(i.qty)||"-"}</td><td>${esc(i.note)||"-"}</td></tr>`).join("");
  let budgetLine="";
  if(Array.isArray(d.budget_lines) && d.budget_lines.length){
    const rows=d.budget_lines.map(l=>{
      const remain=(l.budget||0)-(l.spent||0)-(l.amount||0);
      const tag = !l.budget ? "" : (remain>=0?`<span style="color:var(--ok)">잔여 ${won(remain)}</span>`:`<span style="color:var(--void);font-weight:700">초과 ${won(-remain)}</span>`);
      return `<tr><td>${esc(l.name)}</td><td style="font-variant-numeric:tabular-nums">${won(l.budget)}</td><td style="font-variant-numeric:tabular-nums">${won(l.spent||0)}</td><td style="font-variant-numeric:tabular-nums">${won(l.amount)}</td><td>${tag}</td></tr>`;
    }).join("");
    budgetLine=`<dt>예산</dt><dd><table class="mini-budget"><thead><tr><th>계정</th><th>배정</th><th>누적지출</th><th>지출예정</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      <div style="margin-top:4px">합계 예정액 <b>${won(d.amount)}</b></div></dd>`;
  } else if(d.account||d.amount){
    budgetLine=`<dt>사용계정</dt><dd>${esc(d.account||"-")}</dd><dt>예상액</dt><dd>${won(d.amount)}</dd>`;
  }
  return `<div class="card">
    ${suspensionBanner(m,d)}
    ${expediteBlock("draft",d)}
    <div class="detail-head">
      <div class="detail-head-left">
        <h3 style="margin:0 0 2px;font-size:16px"><span class="dno">${esc(d.draft_no)}</span>${d.version>1?` · v${d.version}`:""}</h3>
        <div class="muted" style="margin-bottom:4px">${esc(d.title)}</div>
        <dl class="kv" style="margin-top:6px">
          <dt>사업구분</dt><dd>${esc(d.project)}</dd>
          <dt>작성자</dt><dd>${esc(d.drafter)}${d.drafter_id?` (${esc(d.drafter_id)} · ${esc(d.drafter_role||"")})`:""}</dd>
          <dt>작성일자</dt><dd>${esc(d.created_at)}</dd>
          ${d.from_pr?`<dt>구매요청 참조</dt><dd><span class="dno">${esc(d.from_pr)}</span></dd>`:""}
          <dt>상태</dt><dd>${badge(d.status)} <span class="muted">${esc(draftStatusLabel(d))}</span></dd>
          ${budgetLine}${parentLine}${voidLine}
        </dl>
      </div>
      ${draftBoardHtml(d)}
    </div>
    <div><b style="font-size:13px">목적</b><div class="muted" style="margin:4px 0 12px;white-space:pre-wrap">${esc(d.purpose)}</div></div>
    <div><b style="font-size:13px">사유</b><div class="muted" style="margin:4px 0 12px;white-space:pre-wrap">${esc(d.reason||"-")}</div></div>
    <b style="font-size:13px">필요목록</b>
    <div class="detail-items"><table>
      <thead><tr><th>품목명</th><th style="width:70px">수량</th><th>비고</th></tr></thead>
      <tbody>${itemsHtml}</tbody></table></div>
    ${draftApprovalBox(m,d)}
    ${quoteBlockHtml(d)}
    ${orderBlockHtml(d)}
    ${prRefBlockHtml(d)}
    ${attachmentsHtml(m,d)}
    ${histHtml}
    <div class="modal-actions" style="justify-content:flex-start">${voidBtn}</div>
  </div>`;
}

/* 기안 상세의 견적 올리기 박스 */
/* 기안 하단: 연결된 원본 구매요청 보기 */
function prRefBlockHtml(d){
  if(!d.from_pr) return "";
  const pr=loadRecs(MODULES.pr).find(x=>x.draft_no===d.from_pr);
  if(!pr) return `<div class="att-box"><b style="font-size:13px">원본 구매요청</b>
    <div class="muted" style="margin-top:6px">참조: ${esc(d.from_pr)} (문서를 찾을 수 없습니다)</div></div>`;
  return `<div class="pr-ref" style="margin-top:18px">
    <div class="pr-ref-head"><span class="pr-ref-tag">원본 구매요청</span>
      <button class="linked-chip" data-open-pr="${esc(pr.draft_no)}">${esc(pr.draft_no)} 열람 →</button></div>
    <dl class="kv" style="margin:10px 0 0">
      <dt>제목</dt><dd>${esc(pr.title||pr.goods||"")}</dd>
      <dt>요청자</dt><dd>${esc(pr.requester||pr.drafter||"")}</dd>
      <dt>작성자</dt><dd>${esc(pr.drafter||"")}${pr.drafter_role?` (${esc(pr.drafter_role)})`:""}</dd>
      <dt>요청일자</dt><dd>${esc(pr.created_at)}</dd>
      <dt>승인</dt><dd>${pr.approval?`${esc(pr.approval.by)} (${esc(pr.approval.role)}) · ${esc(pr.approval.at)}`:"-"}</dd>
    </dl>
    ${pr.detail?`<div style="margin-top:10px"><b style="font-size:12.5px">상세내용</b><div class="muted" style="white-space:pre-wrap;margin-top:3px">${esc(pr.detail)}</div></div>`:""}
    <div class="goods-bubble" style="margin-top:12px">${esc(pr.goods||pr.title)}</div>
  </div>`;
}

function orderBlockHtml(d){
  const u=currentUser();
  const canMake = u && u.role==="사무직원";
  const orders=(d.linked_orders||[]).map(on=>loadRecs(MODULES.order).find(x=>x.draft_no===on)).filter(Boolean);
  const finalApproved = (draftStage(d)==="위원장승인") || (d.status==="승인");
  const chips = orders.length
    ? `<div class="linked-list">${orders.map(o=>{
        const st = o.received?"입고완료":(o.approval&&o.approval.result==="승인"?"승인":o.approval&&o.approval.result==="반려"?"반려":"상신");

function openDetail(m,no){
  const d=loadRecs(m).find(x=>x.draft_no===no); if(!d) return;
  if(!openTabs[m.key]) openTabs[m.key]=new Set();
  if(openTabs[m.key].has(no)){ activateViewTab(m,no); return; }
  const btn=document.createElement("button");
  btn.className="tab tab-view"; btn.dataset.viewNo=no;
  btn.innerHTML=`<span class="vt-label">${esc(no)} · ${esc(d.title)}</span><span class="vt-x" title="닫기">×</span>`;
  btn.querySelector(".vt-label").onclick=()=>activateViewTab(m,no);
  btn.querySelector(".vt-x").onclick=(e)=>{e.stopPropagation(); closeViewTab(m,no);};
  document.getElementById(`dyn-${m.key}`).appendChild(btn);
  const panel=document.createElement("section");
  panel.className="panel"; panel.id=panelId(m,no);
  panel.innerHTML=detailHtml(m,d);
  document.getElementById(`views-${m.key}`).appendChild(panel);
  openTabs[m.key].add(no);
  activateViewTab(m,no);
}
function activateSub(m,sub){
  document.querySelectorAll(`#tabbar-${m.key} .tab`).forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(`#section-${m.key} .panel`).forEach(x=>x.classList.remove("active"));
  const btn=document.querySelector(`#tabbar-${m.key} .tab[data-sub="${sub}"]`);
  const panel=document.getElementById(`panel-${m.key}-${sub}`);
  if(btn) btn.classList.add("active");
  if(panel) panel.classList.add("active");
  if(sub==="list"){ if(m.key==="quote") renderQuoteList(); else if(m.key==="order") renderOrderList(); else if(m.key==="settle") renderSettleList(); else renderList(m); }
}
function activateViewTab(m,no){
  document.querySelectorAll(`#tabbar-${m.key} .tab`).forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(`#section-${m.key} .panel`).forEach(x=>x.classList.remove("active"));
  const btn=document.querySelector(`#tabbar-${m.key} .tab-view[data-view-no="${cssEsc(no)}"]`);
  if(btn) btn.classList.add("active");
  document.getElementById(panelId(m,no)).classList.add("active");
}
function closeViewTab(m,no){
  const btn=document.querySelector(`#tabbar-${m.key} .tab-view[data-view-no="${cssEsc(no)}"]`);
  const wasActive=btn&&btn.classList.contains("active");
  if(btn) btn.remove();
  const panel=document.getElementById(panelId(m,no));
  if(panel) panel.remove();
  openTabs[m.key].delete(no);
  if(wasActive) activateSub(m,"list");
}

// 폐기 관련 버튼 묶음 (역할별)
function voidButtonsHtml(m, d){
  const u=currentUser();
  const isMasterU = u && u.role==="HTML마스터";
  let html="";
  if(d.status==="폐기"){
    // 폐기 상태: 마스터만 복구
    if(isMasterU) html+=`<button class="btn btn-ghost" data-restore="${m.key}|${esc(d.draft_no)}" style="color:var(--ok)">↩ 폐기 복구 (살리기)</button>`;
    return html;
  }
  // 폐기 요청이 걸려 있으면
  if(d.void_request){
    if(isMasterU){
      html+=`<button class="btn btn-ghost" data-void="${m.key}|${esc(d.draft_no)}" style="color:var(--void)">폐기 승인(처리)</button>`;
      html+=` <button class="btn btn-ghost" data-void-reject="${m.key}|${esc(d.draft_no)}">폐기요청 반려</button>`;
    }else{
      html+=`<span class="muted" style="color:var(--wait)">⏳ 폐기 요청됨 — 마스터 처리 대기 (${esc(d.void_request.by)})</span>`;
    }
    return html;
  }
  // 일반 상태: 마스터=폐기, 그 외=폐기요청 (위원 제외)
  if(u && u.role!=="위원"){
    html+=`<button class="btn btn-ghost" data-void="${m.key}|${esc(d.draft_no)}" style="color:var(--void)">${isMasterU?"폐기 처리":"폐기 요청"}</button>`;
  }
  return html;
}

function doVoid(m,no){
  const u=currentUser();
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  // 마스터: 실제 폐기
  if(u && u.role==="HTML마스터"){
    const reason=prompt("폐기 사유를 입력하세요. (삭제되지 않고 사유와 함께 보관되며, 마스터가 복구할 수 있습니다)");
    if(reason===null) return;
    if(!reason.trim()){ toast("폐기 사유는 필수입니다"); return; }
    d.prev_status = d.status;           // 복구용 직전 상태 보관
    d.status="폐기"; d.void_reason=reason.trim(); d.void_request=null;
    d.history=d.history||[];
    d.history.push({at:todayStr(), text:`[HTML마스터 ${u.name}] 폐기 처리 — 사유: ${reason.trim()}`});
    saveRecs(m,recs);
    logEvent(m.key, no, d.title||d.goods, "폐기", `폐기 처리 — 사유: ${reason.trim()}`);
    const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
    renderList(m);
    toast(`${no} 폐기 처리됨 (마스터가 복구 가능)`);
    return;
  }
  // 그 외: 마스터에게 폐기 요청
  const reason=prompt("폐기 요청 사유를 입력하세요. (마스터에게 폐기 요청이 전달됩니다)");
  if(reason===null) return;
  if(!reason.trim()){ toast("폐기 요청 사유는 필수입니다"); return; }
  d.void_request = { by:u?u.name:"-", role:u?u.role:"-", reason:reason.trim(), at:nowStamp() };
  d.history=d.history||[];
  d.history.push({at:todayStr(), text:`[${u?u.role:""} ${u?u.name:""}] 폐기 요청 — 사유: ${reason.trim()}`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods, "폐기", `폐기 요청 — ${u?u.name:""}: ${reason.trim()} (마스터 처리 대기)`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast("폐기 요청이 마스터에게 전달되었습니다");
}
// 마스터: 폐기 복구(살리기)
function doRestore(m,no){
  const u=currentUser();
  if(!u || u.role!=="HTML마스터"){ toast("복구는 마스터만 가능합니다"); return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(d.status!=="폐기"){ toast("폐기 상태가 아닙니다"); return; }
  d.status = d.prev_status || "상신";   // 직전 상태로 복원
  d.void_reason=null; d.prev_status=null;
  d.history=d.history||[];
  d.history.push({at:todayStr(), text:`[HTML마스터 ${u.name}] 폐기 복구 — 상태 '${d.status}'로 되돌림`});
  saveRecs(m,recs);
  logEvent(m.key, no, d.title||d.goods, "취소", `폐기 복구 — 상태 '${d.status}'`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  renderList(m);
  toast(`${no} 복구됨 (상태: ${d.status})`);
}
// 마스터: 폐기 요청 취소(거부)
function doRejectVoidRequest(m,no){
  const u=currentUser();
  if(!u || u.role!=="HTML마스터"){ return; }
  const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  d.void_request=null;
  d.history=d.history||[];
  d.history.push({at:todayStr(), text:`[HTML마스터 ${u.name}] 폐기 요청 반려`});
  saveRecs(m,recs);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  toast("폐기 요청을 반려했습니다");
}

/* ---------- 백업 ---------- */
function exportData(m){
  const data={records:loadRecs(m), counter:JSON.parse(localStorage.getItem(m.cntKey)||"{}")};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`${m.label}백업_${todayStr()}.json`; a.click();
  toast("백업 파일을 내보냈습니다");
}
function importData(m,file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      const recs = data.records || data.drafts;  // 구버전 호환
      if(!Array.isArray(recs)) throw new Error();
      if(!confirm("현재 데이터를 불러온 파일로 덮어씁니다. 진행할까요?")) return;
      saveRecs(m,recs);
      if(data.counter) localStorage.setItem(m.cntKey, JSON.stringify(data.counter));
      renderList(m); toast("불러오기 완료");
    }catch(e){ toast("올바른 백업 파일이 아닙니다"); }
  };
  r.readAsText(file);
}

function renderAuthBar(){

  const u=currentUser();
  if(u){
    bar.innerHTML=`<span class="who">${esc(u.name)} · ${esc(u.role)}</span>
      <span id="sync-state" style="font-size:11px;color:#cfe3ff;margin:0 6px"></span>
      <button id="inbox-btn" title="내 결재함">📥 결재함<span class="nav-badge" id="inbox-badge" style="display:none">0</span></button>
      <button id="alert-btn" title="알림">🔔 알림<span class="nav-badge" id="nav-badge" style="display:none">0</span></button>
      <span style="position:relative;display:inline-block">
        <button id="more-btn" title="더보기" style="font-size:16px;line-height:1">⋯</button>
        <span id="more-menu" style="display:none;position:absolute;right:0;top:110%;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:160px;overflow:hidden">
          <button id="refresh-btn" class="more-item">🔄 새로고침</button>
          ${canExportBackup(u)?'<button id="export-btn" class="more-item">⬇ 내보내기</button>':''}
          <button id="logout-btn" class="more-item" style="color:var(--void)">로그아웃</button>
        </span>
      </span>`;
    const moreBtn=bar.querySelector("#more-btn");
    const moreMenu=bar.querySelector("#more-menu");
    moreBtn.onclick=(e)=>{
      e.stopPropagation();
      const open = moreMenu.style.display!=="none";
      moreMenu.style.display = open?"none":"block";
      if(!open){ setTimeout(()=>document.addEventListener("click", function _c(){ moreMenu.style.display="none"; document.removeEventListener("click",_c); }), 0); }
    };
    bar.querySelector("#refresh-btn").onclick=()=>refreshFromSupabase(true);
    bar.querySelector("#inbox-btn").onclick=()=>showTop("inbox");
    bar.querySelector("#alert-btn").onclick=()=>showTop("my");
    const exb=bar.querySelector("#export-btn");
    if(exb) exb.onclick=()=>{ if(exportBackupJson("manual")) toast("전체 백업 파일을 내려받았습니다"); };
    bar.querySelector("#logout-btn").onclick=async()=>{
      const u=currentUser();
      if(canExportBackup(u)){
        const ok=exportBackupJson("logout");
        if(ok) toast("전체 백업 파일을 내려받았습니다");
      }
      await sbLogout(); await afterAuthChange(); toast("로그아웃되었습니다");
    };
    if(nav) nav.style.display="";   // 로그인 시 메뉴 노출
    if(grp) grp.style.display="";
  }else{
    bar.innerHTML=`<span>로그인하지 않음</span>`;
    if(nav) nav.style.display="none";  // 비로그인 시 메뉴 숨김 (계정 화면만)
    if(grp) grp.style.display="none";
  }
}
async function afterAuthChange(){
  // 열린 동적 열람 탭 모두 제거 (이전 사용자 시점 화면 잔존 방지)
  Object.keys(openTabs||{}).forEach(k=>{
    (document.querySelectorAll(`#tabbar-${k} .tab-view`)||[]).forEach(b=>b.remove());
    const vp=document.getElementById(`views-${k}`); if(vp) vp.innerHTML="";
    openTabs[k]=new Set();
  });
  renderAuthBar();
  updateNavBadge();
  // 비로그인 시 계정(로그인) 화면 고정, 로그인 시 현재 탭 유지
  if(!currentUser()){ showTop("account"); return; }
  const active=document.querySelector("#topnav button.active");
  if(active) showTop(active.dataset.top); else showTop("my");
}

    return `<div class="card auth-box" style="text-align:center">
      <div class="placeholder"><div class="big">My 받은함</div>
      <div>로그인하면 내 권한에 해당하는 활동 알림을 메일함처럼 볼 수 있습니다.</div></div>
      <button class="btn btn-primary" onclick="showTop('account')" style="margin-top:8px">로그인하러 가기</button></div>`;
  }
  const read=readSetFor(u.login_id);
  const evs=loadEvents().filter(ev=>eventVisibleTo(ev,u)).reverse();
  const unread=evs.filter(ev=>!read.has(ev.id)).length;

  const roleNote = isApprover(u) ? "결재 대상(구매요청·기안)의 모든 활동을 받습니다."
    : isReferee(u) ? "참조 대상의 모든 활동을 받습니다."
    : u.role==="사무직원" ? "내가 상신한 건의 후속 활동을 받습니다."
    : "수신 대상 활동이 없습니다.";

  const list = evs.length ? evs.map(ev=>{
    const isUnread=!read.has(ev.id);
    const icon=KIND_ICON[ev.kind]||"•";
    return `<div class="mail-item${isUnread?' unread':''}" data-open="${ev.mkey}|${esc(ev.no)}" data-evid="${ev.id}">
      <div class="mail-dot">${isUnread?'<span class="dot"></span>':''}</div>
      <div class="mail-body">
        <div class="mail-top"><span class="mail-kind">${icon} ${esc(ev.kind)}</span>
          <span class="mail-no">${esc(ev.no)}</span>
          <span class="mail-time">${esc(ev.at)}</span></div>
        <div class="mail-title">${esc(ev.title||"")}</div>
        <div class="mail-msg">${esc(ev.msg||"")}</div>
        <div class="mail-by">${esc(ev.byRole)} ${esc(ev.by)}</div>
      </div></div>`;
  }).join("") : `<div class="empty">받은 알림이 없습니다.</div>`;

  // 마스터: 폐기 요청 목록 수집
  let voidReqBlock="";
  if(u.role==="HTML마스터"){
    const reqs=[];
    MODULE_KEYS.forEach(k=>{
      (loadRecs(MODULES[k])||[]).forEach(d=>{
        if(d.void_request) reqs.push({mkey:k, no:d.draft_no, title:d.title||d.goods||d.vendor||"", req:d.void_request});
      });
    });
    if(reqs.length){
      const items=reqs.map(r=>`<div class="mail-item unread" data-void-open="${r.mkey}|${esc(r.no)}">
        <div class="mail-dot"><span class="dot" style="background:var(--void)"></span></div>
        <div class="mail-body">
          <div class="mail-top"><span class="mail-kind" style="color:var(--void)">🗑 폐기 요청</span>
            <span class="mail-no">${esc(r.no)}</span>
            <span class="mail-time">${esc(r.req.at)}</span></div>
          <div class="mail-title">${esc(r.title)}</div>
          <div class="mail-msg">사유: ${esc(r.req.reason)}</div>
          <div class="mail-by">${esc(r.req.role)} ${esc(r.req.by)} — 클릭하여 승인/반려</div>
        </div></div>`).join("");
      voidReqBlock=`<div class="card" style="margin-bottom:14px;border:1px solid var(--void)">
        <div class="mailhead"><div><h2 style="margin:0;color:var(--void)">🗑 폐기 요청 (${reqs.length})</h2>
          <div class="muted" style="margin-top:4px">항목을 클릭하면 해당 문서로 이동해 승인(폐기) 또는 반려할 수 있습니다.</div></div></div>
        <div class="mail-list">${items}</div>
      </div>`;
    }
  }

  return `${voidReqBlock}<div class="card">
    <div class="mailhead">
      <div><h2 style="margin:0">My 받은함</h2>
        <div class="muted" style="margin-top:4px">${esc(u.name)} · ${esc(u.role)} — ${roleNote}</div></div>
      <div class="seg">
        <span class="muted" style="align-self:center">안읽음 <b style="color:var(--void)">${unread}</b></span>
        ${unread?`<button class="btn btn-ghost btn-sm" id="mark-all-read">모두 읽음</button>`:""}
      </div>
    </div>
    <div class="mail-list">${list}</div>
  </div>`;
}

function wireMySection(){
  const u=currentUser(); if(!u) return;
  const sec=document.getElementById("section-my");
  // 모두 읽음
  const mar=sec.querySelector("#mark-all-read");
  if(mar) mar.onclick=()=>{
    const ids=loadEvents().filter(ev=>eventVisibleTo(ev,u)).map(ev=>ev.id);
    markRead(u.login_id, ids);
    showTop("my"); updateNavBadge();
  };
  // 폐기 요청 항목 클릭 → 해당 문서로 이동 (마스터)
  sec.querySelectorAll("[data-void-open]").forEach(it=>{
    it.onclick=()=>{
      const [mkey,no]=it.dataset.voidOpen.split("|");
      const m=MODULES[mkey];
      if(m){ showTop(mkey); activateSub(m,"list"); openDetail(m,no); }
    };
  });
  // 일반 알림 항목 클릭 → 읽음 처리 + 해당 문서 열람 (폐기요청 항목 제외)
  sec.querySelectorAll(".mail-item:not([data-void-open])").forEach(it=>{
    it.onclick=()=>{
      markRead(u.login_id, [it.dataset.evid]);
      updateNavBadge();
      const [mkey,no]=it.dataset.open.split("|");
      const m=MODULES[mkey];
      if(m){ showTop(mkey); activateSub(m,"list"); openDetail(m,no); }
    };
  });
}

function updateNavBadge(){
  const u=currentUser();
  const badge=document.getElementById("nav-badge");
  if(badge){
    const n=unreadCountFor(u);
    if(n>0){ badge.textContent=n>99?"99+":n; badge.style.display="inline-block"; }
    else badge.style.display="none";
  }
  const ib=document.getElementById("inbox-badge");
  if(ib){
    const c=inboxCount(u);
    if(c>0){ ib.textContent=c>99?"99+":c; ib.style.display="inline-block"; }
    else ib.style.display="none";
  }
}

function wireQuoteSection(){
  const m=MODULES.quote;
  document.querySelectorAll(`#tabbar-quote > .tab`).forEach(t=>{
    t.onclick=()=>activateSub(m, t.dataset.sub);
  });
  const amt=document.getElementById("quote-amount");
  if(amt) amt.addEventListener("input",()=>{ const r=onlyNum(amt.value); amt.value=r?fmt(r):""; });
  const sub=document.getElementById("quote-submit");
  if(sub) sub.onclick=submitQuote;
  const rst=document.getElementById("quote-reset");
  if(rst) rst.onclick=()=>{ ["quote-vendor","quote-amount","quote-content","quote-note","quote-no"].forEach(id=>{const e=document.getElementById(id);if(e)e.value="";}); document.getElementById("quote-draft-summary").innerHTML=""; document.getElementById("quote-form-title").textContent="견적 작성"; };
  const s=document.getElementById("quote-search");
  if(s) s.addEventListener("input",renderQuoteList);
  // 이벤트 위임 (선정/열람)
  document.getElementById("section-quote").addEventListener("click",(e)=>{
    const sel=e.target.closest("[data-select-quote]");
    const aa=e.target.closest("[data-att-add]");
    const ad=e.target.closest("[data-att-del]");
    const ac=e.target.closest("[data-att-copy]");
    if(sel){ toggleSelectQuote(sel.dataset.selectQuote); }
    else if(aa){ const [k,no]=aa.dataset.attAdd.split("|"); addAttachment(MODULES[k],no); }
    else if(ad){ const [k,no,idx]=ad.dataset.attDel.split("|"); delAttachment(MODULES[k],no,Number(idx)); }
    else if(ac){ copyAttUrl(ac.dataset.attCopy); }
  });
}

function submitQuote(){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("견적 작성 권한이 없습니다"); return; }
  const no=val("quote-no").trim();
  if(!no){ toast("견적은 기안 화면의 '견적 올리기'로 생성하세요"); return; }
  const vendor=val("quote-vendor").trim();
  const amount=Number(onlyNum(val("quote-amount")));
  const content=val("quote-content").trim();
  if(!vendor){ toast("업체명을 입력하세요"); return; }
  if(!amount){ toast("견적 총액을 입력하세요"); return; }
  if(!content){ toast("견적 내용을 입력하세요"); return; }
  const recs=loadRecs(MODULES.quote);
  const q=recs.find(x=>x.draft_no===no); if(!q){ toast("견적을 찾을 수 없습니다"); return; }
  q.vendor=vendor; q.amount=amount;
  q.content=content; q.note=val("quote-note").trim();
  q.status="상신";
  q.history=q.history||[];
  q.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 견적 상신 — ${vendor} / ${won(amount)}`});
  saveRecs(MODULES.quote, recs);
  logEvent("quote", no, vendor, "상신", `견적 상신 — ${vendor} ${won(amount)} (기안 ${q.from_draft})`);
  toast(`${no} 상신 완료`);
  activateSub(MODULES.quote,"list");
}

function renderQuoteList(){
  const recs=loadRecs(MODULES.quote);
  const q=val("quote-search").trim().toLowerCase();
  let rows=recs.slice().reverse().filter(x=>{
    if(x.status==="작성중") return false;
    if(q){ const hay=`${x.draft_no} ${x.from_draft||""} ${x.vendor||""}`.toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  const tb=document.getElementById("quote-rows"); tb.innerHTML="";
  document.getElementById("quote-empty").style.display=rows.length?"none":"block";
  const total=rows.length;
  rows.forEach((x,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td class="muted">${total-i}</td><td>${esc(x.created_at)}</td>
      <td class="no">${esc(x.draft_no)}</td><td>${esc(x.from_draft||"-")}</td>
      <td>${esc(x.vendor)}</td><td style="font-variant-numeric:tabular-nums">${won(x.amount)}</td>
      <td>${x.selected?'<span class="chip chip-ok">선정 ✓</span>':`<button class="linkbtn" data-select-quote="${esc(x.draft_no)}">선정</button>`}</td>
      <td><button class="linkbtn" data-open-quote="${esc(x.draft_no)}">열람</button></td>`;
    tr.querySelector("[data-open-quote]").onclick=()=>openQuoteDetail(x.draft_no);
    tb.appendChild(tr);
  });
}

function toggleSelectQuote(no){
  const u=currentUser();
  if(!isQuoteWriter(u)){ toast("견적 선정 권한이 없습니다"); return; }
  const recs=loadRecs(MODULES.quote);
  const q=recs.find(x=>x.draft_no===no); if(!q) return;
  // 같은 기안의 다른 견적 선정 해제 (1개만 선정)
  recs.forEach(x=>{ if(x.from_draft===q.from_draft) x.selected=false; });
  q.selected=true;
  q.history=q.history||[];
  q.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 최종 견적 선정`});
  saveRecs(MODULES.quote, recs);
  logEvent("quote", no, q.vendor, "선정", `최종 견적 선정 — ${q.vendor} (기안 ${q.from_draft})`);
  renderQuoteList();
  toast(`${no} 선정됨`);
}

function openQuoteDetail(no){
  const q=loadRecs(MODULES.quote).find(x=>x.draft_no===no); if(!q) return;
  const dr=q.from_draft?loadRecs(MODULES.draft).find(x=>x.draft_no===q.from_draft):null;
  const histHtml=(q.history&&q.history.length)
    ? `<div class="hist"><b>처리 이력</b><div class="histlist">${q.history.slice().reverse().map(h=>`<div class="hi hi-ok"><span class="hi-at">${esc(h.at)}</span><span class="hi-txt">${esc(h.text)}</span></div>`).join("")}</div></div>`:"";
  const pid="panel-view-quote-"+no.replace(/[^A-Za-z0-9]/g,"_");
  const existing=document.getElementById(pid);
  if(existing){
    // 내용 갱신 위해 기존 패널/탭 제거 후 재생성
    existing.remove();
    document.querySelector(`#tabbar-quote .tab-view[data-view-no="${cssEsc(no)}"]`)?.remove();
  }
  const btn=document.createElement("button");
  btn.className="tab tab-view"; btn.dataset.viewNo=no;
  btn.innerHTML=`<span class="vt-label">${esc(no)} · ${esc(q.vendor||"")}</span><span class="vt-x">×</span>`;
  btn.querySelector(".vt-label").onclick=()=>{document.querySelectorAll("#section-quote .panel").forEach(x=>x.classList.remove("active")); document.querySelectorAll("#tabbar-quote .tab").forEach(x=>x.classList.remove("active")); document.getElementById(pid).classList.add("active"); btn.classList.add("active");};
  btn.querySelector(".vt-x").onclick=(e)=>{e.stopPropagation(); btn.remove(); document.getElementById(pid)?.remove(); activateSub(MODULES.quote,"list");};
  document.getElementById("dyn-quote").appendChild(btn);
  const panel=document.createElement("section");
  panel.className="panel"; panel.id=pid;
  panel.innerHTML=`<div class="card">
    <h3 style="margin:0 0 2px;font-size:16px"><span class="dno">${esc(no)}</span>${q.selected?' <span class="chip chip-ok">선정 ✓</span>':''}</h3>
    <dl class="kv" style="margin-top:10px">
      <dt>연결기안</dt><dd>${esc(q.from_draft||"-")}${dr?` (${esc(dr.title)})`:""}</dd>
      <dt>업체명</dt><dd>${esc(q.vendor)}</dd>
      <dt>견적 총액</dt><dd style="font-weight:700;font-size:15px">${won(q.amount)}</dd>
      <dt>작성자</dt><dd>${esc(q.drafter)} (${esc(q.drafter_role||"")})</dd>
      <dt>작성일</dt><dd>${esc(q.created_at)}</dd>
    </dl>
    <div class="goods-bubble" style="margin-top:14px" data-label="견적 내용">${esc(q.content||"-")}</div>
    ${q.note?`<div style="margin-top:14px"><b style="font-size:13px;color:var(--void)">⚠ 중요사항</b><div class="note-box">${esc(q.note)}</div></div>`:""}
    ${attachmentsHtml(MODULES.quote,q)}
    ${histHtml}
    <div class="modal-actions" style="justify-content:flex-start">
      ${q.selected?'':`<button class="btn btn-primary btn-sm" data-select-quote="${esc(no)}">최종 선정</button>`}
    </div>
  </div>`;
  document.getElementById("views-quote").appendChild(panel);
  document.querySelectorAll("#section-quote .panel").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll("#tabbar-quote .tab").forEach(x=>x.classList.remove("active"));
  panel.classList.add("active"); btn.classList.add("active");
}

function wireOrderSection(){
  const m=MODULES.order;
  document.querySelectorAll(`#tabbar-order > .tab`).forEach(t=>{ t.onclick=()=>activateSub(m,t.dataset.sub); });
  const s=document.getElementById("order-search");
  if(s) s.addEventListener("input",()=>{ setPage("order",1); renderOrderList(); });
  const ofv=document.getElementById("order-filter-void");
  if(ofv) ofv.addEventListener("change",()=>{ setPage("order",1); renderOrderList(); });
  const ofs=document.getElementById("order-filter-col");
  if(ofs) ofs.addEventListener("change",()=>{ setPage("order",1); renderOrderList(); });
  // 최종금액 입력 시 차이 실시간 계산 (위임)
  document.getElementById("section-order").addEventListener("input",(e)=>{
    if(e.target && e.target.id==="o-final"){
      const fin=Number(onlyNum(e.target.value));
      e.target.value = fin?fmt(fin):"";
      const base=Number(e.target.dataset.base||0);
      const diff=fin&&base?fin-base:0;
      const diffEl=document.getElementById("o-diff");
      if(diffEl) diffEl.value = fin?(diff===0?"동일":(diff>0?`+${fmt(diff)} 증가`:`${fmt(diff)} 감소`)):"";
      const wrap=document.getElementById("o-diff-reason-wrap");
      if(wrap) wrap.style.display = (fin&&diff!==0)?"":"none";
    }
  });
  document.getElementById("section-order").addEventListener("click",(e)=>{
    const ap=e.target.closest("[data-o-approve]");
    const rf=e.target.closest("[data-o-refer]");
    const inf=e.target.closest("[data-o-info]");
    const rcv=e.target.closest("[data-o-recv]");
    const unrcv=e.target.closest("[data-o-unrecv]");
    const od=e.target.closest("[data-open-draft2]");
    const vd=e.target.closest("[data-void]");
    const vrs=e.target.closest("[data-restore]");
    const vrj=e.target.closest("[data-void-reject]");
    const oexp=e.target.closest("[data-expedite]");
    const oexpc=e.target.closest("[data-expedite-cancel]");
    const msettle=e.target.closest("[data-make-settle]");
    const osettle=e.target.closest("[data-open-settle]");
    if(ap){ const [no,res]=ap.dataset.oApprove.split("|"); orderApprove(no,res); }
    else if(rf){ orderRefer(rf.dataset.oRefer); }
    else if(inf){ saveOrderInfo(inf.dataset.oInfo); }
    else if(rcv){ confirmReceived(rcv.dataset.oRecv); }
    else if(unrcv){ undoReceived(unrcv.dataset.oUnrecv); }
    else if(od){ const dn=od.dataset.openDraft2; if(dn){ showTop("draft"); activateSub(MODULES.draft,"list"); openDetail(MODULES.draft,dn);} }
    else if(vd){ const [k,no]=vd.dataset.void.split("|"); doVoid(MODULES[k],no); }
    else if(vrs){ const [k,no]=vrs.dataset.restore.split("|"); doRestore(MODULES[k],no); }
    else if(vrj){ const [k,no]=vrj.dataset.voidReject.split("|"); doRejectVoidRequest(MODULES[k],no); }
    else if(oexp){ const [k,no]=oexp.dataset.expedite.split("|"); expediteDoc(k,no); }
    else if(oexpc){ const [k,no]=oexpc.dataset.expediteCancel.split("|"); expediteCancel(k,no); }
    else if(msettle){ makeSettleFromOrder(msettle.dataset.makeSettle); }
    else if(osettle){ const no=osettle.dataset.openSettle; showTop("settle"); activateSub(MODULES.settle,"list"); openDetail(MODULES.settle,no); }
  });
}

function renderOrderList(){
  const m=MODULES.order;
  const recs=loadRecs(m);
  const q=val("order-search").trim().toLowerCase();
  const voidF=(document.getElementById("order-filter-void")||{}).value||"active";
  const fcol=(document.getElementById("order-filter-col")||{}).value||"";
  const oGet={
    "제목": x=>x.title||"",
    "번호": x=>x.draft_no||"",
    "업체": x=>x.vendor||"",
    "단계": x=>x.status==="폐기"?"폐기":finStageText("order",x),
    "일자": x=>(x.created_at||"").slice(0,10)
  };
  let rows=recs.slice().reverse().filter(x=>{
    if(voidF==="active" && x.status==="폐기") return false;
    if(q){
      let hay;
      if(fcol && oGet[fcol]) hay=String(oGet[fcol](x)||"");
      else hay=Object.values(oGet).map(f=>String(f(x)||"")).join(" ");
      if(!hay.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const tb=document.getElementById("order-rows"); tb.innerHTML="";
  document.getElementById("order-empty").style.display=rows.length?"none":"block";
  const total=rows.length;
  let cur=getPage("order"); const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(cur>pages){ cur=pages; setPage("order",cur); }
  const startIdx=(cur-1)*PAGE_SIZE;
  rows.slice(startIdx, startIdx+PAGE_SIZE).forEach((x,i)=>{
    const idx=startIdx+i;
    const tr=document.createElement("tr");
    if(x.status==="폐기") tr.className="voided";
    const ordered = !!x.draft_no;  // 발주 레코드 존재 = 발주 작성(상신)됨
    tr.innerHTML=`<td class="muted col-no">${total-idx}</td><td class="col-date">${esc(x.created_at)}</td>
      <td class="no col-docno">${esc(x.draft_no)}</td><td class="col-title" style="white-space:pre-wrap">${esc(x.title||"")}${x.vendor?` / ${esc(x.vendor)}`:""}</td>
      <td class="col-amt" style="font-variant-numeric:tabular-nums">${won(x.amount)}</td>
      <td class="col-ap">${ordered?'<span class="chip chip-ok">발주 ✓</span>':'<span class="chip chip-wait">대기</span>'}</td>
      <td class="col-recv">${x.received?'<span class="chip chip-ok">입고 ✓</span>':'<span class="chip chip-wait">미입고</span>'}</td>
      <td class="col-stage" style="font-size:12px;color:var(--ink-soft)">${x.status==="폐기"?"폐기":esc(finStageText("order",x))}</td>
      <td class="col-open"><button class="linkbtn" data-open-order-row="${esc(x.draft_no)}">열람</button></td>`;
    tr.onclick=()=>openDetail(m,x.draft_no);
    tb.appendChild(tr);
  });
  renderPager("order-pager", total, "order", renderOrderList);
}

/* =========================================================
   지출결의서 (settle): 발주 → 지결
   결재선: 작성(사무·재무) → 감사1·2 참조 → 위원장 승인 → 재무분과장 OTP 최종
========================================================= */
const SETTLE_FIN_ROLES=["재무분과","재무분과장"];
const SETTLE_AUDIT_ROLES=["감사1","감사2"];
const SETTLE_CHAIR_ROLE="위원장";
const SETTLE_OTP_ROLE="재무분과장";

function settleSeq(d){ d.seq=d.seq||{fin:null,audits:[],chair:null,otp:null,finalReject:null}; if(!d.seq.audits)d.seq.audits=[]; if(d.seq.fin===undefined)d.seq.fin=null; return d.seq; }
function settleStage(d){
  const s=settleSeq(d);
  if(s.finalReject) return "반려";
  if(s.otp) return "확정";
  if(s.chair) return "OTP대기";
  if(s.fin) return "위원장대기";   // 재무 승인 후 → 위원장 (감사 참조는 병렬·선택)
  if(d.status==="상신") return "상신";   // 재무 승인 대기
  return d.status||"상신";
}

function makeSettleFromOrder(orderNo){
  const u=currentUser();
  if(!u || !(u.role==="사무직원"||SETTLE_FIN_ROLES.includes(u.role))){ toast("지출결의 작성은 사무직원·재무과만 가능합니다"); return; }
  const oM=MODULES.order, sM=MODULES.settle;
  const o=loadRecs(oM).find(x=>x.draft_no===orderNo); if(!o) return;
  if(!(o.received && o.approval && o.approval.result==="승인")){ toast("입고·재무승인 완료 후 가능합니다"); return; }
  const dr=o.from_draft?loadRecs(MODULES.draft).find(x=>x.draft_no===o.from_draft):null;
  const sRecs=loadRecs(sM);
  const part=(o.linked_settles||[]).length+1;
  const settleNo=`${orderNo}-S${part}`;
  // 발주의 budget_lines(기안에서 온 계정) 이어받아 실제지출액/전표번호 칸 준비
  const baseLines=(dr&&Array.isArray(dr.budget_lines))?dr.budget_lines.map(l=>({code:l.code,name:l.name,budget:l.budget,spent:l.spent||0,amount:0,slip:""})):[];
  sRecs.push({
    draft_no:settleNo, from_order:orderNo, from_draft:o.from_draft||null, from_pr:(dr&&dr.from_pr)||null,
    title:o.title, project:(dr&&dr.project)||"목동1단지",
    order_place:o.order_place, order_date:o.created_at, received_date:o.received_date,
    final_amount:o.final_amount||0,
    content:"", items_text:"", budget_lines:baseLines, amount:0,
    drafter:u.name, drafter_id:u.login_id, drafter_role:u.role,
    status:"상신", created_at:todayStr(),
    seq:{audits:[],chair:null,otp:null,finalReject:null},
    attachments:[],
    history:[{at:nowStamp(), text:`[${u.role} ${u.name}] 지출결의 생성 (발주 ${orderNo}${o.from_draft?` · 기안 ${o.from_draft}`:""})`}]
  });
  saveRecs(sM,sRecs);
  o.linked_settles=o.linked_settles||[]; o.linked_settles.push(settleNo);
  saveRecs(oM, loadRecs(oM).map(x=>x.draft_no===orderNo?o:x));
  logEvent("settle", settleNo, o.title, "상신", `지출결의 생성 — ${settleNo}`);
  toast(`${settleNo} 생성 — 지출결의로 이동`);
  showTop("settle"); activateSub(MODULES.settle,"list"); openDetail(MODULES.settle, settleNo);
}

// 작성 내용 저장 (지출내용·품목/금액·계정별 실제지출액·전표번호)
// 지결/긴급 공용: 문서번호로 모듈 판별
function settleModuleOf(no){ return (no && no.indexOf("긴급")===0) ? MODULES.urgent : MODULES.settle; }
function saveSettleCompose(no){
  const u=currentUser();
  const m=settleModuleOf(no); const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  if(settleStage(d)!=="상신"){ toast("결재가 진행 중이라 수정할 수 없습니다"); return; }
  // 해당 문서 패널 안에서만 입력을 읽는다 (다른 열린 문서/중복 id로 인한 복제 방지)
  const scope=document.getElementById(panelId(m,no)) || document;
  const content=(scope.querySelector("#s-content")||{}).value?.trim()||"";
  const itemsText=(scope.querySelector("#s-items")||{}).value?.trim()||"";
  // 계정 라인 수집 (이 패널의 라인만)
  const lines=[...scope.querySelectorAll("#s-budget-lines .settle-line")].map(row=>{
    const code=row.querySelector(".sl-account").value;
    const sel=code?loadBudgets().find(b=>b.code===code):null;
    const amount=Number(onlyNum(row.querySelector(".sl-amount").value));
    const slip=row.querySelector(".sl-slip").value.trim();
    return code?{code, name:sel?sel.name:"", budget:sel?sel.budget:0, spent:sel?accountSpent(sel.code):0, amount, slip}:null;
  }).filter(Boolean);
  if(!content){ toast("지출내용을 입력하세요"); return; }
  if(!lines.length){ toast("계정을 1개 이상 선택하세요"); return; }
  if(lines.some(l=>!l.amount)){ toast("계정별 실제 지출액을 입력하세요"); return; }
  if(lines.some(l=>!l.slip)){ toast("계정별 전표번호를 입력하세요"); return; }
  d.content=content; d.items_text=itemsText; d.budget_lines=lines;
  d.amount=lines.reduce((s,l)=>s+l.amount,0);
  d.history=d.history||[];
  d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 지출결의 내용 작성/수정 — 합계 ${won(d.amount)}`});
  saveRecs(m,recs);
  // 작성 완료 → 재무분과 결재 차례 알림
  logEvent(m.key, no, d.title, "상신", `${m.label} 작성 완료 — 재무분과 승인 대기 (합계 ${won(d.amount)})`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  toast("저장되었습니다 — 재무분과 승인 대기");
}

// 결재 단계 처리
function settleSeqAction(no, step, result){
  const u=currentUser();
  const m=settleModuleOf(no); const recs=loadRecs(m); const d=recs.find(x=>x.draft_no===no); if(!d) return;
  const s=settleSeq(d);
  // OTP(재무분과장 최종)는 작성자=재무분과장이어도 예외적으로 허용. 그 외 단계는 셀프 결재 금지
  if(step!=="otp" && isOwnDoc(d,u)){ toast("본인 작성 건은 결재할 수 없습니다"); return; }
  if(s.finalReject){ toast("이미 반려 확정된 건입니다"); return; }
  if(!d.budget_lines.length || !d.amount){ toast("작성이 완료되지 않았습니다"); return; }
  const cmt=(document.getElementById("s-seq-cmt")||{}).value?.trim()||"";
  if(step==="fin"){
    if(!SETTLE_FIN_ROLES.includes(u.role)){ toast("재무과만 승인할 수 있습니다"); return; }
    if(s.fin){ toast("이미 재무 승인되었습니다"); return; }
    if(result==="반려"){
      s.finalReject={by:u.name, role:u.role, at:nowStamp(), comment:cmt, step:"재무분과"};
      d.status="반려";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 재무분과 반려 — "${cmt}"`});
    }else{
      s.fin={by:u.name, role:u.role, at:nowStamp(), comment:cmt};
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 재무분과 승인${cmt?` — "${cmt}"`:""}`});
    }
  }else if(step==="audit"){
    if(!SETTLE_AUDIT_ROLES.includes(u.role)){ toast("감사만 참조할 수 있습니다"); return; }
    if(!s.fin){ toast("재무 승인 후 참조할 수 있습니다"); return; }
    if(s.otp){ toast("이미 확정된 건입니다"); return; }
    if(s.audits.some(a=>a.by===u.name)){ toast("이미 참조하셨습니다"); return; }
    if(result==="반려"){
      s.finalReject={by:u.name, role:u.role, at:nowStamp(), comment:cmt, step:"감사"};
      d.status="반려";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 감사 반려(거부권) — "${cmt}"`});
    }else{
      s.audits.push({by:u.name, role:u.role, at:nowStamp(), comment:cmt});
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 감사 참조${cmt?` — "${cmt}"`:""}`});
    }
  }else if(step==="chair"){
    if(u.role!==SETTLE_CHAIR_ROLE){ toast("위원장만 승인할 수 있습니다"); return; }
    if(!s.fin){ toast("재무 승인 후 승인할 수 있습니다"); return; }
    if(result==="반려"){
      s.finalReject={by:u.name, role:u.role, at:nowStamp(), comment:cmt, step:"위원장"};
      d.status="반려";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 위원장 반려 — "${cmt}"`});
    }else{
      s.chair={by:u.name, role:u.role, at:nowStamp(), comment:cmt};
      const noAudit=s.audits.length===0?" (감사 참조 전 선진행)":"";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 위원장 승인${noAudit}${cmt?` — "${cmt}"`:""}`});
    }
  }else if(step==="otp"){
    if(u.role!==SETTLE_OTP_ROLE){ toast("재무분과장만 최종 승인할 수 있습니다"); return; }
    if(!s.chair){ toast("위원장 승인 후 최종 승인할 수 있습니다"); return; }
    const selfNote = isOwnDoc(d,u)?" (작성자이나 최종승인 관리자 예외 승인)":"";
    if(result==="반려"){
      s.finalReject={by:u.name, role:u.role, at:nowStamp(), comment:cmt, step:"재무분과장"};
      d.status="반려";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] 재무분과장 반려 — "${cmt}"`});
    }else{
      s.otp={by:u.name, role:u.role, at:nowStamp(), comment:cmt, self:isOwnDoc(d,u)};
      d.status="확정";
      d.history.push({at:nowStamp(), text:`[${u.role} ${u.name}] ✅ 재무분과장 최종 승인${selfNote} — 지출 확정. 예산마스터 누적지출 반영`});
    }
  }
  saveRecs(m,recs);
  logEvent(m.key, no, d.title, result==="반려"?"반려":(step==="otp"?"확정":"승인"), `${step} ${result}`);
  const panel=document.getElementById(panelId(m,no)); if(panel) panel.innerHTML=detailHtml(m,d);
  if(m.key==="urgent") renderUrgentList(); else renderList(m);
  toast(result==="반려"?"반려되었습니다":(step==="otp"?"지출 확정":"처리되었습니다"));
}

    budgetBox=`<div class="draft-box">
      <div class="ttl">${m.key==="urgent"?"긴급지출 작성":"지출내용 작성"}</div>

      <div class="field"><label>품목 / 지출금액 (자유 입력)</label><textarea id="s-items" class="big" style="min-height:140px" placeholder="품목과 금액을 자유롭게 입력하세요. 품목이 많아도 됩니다.">${esc(d.items_text||"")}</textarea></div>
      <div class="budget-title" style="margin-top:8px">예산 검토 · 계정별 실제 지출액 / 전표번호</div>
      <div class="settle-lines-head"><span>계정</span><span>배정예산</span><span>누적지출</span><span>실제 지출액</span><span>전표번호</span><span></span></div>

  // 결재 액션

  if(!s.finalReject && !s.otp){

    }
    // 재무분과장 최종 승인 — 작성자(구매요청자)여도 최종승인 관리자이므로 예외 허용
    if(stage==="OTP대기" && u.role===SETTLE_OTP_ROLE){
      actions+=`${isWriter?'<div class="muted" style="margin-bottom:6px;color:var(--wait)">작성자이지만 최종승인 관리자이므로 최종 승인할 수 있습니다(예외).</div>':''}
        <div class="muted" style="margin-bottom:6px">재무분과장 최종 승인 단계입니다. (OTP 확인은 별도 절차로 진행)</div>
        <div class="field"><label>의견(선택)</label><textarea id="s-seq-cmt" class="mid"></textarea></div>
        <div class="seg"><button class="btn btn-primary btn-sm" data-s-seq="${esc(d.draft_no)}|otp|승인">최종 승인 (확정)</button>
        <button class="btn btn-ghost btn-sm" data-s-seq="${esc(d.draft_no)}|otp|반려" style="color:var(--void)">반려</button></div>`;
    }
  }

  const rejBox = s.finalReject?`<div class="suspend-banner">⚠ 반려 확정 — ${esc(s.finalReject.step)} ${esc(s.finalReject.by)}<br><span>사유: ${esc(s.finalReject.comment||"-")}</span></div>`:"";
  const okBox = s.otp?`<div class="expedite-badge" style="background:var(--ok-soft);border-color:var(--ok);color:var(--ok)">✅ 지출 확정 — 재무분과장 ${esc(s.otp.by)} · ${esc(s.otp.at)}<br><span>예산마스터 누적지출에 반영되었습니다.</span></div>`:"";

  const linkRows = isUrgent ? `<dt>구분</dt><dd><span class="chip" style="background:var(--void-soft,#fee);color:var(--void);font-weight:700">긴급지출 (사후승인)</span></dd>` : `

          ${d.from_pr?`<dt>구매요청</dt><dd>${esc(d.from_pr)}</dd>`:""}
          <dt>발주처</dt><dd>${esc(d.order_place||"-")}</dd>

  const bottomBtn = isUrgent

    : voidButtonsHtml(MODULES.settle, d);
  return `<div class="card">

    <div class="detail-head">

          <dt>합계 지출액</dt><dd style="font-weight:700">${won(d.amount)}</dd>
        </dl>

      <div class="status-board"><div class="approval-grid" style="grid-template-columns:repeat(4,minmax(80px,1fr))">${finCell}${auditCell}${chairCell}${otpCell}</div></div>

      ${actions||`<div class="muted">현재 처리할 항목이 없습니다.</div>`}

function settleLineRowHtml(line){
  const budgets=loadBudgets();
  const opts=`<option value="">계정 선택</option>`+budgets.map(b=>`<option value="${esc(b.code)}" ${line&&line.code===b.code?"selected":""}>${esc(b.name)} (${esc(b.code)})</option>`).join("");
  const sel=line&&line.code?budgets.find(b=>b.code===line.code):null;
  const spent=sel?accountSpent(sel.code):0;
  return `<div class="settle-line">
    <select class="sl-account">${opts}</select>
    <span class="sl-budget" style="font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-soft)">${sel?won(sel.budget):"-"}</span>
    <span class="sl-spent" style="font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-soft)">${sel?won(spent):"-"}</span>
    <input type="text" class="sl-amount" inputmode="numeric" value="${line&&line.amount?fmt(line.amount):""}" placeholder="실제 지출액">
    <input type="text" class="sl-slip" value="${line?esc(line.slip||""):""}" placeholder="전표번호">
    <button type="button" class="att-del sl-del" title="삭제">×</button>
  </div>`;
}
function updateSettleBudget(){
  // 현재 활성(보이는) 작성 패널 기준
  const scope=document.querySelector("#section-settle .panel.active, #section-urgent .panel.active") || document;
  const box=scope.querySelector("#s-budget-result"); if(!box) return;
  const lines=[...scope.querySelectorAll("#s-budget-lines .settle-line")].map(row=>{
    const code=row.querySelector(".sl-account").value;
    const sel=code?loadBudgets().find(b=>b.code===code):null;
    const amount=Number(onlyNum(row.querySelector(".sl-amount").value));
    return code?{code, name:sel?sel.name:"", budget:sel?sel.budget:0, spent:sel?accountSpent(sel.code):0, amount}:null;
  }).filter(Boolean);
  const total=lines.reduce((s,l)=>s+l.amount,0);
  box.className="budget-result show";
  if(!lines.length || !total){ box.className="budget-result"; return; }
  let over=[];
  lines.forEach(l=>{ const remain=(l.budget||0)-(l.spent||0)-l.amount; if(l.budget && remain<0) over.push(`${l.name} 초과 ${fmt(-remain)}원`); });
  if(over.length){
    box.classList.add("over");
    box.innerHTML=`⚠ 예산 초과 · 합계 실제지출 <span class="big-num">${fmt(total)}원</span> · ${over.join(" / ")}`;
  }else{
    box.classList.add("ok");
    box.innerHTML=`예산 내 · 합계 실제지출 <span class="big-num">${fmt(total)}원</span> (${lines.length}개 계정)`;
  }
}
function addSettleLine(line){
  const scope=document.querySelector("#section-settle .panel.active, #section-urgent .panel.active") || document;
  const wrap=scope.querySelector("#s-budget-lines"); if(!wrap) return;
  wrap.insertAdjacentHTML("beforeend", settleLineRowHtml(line||null));
}
